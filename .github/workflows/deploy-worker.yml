name: Deploy Worker to Cloudflare

# Auto-deploys on any change to the Worker source; manual dispatch kept for
# re-deploys. CF_API_TOKEN secret verified working 2026-07-11 (build e696f58f).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          # Injects the deployed commit SHA so GET /version can report it.
          command: deploy --var BUILD_SHA:${{ github.sha }}
