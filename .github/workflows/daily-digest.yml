name: Daily Morning Digest (Japanese)

on:
  schedule:
    # 07:00 JST == 22:00 UTC previous day
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  morning-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Post morning digest to Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python3 - <<'EOF'
          import os, json, base64, urllib.request
          from datetime import datetime, timezone, timedelta

          SLACK_TOKEN = os.environ["SLACK_TOKEN"]
          GH_TOKEN    = os.environ["GH_TOKEN"]
          CHANNEL     = "C08L1TWLU14"
          REPO        = "Geoffrey-Fitzjarrell-ai/generator_servicing"
          NOW_JST     = datetime.now(timezone.utc) + timedelta(hours=9)

          def slack_post(payload):
              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  "https://slack.com/api/chat.postMessage", data=data,
                  headers={"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"},
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def gh_get(path):
              url = f"https://api.github.com/repos/{REPO}/contents/{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
              })
              with urllib.request.urlopen(req) as r:
                  resp = json.loads(r.read())
              return json.loads(base64.b64decode(resp["content"]).decode())

          # Mirrors index.html TASKS / tasksForTruck / truckStatus exactly.
          TASKS = [
              {"key": "airfilter_battery", "interval": 50,  "jp": "エアフィルター・バッテリー点検"},
              {"key": "oil_filter",        "interval": 150, "jp": "オイル／フィルター交換"},
              {"key": "airfilter_clean",   "interval": 250, "jp": "エアフィルター清掃"},
              {"key": "coolant_lines",     "interval": 250, "jp": "クーラントライン点検"},
              {"key": "fuel_filter",       "interval": 250, "jp": "燃料フィルター交換"},
              {"key": "drive_belt",        "interval": 500, "jp": "ドライブベルト点検"},
              {"key": "clean_radiator",    "interval": 500, "jp": "ラジエーター清掃"},
              {"key": "airfilter_500",     "interval": 500, "jp": "エアフィルター交換"},
          ]

          def tasks_for_truck(truck_id):
              return [t for t in TASKS if t["key"] != "airfilter_clean" or truck_id == "HD5"]

          fleet    = gh_get("data.json")
          svc_logs = gh_get("service_logs.json")

          # Build a per-truck row: hours, worst task, pct through its interval.
          def critical_info(truck_id):
              td = fleet.get(truck_id) or {}
              hours = td.get("hours")
              if td.get("grounded"):
                  return {"status": "grounded", "note": td.get("groundedNote") or "整備・修理中", "hours": hours}
              if not hours:
                  return None
              tl = svc_logs.get(truck_id) or {}
              worst = None
              for task in tasks_for_truck(truck_id):
                  last = tl.get(task["key"])
                  if last is None:
                      if hours < task["interval"]:
                          last = 0
                      else:
                          last = 0  # never done and past interval -> fully overdue
                  since = hours - last
                  ratio = since / task["interval"]
                  if worst is None or ratio > worst["ratio"]:
                      worst = {"task": task, "ratio": ratio, "rem": task["interval"] - since}
              if worst is None:
                  return None
              st = "overdue" if worst["ratio"] >= 1 else "warn" if worst["ratio"] >= 0.9 else "ok"
              return {"status": st, "hours": hours, "task": worst["task"]["jp"],
                      "ratio": worst["ratio"], "rem": worst["rem"]}

          def bar(ratio, width=10):
              filled = min(width, max(0, round(min(ratio, 1.0) * width)))
              return "▓" * filled + "░" * (width - filled)

          rows = []
          for t in sorted(fleet.keys(), key=lambda x: int(x[2:])):
              info = critical_info(t)
              if info:
                  rows.append((t, info))

          overdue  = sorted([(t, i) for t, i in rows if i["status"] == "overdue"], key=lambda x: x[1]["rem"])
          warn     = sorted([(t, i) for t, i in rows if i["status"] == "warn"],    key=lambda x: x[1]["rem"])
          ok       = sorted([(t, i) for t, i in rows if i["status"] == "ok"],      key=lambda x: x[1]["rem"])
          grounded = [(t, i) for t, i in rows if i["status"] == "grounded"]

          def row_line(t, i):
              # e.g.  HD9   1494h ▓▓▓▓▓▓▓▓░░  80% エアフィルター・バッテリー点検 (あと10h)
              rem = i["rem"]
              tail = f"超過{abs(round(rem))}h" if rem <= 0 else f"あと{round(rem)}h"
              pct = min(round(i["ratio"] * 100), 999)
              return f"{t:<5} {str(i['hours'])+'h':>6} {bar(i['ratio'])} {pct:>3}% {i['task']}（{tail}）"

          WEEKDAYS = ["月", "火", "水", "木", "金", "土", "日"]
          header = f"🌅 げんきくん 朝の整備サマリー — {NOW_JST.month}/{NOW_JST.day}（{WEEKDAYS[NOW_JST.weekday()]}）"

          blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": header, "emoji": True}},
          ]

          def section_with_rows(title, items):
              body = "\n".join(row_line(t, i) for t, i in items)
              blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": f"{title}\n```{body}```"}})

          if overdue:
              section_with_rows("🔴 *整備期限超過 — 本日中の対応をお願いします🔧*", overdue)
          if warn:
              section_with_rows("🟡 *まもなく整備時期*", warn)
          if not overdue and not warn:
              blocks.append({"type": "section", "text": {"type": "mrkdwn",
                  "text": "🟢 *全車両、整備スケジュール内です！*"}})
          if ok:
              section_with_rows("🟢 *スケジュール内*", ok)
          if grounded:
              gtext = "\n".join(f"• *{t}* — {i['note']}" for t, i in grounded)
              blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": f"🟣 *整備・修理中*\n{gtext}"}})

          blocks.append({"type": "divider"})
          blocks.append({"type": "context", "elements": [{"type": "mrkdwn",
              "text": "▓ = 整備インターバル消化率 ｜ <https://geoffrey-fitzjarrell-ai.github.io/generator_servicing/|📊 ダッシュボード> ｜ 本日も安全運行をよろしくお願いします🙏"}]})

          # Plain-text fallback for notifications / clients that don't render blocks.
          fallback = f"{header} — 超過{len(overdue)}台 / まもなく{len(warn)}台 / 修理中{len(grounded)}台"

          result = slack_post({"channel": CHANNEL, "text": fallback, "blocks": blocks})
          print("Posted." if result.get("ok") else f"Failed: {result.get('error')}")
          EOF
