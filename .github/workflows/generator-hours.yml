name: Parse Generator Hours from Slack

on:
  schedule:
    - cron: '15 */3 * * *'
  workflow_dispatch:

jobs:
  parse-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Run parser
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python3 - <<'EOF'
          import os, json, re, base64, urllib.request, urllib.parse
          # --- resilient urlopen: retry transient 5xx/429/network blips ---
          import time as _t, urllib.error as _ue
          def _urlopen(request, timeout=30, _tries=4):
              for _i in range(_tries):
                  try:
                      return urllib.request.urlopen(request, timeout=timeout)
                  except _ue.HTTPError as _e:
                      if _e.code in (429, 500, 502, 503, 504) and _i < _tries - 1:
                          _t.sleep(2 ** _i); continue
                      raise
                  except _ue.URLError:
                      if _i < _tries - 1:
                          _t.sleep(2 ** _i); continue
                      raise
          from datetime import datetime, timezone, timedelta

          SLACK_TOKEN = os.environ["SLACK_TOKEN"]
          GH_TOKEN    = os.environ["GH_TOKEN"]
          CHANNEL_JP  = "C08L1TWLU14"  # always included regardless of discovery
          REPO        = "Geoffrey-Fitzjarrell-ai/generator_servicing"
          NOW         = datetime.now(timezone.utc)

          def slack_get(method, params):
              url = f"https://slack.com/api/{method}?" + urllib.parse.urlencode(params)
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {SLACK_TOKEN}"})
              with _urlopen(req) as r:
                  return json.loads(r.read())

          def slack_post(payload):
              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  "https://slack.com/api/chat.postMessage", data=data,
                  headers={"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"},
              )
              with _urlopen(req) as r:
                  return json.loads(r.read())

          def gh_get(path):
              url = f"https://api.github.com/repos/{REPO}/contents/{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
              })
              with _urlopen(req) as r:
                  resp = json.loads(r.read())
              return json.loads(base64.b64decode(resp["content"]).decode()), resp["sha"]

          def gh_put(path, content, sha, message, _retries=2):
              url = f"https://api.github.com/repos/{REPO}/contents/{path}"
              payload = {
                  "message": message,
                  "content": base64.b64encode(json.dumps(content, indent=2).encode()).decode(),
              }
              if sha:
                  payload["sha"] = sha
              req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              }, method="PUT")
              try:
                  with _urlopen(req) as r:
                      return json.loads(r.read())
              except _ue.HTTPError as e:
                  # 409 = the Cloudflare Worker's real-time path committed this same
                  # file between our read and this write. The cron used to crash here
                  # (leaving pending_completions.json uncleared and the run red);
                  # refetch the current sha and retry, matching worker.js's behavior.
                  if e.code == 409 and _retries > 0:
                      fresh_sha = None
                      try:
                          _r = urllib.request.Request(url, headers={
                              "Authorization": f"Bearer {GH_TOKEN}",
                              "Accept": "application/vnd.github+json"})
                          with _urlopen(_r) as _g:
                              fresh_sha = json.loads(_g.read())["sha"]
                      except Exception:
                          pass
                      return gh_put(path, content, fresh_sha, message, _retries - 1)
                  raise

          def get_user_info(user_id):
              resp = slack_get("users.info", {"user": user_id})
              if resp.get("ok"):
                  p = resp["user"].get("profile", {})
                  name = p.get("display_name") or p.get("real_name") or user_id
                  return {"id": user_id, "name": name}
              return {"id": user_id, "name": user_id}

          # Any channel this bot has been invited into gets covered automatically —
          # no hardcoded channel ID to update when a new one comes online. Needs the
          # channels:read scope; if that's not granted yet, falls back to just the
          # known JP channel so nothing breaks in the meantime.
          def list_bot_channels():
              found = {CHANNEL_JP}
              cursor = None
              for _ in range(5):
                  params = {"types": "public_channel,private_channel", "limit": 200,
                            "exclude_archived": "true"}
                  if cursor:
                      params["cursor"] = cursor
                  resp = slack_get("conversations.list", params)
                  if not resp.get("ok"):
                      print(f"conversations.list failed ({resp.get('error')}) — "
                            f"channels:read scope may not be granted yet; "
                            f"falling back to known channel only")
                      break
                  for ch in resp.get("channels", []):
                      if ch.get("is_member"):
                          found.add(ch["id"])
                  cursor = resp.get("response_metadata", {}).get("next_cursor")
                  if not cursor:
                      break
              return sorted(found)

          CHANNELS = list_bot_channels()
          print(f"Polling channels: {CHANNELS}")

          # HD5 (the US truck) always gets English replies; every other truck
          # keeps げんきくん's Japanese persona — same bot, same channel(s),
          # language picked per-truck rather than per-channel.
          def is_english(truck_id):
              return truck_id == "HD5"

          # ── 1. Parse generator hours from thread replies ──────────────────────
          pattern = re.compile(r'(HD\d+)\s+Generator hours:\s*(\d+(?:\.\d+)?)\s*h?', re.IGNORECASE)
          confirm_pattern = re.compile(r'^\s*(confirm|yes|correct|ok)\b', re.IGNORECASE)

          # Look back 24h for threads (shift reports may start earlier in the day),
          # but only process replies posted in the last 6h.
          oldest_threads = str((NOW - timedelta(hours=24)).timestamp())
          oldest_replies = str((NOW - timedelta(hours=24)).timestamp())

          thread_truck_pattern = re.compile(r'HD\d+', re.IGNORECASE)

          # Load data.json up front so every reading can be sanity-checked
          # against the truck's current stored hours as we go, instead of
          # only after the fact. This is what lets us kick back an
          # explanation in-thread the moment a bad reading shows up, rather
          # than silently skipping it in a CI log nobody reads (which is how
          # HD8's "11474h" typo and HD11's mislabeled-HD10 reading both sat
          # live on the dashboard for hours on 2026-07-07).
          data, sha = gh_get("data.json")
          BUFFER_HOURS = 2  # small allowance for clock skew / rounding

          def parse_dt(s):
              if not s:
                  return None
              try:
                  return datetime.strptime(s, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)
              except Exception:
                  return None

          def reject(channel, reply_ts, user_id, truck_id, reason_en, reason_jp):
              if is_english(truck_id):
                  mention = f"<@{user_id}> " if user_id else ""
                  msg = (f"Hi {mention}I checked *{truck_id}*'s hours post but couldn't record it 🙅\n"
                         f"{reason_en}\nPlease double-check the value and re-post.")
              else:
                  mention = f"<@{user_id}> さん、" if user_id else ""
                  msg = (f"げんきくんです！{mention}*{truck_id}* の稼働時間の投稿を確認しましたが、"
                         f"反映できませんでした🙅\n{reason_jp}\n"
                         f"お手数ですが、正しい値をご確認の上、再投稿をお願いします🙏")
              result = slack_post({"channel": channel, "text": msg, "thread_ts": reply_ts})
              if not result.get("ok"):
                  print(f"Failed to post rejection for {truck_id}: {result.get('error')}")

          def ack(channel, reply_ts, truck_id, hours):
              msg = (f"✅ *{truck_id}* {hours}h — recorded. Thanks!" if is_english(truck_id)
                     else f"✅ *{truck_id}* {hours}h、記録しました！ありがとうございます🙏")
              result = slack_post({"channel": channel, "text": msg, "thread_ts": reply_ts})
              if not result.get("ok"):
                  print(f"Failed to ack {truck_id}: {result.get('error')}")

          def ask_confirm(channel, reply_ts, user_id, truck_id, hours, stored, delta, elapsed_hours):
              mention = f"<@{user_id}> " if user_id else ""
              msg = (f"Hi {mention}{truck_id} posted at {hours}h — that's {delta}h more than the last "
                     f"reading ({stored}h), over about {elapsed_hours:.1f}h since the last post. It's "
                     f"been a while, so I just want to confirm before recording it.\n"
                     f"Reply \"confirm\" in this thread to accept {hours}h, or repost the correct value.")
              result = slack_post({"channel": channel, "text": msg, "thread_ts": reply_ts})
              if not result.get("ok"):
                  print(f"Failed to post confirm-prompt for {truck_id}: {result.get('error')}")

          # ── Idempotency ledger + pending-confirmation ledger ────────────────
          # `handled` — as before, every reply ts we've acted on gets skipped
          # forever after (48h prune). `pending` is new: a truck_id -> reading
          # waiting on a "confirm" reply. Shared schema with the Cloudflare
          # Worker's real-time path (bot_state.json), so either side can set
          # a pending confirmation and either side can resolve it — whichever
          # sees the "confirm" reply first wins; the other finds it already
          # cleared and skips silently.
          try:
              bot_state, state_sha = gh_get("bot_state.json")
          except Exception:
              bot_state, state_sha = {"handled": {}}, None
          handled = bot_state.get("handled", {})
          cutoff_ts = (NOW - timedelta(hours=48)).timestamp()
          handled = {ts: v for ts, v in handled.items() if float(ts) >= cutoff_ts}
          pending = bot_state.get("pending", {})
          state_dirty = False

          # Replies older than this get processed silently (no thread reply):
          # a rejection hours after the fact only confuses drivers, and on the
          # ledger's first run we must not blast replies at the whole window.
          REPLY_MAX_AGE_S = 6 * 3600

          def is_fresh(reply_ts):
              return (NOW.timestamp() - float(reply_ts)) < REPLY_MAX_AGE_S

          ADMIN_IDS = {"U07RU3LH24F", "U07P40V9SKH"}  # Geoff, TakaY
          corr_pattern = re.compile(r'(HD\d+)\s*(?:correction|修正)\s*[:：]\s*(\d+(?:\.\d+)?)\s*h?', re.IGNORECASE)

          candidates = {}   # truck_id -> {hours, user_id, channel}
          corrections = {}  # truck_id -> {hours, user_id, ts, channel}

          for CHANNEL in CHANNELS:
              all_messages = []
              cursor = None
              for _ in range(5):  # up to 5000 messages — generous ceiling for a 24h window
                  params = {"channel": CHANNEL, "oldest": oldest_threads, "limit": 1000}
                  if cursor:
                      params["cursor"] = cursor
                  hist = slack_get("conversations.history", params)
                  if not hist.get("ok"):
                      print(f"Slack error on {CHANNEL}: {hist.get('error')}")
                      break
                  all_messages.extend(hist.get("messages", []))
                  cursor = hist.get("response_metadata", {}).get("next_cursor")
                  if not cursor:
                      break
              hist = {"ok": True, "messages": all_messages}

              if not hist.get("ok"):
                  continue

              for msg in hist.get("messages", []):
                  if not msg.get("reply_count"):
                      continue
                  thread_match = thread_truck_pattern.search(msg.get("text", ""))
                  expected_truck = thread_match.group(0).upper() if thread_match else None
                  replies = slack_get("conversations.replies", {
                      "channel": CHANNEL, "ts": msg["ts"],
                      "oldest": oldest_replies, "limit": 200,
                  })
                  if not replies.get("ok"):
                      continue
                  for reply in replies.get("messages", []):
                      rts = reply["ts"]
                      if rts == msg["ts"]:
                          continue  # skip parent message
                      if rts in handled:
                          continue  # already acted on in a previous run
                      text    = reply.get("text", "")
                      user_id = reply.get("user")

                      # ── Confirmation reply for a pending long-gap reading ──
                      # Checked before the hours/correction patterns since a
                      # bare "confirm" won't match either of those.
                      cfm = confirm_pattern.match(text)
                      if cfm and not pattern.search(text):
                          matched_truck = None
                          for tid, p in pending.items():
                              if p.get("thread_ts") == msg["ts"] and \
                                 (user_id == p.get("user_id") or user_id in ADMIN_IDS):
                                  matched_truck = tid
                                  break
                          if matched_truck:
                              p = pending.pop(matched_truck)
                              corrections[matched_truck] = {"hours": p["hours"], "user_id": p["user_id"],
                                                            "ts": rts, "channel": CHANNEL,
                                                            "confirmed": True, "prev": p.get("prev")}
                              handled[rts] = "confirmed"; state_dirty = True
                              continue

                      # ── Correction override ───────────────────────────
                      # "HDXX correction: XXXXh" / "HDXX 修正: XXXXh" from
                      # anyone bypasses both validation rules. Needed for
                      # typo fixes (HD8's 11474→1474 on 7/7 would otherwise
                      # be un-postable, since the real value is *lower* than
                      # the bad stored one) and for hour-meter resets after
                      # a generator swap (e.g. HD17 coming back from repair).
                      cm = corr_pattern.search(text)
                      if cm:
                          truck_id = cm.group(1).upper()
                          corrections[truck_id] = {"hours": round(float(cm.group(2))),
                                                   "user_id": user_id, "ts": rts, "channel": CHANNEL}
                          handled[rts] = "corrected"; state_dirty = True
                          continue

                      for m in pattern.finditer(text):
                          truck_id = m.group(1).upper()
                          hours    = round(float(m.group(2)))

                          if expected_truck and truck_id != expected_truck:
                              print(f"REJECT wrong-thread: {truck_id} posted in "
                                    f"{expected_truck}'s thread (ts={rts})")
                              if is_fresh(rts):
                                  reject(CHANNEL, rts, user_id, truck_id,
                                         f"This post is in *{expected_truck}*'s thread, but the hours "
                                         f"are for *{truck_id}*. Possibly the wrong truck name was typed.",
                                         f"この投稿は *{expected_truck}* のスレッド内にありますが、"
                                         f"内容は *{truck_id}* の稼働時間になっています。"
                                         f"トラック名の入力間違いの可能性があります。")
                              handled[rts] = "rejected"; state_dirty = True
                              continue

                          stored_entry = data.get(truck_id) or {}
                          stored = stored_entry.get("hours")
                          last_dt = parse_dt(stored_entry.get("lastUpdated"))

                          if stored is not None and hours == stored:
                              # Same value already on record. Two ways in:
                              #  (a) The Cloudflare Worker's real-time sync already
                              #      wrote THIS reply's value to data.json before we
                              #      ran. The Worker's write lands within seconds of
                              #      the post, so lastUpdated ~= reply ts and postedBy
                              #      matches the reply author. The driver still needs
                              #      an ack — without this, every Worker-synced post
                              #      is silently swallowed here (the 2026-07-08/09
                              #      missing-confirmation bug).
                              #  (b) A genuine duplicate / re-post of an old value —
                              #      stays silent, as before.
                              synced_by_worker = (
                                  last_dt is not None
                                  and abs(float(rts) - last_dt.timestamp()) < 180
                                  and (stored_entry.get("postedBy") or {}).get("id") == user_id
                              )
                              if synced_by_worker and is_fresh(rts):
                                  ack(CHANNEL, rts, truck_id, hours)
                              handled[rts] = "accepted"; state_dirty = True
                              continue

                          if stored is not None and hours < stored:
                              if user_id in ADMIN_IDS:
                                  # Admin plain-format post that fails the floor
                                  # check = treat as a correction (this is exactly
                                  # how Geoff posted the HD8 fix on 7/7).
                                  corrections[truck_id] = {"hours": hours, "user_id": user_id, "ts": rts,
                                                           "channel": CHANNEL}
                                  handled[rts] = "corrected"; state_dirty = True
                                  continue
                              print(f"REJECT {truck_id}: {hours}h below stored {stored}h")
                              if is_fresh(rts):
                                  reject(CHANNEL, rts, user_id, truck_id,
                                         f"Posted: {hours}h / On record: {stored}h\nThe posted value is "
                                         f"lower than what's on record — could be a stale reading or the "
                                         f"wrong truck.",
                                         f"投稿値: {hours}h ／ 現在の記録値: {stored}h\n"
                                         f"記録されている値より低いため、古い読み取りやトラック名の"
                                         f"入力間違いの可能性があります。\n"
                                         f"※値の修正が必要な場合は「{truck_id} 修正: 正しい値h」の"
                                         f"形式で投稿してください。")
                              handled[rts] = "rejected"; state_dirty = True
                              continue

                          if stored is not None and last_dt is not None:
                              elapsed_hours = (NOW - last_dt).total_seconds() / 3600
                              delta = hours - stored
                              if delta > elapsed_hours + BUFFER_HOURS:
                                  if user_id in ADMIN_IDS:
                                      corrections[truck_id] = {"hours": hours, "user_id": user_id, "ts": rts,
                                                               "channel": CHANNEL}
                                      handled[rts] = "corrected"; state_dirty = True
                                      continue

                                  # HD5 leniency: long gaps between posts are routine
                                  # for a truck that isn't posting every shift, so ask
                                  # the poster to confirm instead of hard-rejecting.
                                  if is_english(truck_id):
                                      pending[truck_id] = {"hours": hours, "user_id": user_id,
                                                           "thread_ts": msg["ts"], "prev": stored}
                                      state_dirty = True
                                      if is_fresh(rts):
                                          ask_confirm(CHANNEL, rts, user_id, truck_id, hours, stored,
                                                     delta, elapsed_hours)
                                      handled[rts] = "pending_confirm"; state_dirty = True
                                      continue

                                  print(f"REJECT {truck_id}: +{delta}h in {elapsed_hours:.1f}h elapsed")
                                  if is_fresh(rts):
                                      reject(CHANNEL, rts, user_id, truck_id,
                                             None,
                                             f"投稿値: {hours}h ／ 現在の記録値: {stored}h（増加量: {delta}h）\n"
                                             f"前回の更新から経過した時間は約{elapsed_hours:.1f}時間のため、"
                                             f"増加量が経過時間を超えており、発電機の稼働時間としては"
                                             f"あり得ません。トラック名や数値の入力間違いの可能性があります。\n"
                                             f"※値の修正が必要な場合は「{truck_id} 修正: 正しい値h」の"
                                             f"形式で投稿してください。")
                                  handled[rts] = "rejected"; state_dirty = True
                                  continue

                          # Valid reading — ack it so the driver knows it
                          # landed (short in-thread thank-you; no new Slack
                          # scope needed, unlike an emoji reaction).
                          if is_fresh(rts):
                              ack(CHANNEL, rts, truck_id, hours)
                          handled[rts] = "accepted"; state_dirty = True
                          # keep highest valid value seen across all replies this run
                          if truck_id not in candidates or hours > candidates[truck_id]["hours"]:
                              candidates[truck_id] = {"hours": hours, "user_id": user_id, "channel": CHANNEL}

          # ── Apply corrections (skip daily deltas for genuine typo/reset
          #    fixes — the previous stored value was wrong, so a delta
          #    against it is meaningless. Confirmed HD5 long-gap readings
          #    are different: the previous value was correct, the gap was
          #    just longer than usual, so that delta IS real runtime and
          #    gets tracked below alongside the candidates' deltas.)
          confirmed_deltas = {}  # truck_id -> real runtime credited via confirm, not correction
          if corrections:
              for truck_id, info in corrections.items():
                  old = (data.get(truck_id) or {}).get("hours")
                  user_info = get_user_info(info["user_id"]) if info.get("user_id") else {"id": None, "name": None}
                  if truck_id not in data:
                      data[truck_id] = {"hours": None, "intervalStart": 0, "overdue": False,
                                        "technician": "", "lastUpdated": None, "postedBy": None}
                  data[truck_id]["hours"]       = info["hours"]
                  data[truck_id]["lastUpdated"] = NOW.strftime("%Y-%m-%dT%H:%M:%SZ")
                  data[truck_id]["postedBy"]    = user_info
                  if info.get("confirmed") and old is not None and info["hours"] > old:
                      confirmed_deltas[truck_id] = info["hours"] - old
                  verb = "CONFIRMED" if info.get("confirmed") else "CORRECTED"
                  print(f"{verb} {truck_id}: {old}h -> {info['hours']}h by {user_info['name']}")
                  if is_fresh(info["ts"]):
                      if info.get("confirmed"):
                          msg = f"✅ {truck_id} confirmed at {info['hours']}h — recorded. Thanks!"
                      elif is_english(truck_id):
                          msg = (f"Corrected *{truck_id}*'s hours 🔧\n"
                                 f"{old}h → *{info['hours']}h*\nThanks for the update!")
                      else:
                          msg = (f"げんきくんです！*{truck_id}* の稼働時間を修正しました🔧\n"
                                 f"{old}h → *{info['hours']}h*\nご報告ありがとうございます！")
                      slack_post({"channel": info.get("channel", CHANNEL_JP), "text": msg,
                                 "thread_ts": info["ts"]})
              gh_put("data.json", data, sha,
                     f"fix: hour corrections {NOW.strftime('%Y-%m-%d %H:%M UTC')}")
              data, sha = gh_get("data.json")  # refresh sha for the candidates write below

          daily_deltas = dict(confirmed_deltas)  # merged with candidates' deltas below
          changed = bool(confirmed_deltas)

          if candidates:
              for truck_id, info in candidates.items():
                  stored = (data.get(truck_id) or {}).get("hours") or 0
                  if info["hours"] <= stored:
                      print(f"Skip {truck_id}: {info['hours']}h not higher than stored {stored}h")
                      continue
                  user_info = get_user_info(info["user_id"]) if info.get("user_id") else {"id": None, "name": None}
                  if truck_id not in data:
                      data[truck_id] = {"hours": None, "intervalStart": 0, "overdue": False,
                                        "technician": "", "lastUpdated": None, "postedBy": None}
                  daily_deltas[truck_id] = daily_deltas.get(truck_id, 0) + (info["hours"] - stored)
                  data[truck_id]["hours"]       = info["hours"]
                  data[truck_id]["lastUpdated"] = NOW.strftime("%Y-%m-%dT%H:%M:%SZ")
                  data[truck_id]["postedBy"]    = user_info
                  changed = True
                  print(f"Updated {truck_id}: {info['hours']}h by {user_info['name']}")
              if changed:
                  gh_put("data.json", data, sha,
                         f"chore: update generator hours {NOW.strftime('%Y-%m-%d %H:%M UTC')}")
          elif not confirmed_deltas:
              print("No generator-hour replies found.")

          if changed and daily_deltas:
              # Track daily runtime for the dashboard's "Daily Hours" bar chart.
              # Accumulates multiple same-day syncs into one bar; keeps a rolling window.
              try:
                  daily, daily_sha = gh_get("daily_hours.json")
              except Exception:
                  daily, daily_sha = {}, None
              today_str = NOW.strftime("%Y-%m-%d")
              today_d   = NOW.date()
              for truck_id, delta in daily_deltas.items():
                  if truck_id not in daily:
                      daily[truck_id] = []
                  entries = daily[truck_id]
                  last_d = None
                  if entries:
                      try:
                          last_d = datetime.strptime(entries[-1]["date"], "%Y-%m-%d").date()
                      except Exception:
                          pass
                  gap = (today_d - last_d).days if last_d else 0
                  if entries and entries[-1]["date"] == today_str:
                      entries[-1]["hours"] = round(entries[-1]["hours"] + delta, 1)
                  elif gap > 1 and delta > 0:
                      # Delta accumulated over a multi-day posting gap — spread at the
                      # true daily average instead of booking it all on one date
                      # (mirrors worker.js bumpDailyHours; HD15 +32h/3-day incident).
                      per = delta / gap
                      n = min(gap, 14)
                      total = round(per * n, 1)
                      acc = 0.0
                      for i in range(n - 1, -1, -1):
                          d = today_d - timedelta(days=i)
                          h = round(total - acc, 1) if i == 0 else round(per, 1)
                          entries.append({"date": d.strftime("%Y-%m-%d"), "hours": h})
                          acc = round(acc + h, 1)
                  else:
                      entries.append({"date": today_str, "hours": round(delta, 1)})
                  daily[truck_id] = entries[-14:]  # keep a small rolling buffer past the 7 shown
              gh_put("daily_hours.json", daily, daily_sha,
                     f"chore: track daily hours {NOW.strftime('%Y-%m-%d %H:%M UTC')}")

          # ── 2. Process pending completions ────────────────────────────────────
          # Task label -> log key, must mirror the TASKS array in index.html exactly.
          TASK_NAME_TO_KEY = {
              "Air filter & battery check": "airfilter_battery",
              "Oil / filter change":        "oil_filter",
              "Air filter cleaning":        "airfilter_clean",
              "Check coolant lines":        "coolant_lines",
              "Fuel filter change":         "fuel_filter",
              "Check drive belt & tension": "drive_belt",
              "Clean radiator":             "clean_radiator",
              "Change air filter":          "airfilter_500",
          }

          # Same root-cause fix as worker.js: mention the technician who
          # actually did the work, not postedBy (whoever last posted the
          # truck's hours — often a driver, unrelated to who serviced it).
          # Exact-match only, never fuzzy — an unmapped name prints as plain
          # bold text instead of ever guessing at the wrong person.
          TECHNICIAN_SLACK_IDS = {
              "geoff fitzjarrell": "U07RU3LH24F",
              "masakiyo":           "U0BBE3JUHUY",
              "masakiyo kato":      "U0BBE3JUHUY",
              "jake albano":        "U0779MALYKY",
              "thapa biliv":        "U0AFM5Z1GUA",
              "reon zeniya":        "U0AV3PG35JM",
          }

          def technician_mention(name):
              if not name:
                  return None
              return TECHNICIAN_SLACK_IDS.get(name.strip().lower())

          try:
              pending, p_sha = gh_get("pending_completions.json")
          except Exception:
              pending, p_sha = [], None

          if pending:
              # IMPORTANT: this is a *safety net*. The dashboard (worker.js
              # logCompletion) is expected to have already written service_logs.json
              # and service_history.json at the moment Geoff hits "Save". That write
              # can fail silently client-side (network blip, sha conflict, closed
              # laptop lid, etc.) while the pending-completion notification still
              # goes through — which is exactly how HD9's 2026-07-04 completion got
              # lost: it was logged here, then wiped by this job with only a Slack
              # ping and no promotion to history. Every entry is now checked against
              # service_logs.json and (re)promoted if it isn't already reflected
              # there, before we ever clear pending_completions.json.
              logs, logs_sha = gh_get("service_logs.json")
              hist, hist_sha = gh_get("service_history.json")
              logs_changed = False
              hist_changed = False

              for entry in pending:
                  truck   = entry.get("truck", "")
                  tasks   = entry.get("tasks", [])
                  hours   = entry.get("hours")
                  already_logged = entry.get("alreadyLogged", False)

                  # Determine which of the named tasks are NOT yet reflected in
                  # service_logs.json at >= this entry's hours. Old-format entries
                  # (like HD9's) have no "hours" field at all, so fall back to
                  # "any task missing an equal/newer log" -> needs promotion.
                  needs_promotion = not already_logged
                  if needs_promotion and truck and hours:
                      truck_logs = logs.get(truck, {})
                      keys = [TASK_NAME_TO_KEY[t] for t in tasks if t in TASK_NAME_TO_KEY]
                      if keys and all(truck_logs.get(k, -1) >= hours for k in keys):
                          needs_promotion = False  # dashboard write already succeeded

                  if needs_promotion and truck and tasks:
                      keys = [(TASK_NAME_TO_KEY[t], t) for t in tasks if t in TASK_NAME_TO_KEY]
                      unmapped = [t for t in tasks if t not in TASK_NAME_TO_KEY]
                      if unmapped:
                          print(f"WARNING: unmapped task label(s) for {truck}: {unmapped} — "
                                f"not promoted, check TASK_NAME_TO_KEY vs index.html TASKS")
                      if keys and hours:
                          if truck not in logs:
                              logs[truck] = {}
                          for key, _label in keys:
                              logs[truck][key] = hours
                          logs_changed = True

                          if truck not in hist:
                              hist[truck] = []
                          user_notes = [str(n)[:300] for n in (entry.get("notes") or []) if n][:5]
                          hist[truck].append({
                              "date": NOW.strftime("%Y-%m-%d"),
                              "hours": hours,
                              "technician": entry.get("technician") or "",
                              "tasks": [{"key": k, "label": l} for k, l in keys],
                              "notes": user_notes + ["Promoted by cron safety-net (dashboard write "
                                        "did not land before this run)."],
                          })
                          hist_changed = True
                          print(f"Promoted {truck}: {[k for k,_ in keys]} at {hours}h "
                                f"(was stuck in pending_completions.json)")
                      elif not hours:
                          print(f"WARNING: {truck} pending entry has no 'hours' field, "
                                f"cannot promote automatically — needs manual fix: {entry}")

                  # The Worker now fires this same notification immediately when the
                  # entry is first logged (see worker.js logPending). This is only a
                  # fallback for entries the Worker couldn't notify for at the time
                  # (e.g. Slack was down, or SLACK_TOKEN wasn't set yet on the Worker).
                  if entry.get("notified"):
                      print(f"Skip Slack notify for {truck}: already notified immediately by worker")
                  else:
                      technician_name = entry.get("technician")
                      tech_id = technician_mention(technician_name)
                      who = (f"<@{tech_id}> さん、" if tech_id
                             else (f"*{technician_name}* さん、" if technician_name else ""))
                      task_list = "\n".join(f"• {t}" for t in tasks)
                      text = (f"げんきくんです！{who}*{truck}* で以下の作業が"
                              f"完了したことを確認しました🔧✨\n"
                              f"{task_list}\n"
                              f"担当してくれた技術者さん、いつも素晴らしい仕事をありがとうございます、"
                              f"お疲れ様でした！")
                      result = slack_post({"channel": entry.get("channel", CHANNEL_JP), "text": text})
                      if result.get("ok"):
                          print(f"Notified re: {truck} ({len(tasks)} task(s)), "
                                f"technician={technician_name or 'unattributed'}")
                      else:
                          print(f"Failed to notify re: {truck}: {result.get('error')}")

              if logs_changed:
                  gh_put("service_logs.json", logs, logs_sha,
                         f"chore: cron safety-net promotion {NOW.strftime('%Y-%m-%d %H:%M UTC')}")
              if hist_changed:
                  gh_put("service_history.json", hist, hist_sha,
                         f"chore: cron safety-net promotion {NOW.strftime('%Y-%m-%d %H:%M UTC')}")

              if p_sha:
                  gh_put("pending_completions.json", [], p_sha,
                         f"chore: clear pending completions {NOW.strftime('%Y-%m-%d %H:%M UTC')}")
              print(f"Processed {len(pending)} completion entry(s).")
          else:
              print("No pending completions.")

          # ── Persist idempotency + pending-confirmation ledgers ──────────
          if state_dirty or bot_state.get("handled") != handled or bot_state.get("pending") != pending:
              bot_state["handled"] = handled
              bot_state["pending"] = pending
              if state_sha:
                  gh_put("bot_state.json", bot_state, state_sha,
                         f"chore: bot reply ledger {NOW.strftime('%Y-%m-%d %H:%M UTC')}")
              else:
                  # first run: create the file (no sha)
                  url = f"https://api.github.com/repos/{REPO}/contents/bot_state.json"
                  payload = {"message": "chore: create bot reply ledger",
                             "content": base64.b64encode(json.dumps(bot_state, indent=2).encode()).decode()}
                  req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={
                      "Authorization": f"Bearer {GH_TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                  }, method="PUT")
                  with _urlopen(req) as r:
                      r.read()
              print(f"Ledger saved: {len(handled)} handled ts, {len(pending)} pending")

          EOF

      - name: Reconcile hours ledger (self-heal impossible jumps)
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python3 - <<'PYEOF'
          import os, json, base64, urllib.request, urllib.error
          # --- resilient urlopen: retry transient 5xx/429/network blips ---
          import time as _t, urllib.error as _ue
          def _urlopen(request, timeout=30, _tries=4):
              for _i in range(_tries):
                  try:
                      return urllib.request.urlopen(request, timeout=timeout)
                  except _ue.HTTPError as _e:
                      if _e.code in (429, 500, 502, 503, 504) and _i < _tries - 1:
                          _t.sleep(2 ** _i); continue
                      raise
                  except _ue.URLError:
                      if _i < _tries - 1:
                          _t.sleep(2 ** _i); continue
                      raise

          GH_TOKEN    = os.environ["GH_TOKEN"]
          SLACK_TOKEN = os.environ["SLACK_TOKEN"]
          REPO        = "Geoffrey-Fitzjarrell-ai/generator_servicing"
          GEOFF_UID   = "U07RU3LH24F"
          MAX_ABS_JUMP = 48            # mirrors the Worker's absolute ceiling
          EN_TRUCKS    = {"HD5"}       # exempt: long transit gaps make big real jumps

          def gh_get(path):
              url = f"https://api.github.com/repos/{REPO}/contents/{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json"})
              try:
                  with _urlopen(req) as r:
                      resp = json.loads(r.read())
                  return json.loads(base64.b64decode(resp["content"]).decode()), resp["sha"]
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      return None, None
                  raise

          def gh_put(path, content, sha, message, _retries=2):
              url = f"https://api.github.com/repos/{REPO}/contents/{path}"
              payload = {"message": message,
                         "content": base64.b64encode(json.dumps(content, indent=2).encode()).decode()}
              if sha:
                  payload["sha"] = sha
              req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"}, method="PUT")
              try:
                  with _urlopen(req) as r:
                      r.read()
              except _ue.HTTPError as e:
                  # 409 = concurrent Worker write; refetch sha and retry (see parser step).
                  if e.code == 409 and _retries > 0:
                      fresh_sha = None
                      try:
                          _r = urllib.request.Request(url, headers={
                              "Authorization": f"Bearer {GH_TOKEN}",
                              "Accept": "application/vnd.github+json"})
                          with _urlopen(_r) as _g:
                              fresh_sha = json.loads(_g.read())["sha"]
                      except Exception:
                          pass
                      return gh_put(path, content, fresh_sha, message, _retries - 1)
                  raise

          def slack_dm(text):
              payload = {"channel": GEOFF_UID, "text": text}
              req = urllib.request.Request("https://slack.com/api/chat.postMessage",
                  data=json.dumps(payload).encode(),
                  headers={"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"})
              with _urlopen(req) as r:
                  return json.loads(r.read())

          data, data_sha = gh_get("data.json")
          ledger, led_sha = gh_get("hours_ledger.json")
          if ledger is None:
              ledger = {}

          reverts = []
          for truck, entry in data.items():
              if not isinstance(entry, dict):
                  continue
              cur = entry.get("hours")
              if cur is None:
                  continue
              prev = ledger.get(truck)
              if truck not in EN_TRUCKS and prev is not None and (cur - prev) > MAX_ABS_JUMP:
                  entry["hours"] = prev                       # self-heal: revert to last good
                  reverts.append((truck, cur, prev))
              else:
                  ledger[truck] = cur                         # accept as new last-good

          if reverts:
              lines = "\n".join(f"• {t}: reverted {c}h → {p}h (+{c-p}h, over ceiling)" for t, c, p in reverts)
              gh_put("data.json", data, data_sha,
                     "Reconcile: auto-revert impossible jump(s) " +
                     ", ".join(t for t, _, _ in reverts))
              slack_dm(f"⚠️ Reconciliation reverted an impossible hours jump:\n{lines}\n"
                       f"Likely a stale-Worker write or a typo that slipped through. "
                       f"If any value is actually correct, post `HDXX correction: NNNh`.")
              print(f"Reverted: {reverts}")

          # ledger.json always saved (bootstraps on first run, tracks last-good after)
          gh_put("hours_ledger.json", ledger, led_sha,
                 "chore: update hours reconciliation ledger")
          print(f"Ledger tracks {len(ledger)} trucks; {len(reverts)} reverts this run")
          PYEOF
