<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD GEN2 · Generator Service Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080b12; --surface:#0d1117; --surface2:#131925; --surface3:#1a2235;
  --border:#1e2840; --border2:#28364f;
  --amber:#f0a500; --amber-dim:#3d2900; --amber-glow:rgba(240,165,0,0.12);
  --red:#e04545; --red-dim:#3a1010; --red-glow:rgba(224,69,69,0.12);
  --green:#3da870; --green-dim:#0f2e1e;
  --blue:#4a7cf5; --blue-dim:#101e40;
  --text:#dde4f0; --text-dim:#6e7f99; --text-faint:#38465a;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif; --radius:6px;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); background-image:url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.8' fill='%23ffffff06'/%3E%3C/svg%3E"); }


.header { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:52px; background:var(--surface); border-bottom:1px solid var(--border); position:relative; }
.header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--blue) 40%,var(--amber) 60%,transparent); opacity:0.3; }
.header-brand { display:flex; align-items:center; gap:12px; }
.header-badge { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.18em; color:var(--bg); background:var(--amber); padding:3px 8px; border-radius:3px; }
.header-title { font-size:13px; color:var(--text-dim); letter-spacing:0.04em; }
.header-right { display:flex; align-items:center; gap:12px; }
.sync-dot { width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s ease-in-out infinite; display:inline-block; margin-right:6px; }
.data-age { font-family:var(--mono); font-size:9px; letter-spacing:0.08em; padding:3px 9px; border-radius:3px; text-transform:uppercase; background:var(--green-dim); color:var(--green); border:1px solid transparent; }
.data-age.warn { background:var(--amber-dim); color:var(--amber); }
.data-age.stale { background:var(--red-dim); color:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sync-time { font-family:var(--mono); font-size:11px; color:var(--text-faint); letter-spacing:0.06em; }
.btn-ghost { font-family:var(--mono); font-size:10px; letter-spacing:0.08em; padding:5px 12px; background:transparent; color:var(--text-dim); border:1px solid var(--border2); border-radius:var(--radius); cursor:pointer; transition:all 0.15s; text-transform:uppercase; }
.btn-ghost:hover { border-color:var(--blue); color:var(--blue); }

/* FLEET OVERVIEW BAR */
.fleet-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 24px 12px; }
.fleet-bar-title { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); margin-bottom:8px; text-align:center; }
.fleet-chart { display:flex; flex-direction:column; gap:6px; }
.fleet-row { display:flex; align-items:center; gap:10px; }
.fleet-row-lbl { font-size:10px; color:var(--text-dim); letter-spacing:0.05em; width:60px; flex-shrink:0; text-align:right; font-family:var(--mono); }
.fleet-row-track { flex:1; height:12px; background:#1a2235; border-radius:4px; overflow:hidden; border:1px solid var(--border2); }
.fleet-row-fill { height:100%; border-radius:3px; animation:barGrow 0.8s cubic-bezier(0.22,1,0.36,1) both; position:relative; }
.fleet-row-fill::after { content:''; position:absolute; right:0; top:0; bottom:0; width:3px; border-radius:0 3px 3px 0; background:rgba(255,255,255,0.2); }
@keyframes barGrow { from{width:0%} }
.fleet-row-fill.fs-overdue  { background:linear-gradient(90deg,#8b1f1f,var(--red)); }
.fleet-row-fill.fs-warn     { background:linear-gradient(90deg,#7a5010,var(--amber)); }
.fleet-row-fill.fs-ok       { background:linear-gradient(90deg,#0f4028,var(--green)); }
.fleet-row-fill.fs-grounded { background:linear-gradient(90deg,#2a1845,#7060a0); }
.fleet-row-pct { font-family:var(--mono); font-size:11px; font-weight:700; width:36px; flex-shrink:0; text-align:right; }
.fs-overdue  .fleet-row-pct { color:var(--red); }
.fs-warn     .fleet-row-pct { color:var(--amber); }
.fs-ok       .fleet-row-pct { color:var(--green); }
.fs-grounded .fleet-row-pct { color:#9880cc; }

/* SERVICE LOOKUP */
.service-lookup { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px 14px; }
.service-lookup-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.service-lookup-title { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); flex-shrink:0; }
.service-select { font-family:var(--mono); font-size:11px; letter-spacing:0.03em; padding:6px 10px; background:var(--surface2); color:var(--text); border:1px solid var(--border2); border-radius:var(--radius); cursor:pointer; flex:1; max-width:340px; }
.service-select:focus { outline:none; border-color:var(--blue); }
.svc-grid { display:flex; flex-wrap:wrap; gap:8px; animation:statPop 0.25s cubic-bezier(0.22,1,0.36,1) both; }
.svc-card { width:104px; padding:10px 10px 9px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; position:relative; overflow:hidden; transition:background 0.15s, transform 0.15s; }
.svc-card:hover { background:var(--surface3); transform:translateY(-1px); }
.svc-card-bar { position:absolute; top:0; left:0; right:0; height:2px; }
.svc-card-name { font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:0.05em; color:var(--text); margin-bottom:6px; }
.svc-gauge { width:100%; height:8px; display:block; margin-bottom:6px; }
.svc-gauge-fill { transition:width 0.3s ease; }
.svc-card-sub { font-family:var(--mono); font-size:9.5px; color:var(--text-faint); letter-spacing:0.02em; line-height:1.3; }

/* TRUCK STRIP */
.truck-strip { display:flex; background:var(--surface); border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
.truck-strip::-webkit-scrollbar { display:none; }
.truck-tab { flex:1; min-width:80px; padding:12px 8px 14px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; border-right:1px solid var(--border); position:relative; transition:background 0.15s, transform 0.15s; }
.truck-tab::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--text-faint); transition:background 0.3s, box-shadow 0.3s; }
.truck-tab:last-child { border-right:none; }
.truck-tab:hover:not(.active) { background:var(--surface2); transform:translateY(-1px); }
.truck-tab.active { background:var(--surface2); transform:translateY(-1px); }
.truck-tab.active::before { background:var(--amber); box-shadow:0 0 8px var(--amber); }
.truck-tab.st-overdue::before { background:var(--red); box-shadow:0 0 8px var(--red); }
.truck-tab.st-warn::before { background:var(--amber); }
.truck-tab.st-ok::before { background:var(--green); }
.truck-tab.st-grounded::before { background:#7060a0; box-shadow:0 0 8px #7060a0; }
.truck-tab.st-grounded .truck-name { color:#9880cc; }
.truck-tab.st-grounded .truck-hours-badge { color:#4a3a66; }
.truck-name { font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:0.06em; color:var(--text-dim); transition:color 0.2s; }
.truck-tab.active .truck-name { color:var(--amber); }
.truck-tab.st-overdue .truck-name { color:var(--red); }
.truck-hours-badge { font-family:var(--mono); font-size:11px; color:var(--text-faint); }

/* MAIN */
.main { display:grid; grid-template-columns:340px 1fr; height:calc(100vh - 108px); }

/* LEFT */
.left-panel { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; padding:24px 20px; transition:box-shadow 0.5s; }
.left-panel.is-overdue { animation:overdueGlow 2.8s ease-in-out infinite; }
@keyframes overdueGlow { 0%,100%{box-shadow:inset -1px 0 0 var(--border)} 50%{box-shadow:inset -1px 0 30px rgba(224,69,69,0.18),inset 0 0 40px rgba(224,69,69,0.07)} }

.truck-header { margin-bottom:20px; }
.truck-id { font-family:var(--mono); font-size:32px; font-weight:700; letter-spacing:0.1em; line-height:1; transition:color 0.3s; }
.truck-sub { font-size:10px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; }

.gauge-wrap { width:100%; margin-bottom:10px; }
.gauge-label { font-family:var(--mono); font-size:9px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }

.stat-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; position:relative; overflow:hidden; transition:border-color 0.3s; animation:statPop 0.35s cubic-bezier(0.22,1,0.36,1) both; }
.stat-card:nth-child(2) { animation-delay:0.08s; }
@keyframes statPop { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
.stat-card::before { content:''; position:absolute; top:0; left:0; bottom:0; width:2px; }
.stat-card.s-ok::before { background:var(--green); }
.stat-card.s-warn::before { background:var(--amber); }
.stat-card.s-overdue::before { background:var(--red); }
.stat-card.s-neutral::before { background:var(--border2); }
.stat-lbl { font-size:11px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.stat-val { font-family:var(--mono); font-size:22px; font-weight:700; line-height:1; transition:color 0.3s; }
.stat-val .unit { font-size:11px; font-weight:400; color:var(--text-dim); margin-left:2px; }
.stat-val.c-overdue{color:var(--red)} .stat-val.c-warn{color:var(--amber)} .stat-val.c-ok{color:var(--green)}
.due-list { margin-top:4px; }
.due-tag { font-size:13px; padding:2px 0; border-bottom:1px solid var(--border); color:var(--text-dim); line-height:1.6; }
.due-tag:last-child { border-bottom:none; }

/* DUE SOON BANNER */
.due-soon-banner {
  padding:10px 12px; border-radius:var(--radius); margin-bottom:14px;
  background:#2a1e00; border:1px solid rgba(240,165,0,0.3);
  display:flex; gap:10px; align-items:flex-start;
}
.due-soon-icon { color:var(--amber); font-size:13px; margin-top:1px; }
.due-soon-body { flex:1; }
.due-soon-title { font-family:var(--mono); font-size:10px; font-weight:700; color:var(--amber); letter-spacing:0.08em; margin-bottom:4px; }
.due-soon-item { font-size:11px; color:#ffe4a0; line-height:1.6; }
 padding:10px 12px; border-radius:var(--radius); margin-bottom:14px; background:var(--red-dim); border:1px solid rgba(224,69,69,0.3); display:flex; gap:10px; align-items:flex-start; animation:shake 0.55s cubic-bezier(0.36,0.07,0.19,0.97) 0.2s both; }
@keyframes shake { 0%{transform:translateX(0)} 15%{transform:translateX(-7px)} 30%{transform:translateX(6px)} 45%{transform:translateX(-4px)} 60%{transform:translateX(3px)} 100%{transform:translateX(0)} }
.attention-icon { color:var(--red); font-size:13px; margin-top:1px; }
.attention-msg { font-size:11px; color:#ffc8c8; line-height:1.5; }

.grounded-banner { padding:16px; border-radius:var(--radius); margin-bottom:14px; background:#1a1228; border:1px solid #7060a0; display:flex; flex-direction:column; gap:6px; animation:flicker 5s ease-in-out infinite, groundedBreath 3s ease-in-out infinite; }
@keyframes flicker { 0%,89%,100%{opacity:1} 90%{opacity:0.35} 91%{opacity:1} 93%{opacity:0.5} 94%{opacity:1} 96%{opacity:0.7} 97%{opacity:1} }
@keyframes groundedBreath { 0%,100%{box-shadow:0 0 0 rgba(112,96,160,0)} 50%{box-shadow:0 0 14px rgba(112,96,160,0.35)} }
.grounded-title { font-family:var(--mono); font-size:12px; font-weight:700; color:#9880cc; letter-spacing:0.1em; }
.grounded-note { font-size:11px; color:#6a5a88; line-height:1.5; }

.reporter { padding:10px 12px; border-radius:var(--radius); background:var(--surface2); border:1px solid var(--border); }
.reporter-lbl { font-size:9px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.reporter-name { font-size:14px; color:var(--text-dim); font-weight:500; }
.reporter-time { font-family:var(--mono); font-size:9px; color:var(--text-faint); margin-top:2px; }

/* RIGHT */
.right-panel { display:flex; flex-direction:column; overflow-y:auto; padding:20px 24px; gap:20px; position:relative; }
.section-title { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:2px; }

/* TASKS */
.task-list { display:flex; flex-direction:column; gap:4px; }
.task-row { display:grid; grid-template-columns:1fr 56px 90px 72px 28px; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius); background:var(--surface2); border:1px solid var(--border); border-left-width:3px; border-left-color:var(--border2); transition:background 0.12s; animation:slideInRight 0.28s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.task-row:nth-child(1){animation-delay:0.04s} .task-row:nth-child(2){animation-delay:0.08s} .task-row:nth-child(3){animation-delay:0.12s} .task-row:nth-child(4){animation-delay:0.16s} .task-row:nth-child(5){animation-delay:0.20s} .task-row:nth-child(6){animation-delay:0.24s} .task-row:nth-child(7){animation-delay:0.28s}
.task-row:hover { background:var(--surface3); }
.task-row.r-overdue { border-left-color:var(--red); background:#160d0d; }
.task-row.r-warn    { border-left-color:var(--amber); }
.task-row.r-ok      { border-left-color:var(--green); }
.task-row.r-no_record { border-left-color:#1e3050; }
.task-name { font-size:14px; color:var(--text); }
.task-name-wrap { display:flex; flex-direction:column; gap:3px; min-width:0; }
.task-mini-bar { width:100%; height:4px; display:block; }
.task-interval { font-family:var(--mono); font-size:12px; color:var(--text-faint); }
.badge { font-family:var(--mono); font-size:11px; font-weight:700; padding:3px 7px; border-radius:3px; text-align:center; letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap; transition:background 0.3s, color 0.3s; }
.badge.ok        { background:var(--green-dim); color:var(--green); }
.badge.warn      { background:var(--amber-dim); color:var(--amber); }
.badge.overdue   { background:var(--red-dim);   color:var(--red); animation:overdueFlash 2.2s ease-in-out infinite; }
@keyframes overdueFlash { 0%,100%{opacity:1} 50%{opacity:0.45} }
.badge.no_record { background:#141c2a; color:#5a7a9a; border:1px solid #1e3050; letter-spacing:0.06em; }
.badge.unknown   { background:var(--surface); color:var(--text-faint); }

.task-check { width:18px; height:18px; border-radius:3px; border:1px solid var(--border2); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.12s; flex-shrink:0; }
.task-check.checked { background:var(--amber-dim); border-color:var(--amber); }
.task-check.hidden { opacity:0; pointer-events:none; }
.task-check-inner { width:8px; height:8px; background:var(--amber); border-radius:2px; display:none; }
.task-check.checked .task-check-inner { display:block; }

/* BUTTONS */
.btn-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.btn-primary { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:9px 18px; background:var(--amber-dim); color:var(--amber); border:1px solid var(--amber); border-radius:var(--radius); cursor:pointer; transition:all 0.15s; }
.btn-primary:hover { background:var(--amber); color:#000; }
.btn-primary:disabled { opacity:0.35; cursor:not-allowed; }
.btn-cancel { font-family:var(--mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; padding:9px 14px; background:transparent; color:var(--text-dim); border:1px solid var(--border2); border-radius:var(--radius); cursor:pointer; transition:all 0.15s; }
.btn-cancel:hover { background:var(--surface3); }
.save-hint { font-size:11px; color:var(--text-faint); }

/* SUCCESS FLASH */
.success-flash { position:absolute; inset:0; border-radius:var(--radius); background:linear-gradient(135deg,rgba(61,168,112,0.15),rgba(61,168,112,0.03)); border:1px solid rgba(61,168,112,0.4); pointer-events:none; z-index:10; animation:successFade 1.4s cubic-bezier(0.22,1,0.36,1) forwards; }
.save-error-banner { margin-top:10px; padding:8px 12px; background:rgba(224,69,69,0.1); border:1px solid rgba(224,69,69,0.4); border-radius:var(--radius); color:#f0a0a0; font-family:var(--sans); font-size:12px; line-height:1.4; }
@keyframes successFade { 0%{opacity:0;transform:scale(0.98)} 15%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.01)} }

/* PANEL TRANSITIONS */
@keyframes panelEnter { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
@keyframes panelExit  { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-10px)} }
.panel-enter { animation:panelEnter 0.28s cubic-bezier(0.22,1,0.36,1) both; }
.panel-exit  { animation:panelExit  0.18s ease forwards; pointer-events:none; }

/* GAUGE */
@keyframes gaugeRise { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
.gauge-fill { animation:gaugeRise 0.9s cubic-bezier(0.22,1,0.36,1) both 0.1s; }

/* HISTORY */
.history-table { width:100%; border-collapse:collapse; font-size:12px; }
.history-table th { text-align:left; padding:5px 10px; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-faint); border-bottom:1px solid var(--border); font-weight:500; }
.history-table td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:top; font-size:13px; }
.history-table tr:last-child td { border-bottom:none; }
.history-table tr:hover td { background:var(--surface2); }
.h-date { font-family:var(--mono); font-size:12px; color:var(--text-dim); white-space:nowrap; }
.h-hours { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--amber); }
.h-tech { font-size:13px; color:var(--text-dim); }
.h-tasks { display:flex; flex-wrap:wrap; gap:4px; }
.h-task-tag { padding:3px 8px; background:var(--green-dim); color:var(--green); border-radius:3px; font-size:12px; }
.h-note-tag { padding:3px 8px; background:var(--surface3); color:var(--text-faint); border-radius:3px; font-size:12px; border:1px solid var(--border); }
.empty-msg { padding:16px; color:var(--text-faint); font-size:12px; text-align:center; }
.daily-hours { padding:10px 12px; border-radius:var(--radius); background:var(--surface2); border:1px solid var(--border); margin-top:10px; }
.daily-hours-lbl { font-size:9px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
.daily-bars { display:flex; align-items:flex-end; gap:3px; height:32px; }
.daily-bar-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; }
.daily-bar { width:100%; border-radius:2px 2px 0 0; background:var(--blue); min-height:2px; transition:height 0.3s ease; }
.daily-bar.empty { background:var(--border2); opacity:0.5; }
.daily-bar-date { font-family:var(--mono); font-size:7px; color:var(--text-faint); }
.daily-no-data { font-size:10px; color:var(--text-faint); font-style:italic; padding:4px 0; }
.task-detail {
  padding:10px 12px 12px; margin-top:4px;
  background:var(--surface3); border-radius:0 0 var(--radius) var(--radius);
  border:1px solid var(--border); border-top:none;
  animation:fadeSlideIn 0.2s ease both;
}
.task-detail-section { margin-bottom:8px; }
.task-detail-lbl { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); margin-bottom:4px; }
.task-detail-item { font-size:12px; color:var(--text-dim); padding:2px 0 2px 10px; position:relative; }
.task-detail-item::before { content:"—"; position:absolute; left:0; color:var(--text-faint); }
.task-detail-note { font-size:11px; color:var(--text-faint); font-style:italic; line-height:1.5; }
.task-row { cursor:pointer; }
.task-row:hover { background:var(--surface3); }
.task-expand-icon { font-size:10px; color:var(--text-faint); flex-shrink:0; transition:transform 0.2s; }
.task-expand-icon.open { transform:rotate(180deg); }
.full-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:14px; }
.err-msg { font-size:13px; color:var(--red); max-width:340px; text-align:center; line-height:1.6; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef } = React;

const TRUCKS = ["HD5","HD6","HD7","HD8","HD9","HD10","HD11","HD12","HD13","HD14","HD15","HD16","HD17"];
const TASKS = [
  { key:"airfilter_battery", name:"Air filter & battery check",        interval:50  },
  { key:"oil_filter",        name:"Oil / filter change",               interval:150 },
  { key:"airfilter_clean",   name:"Air filter cleaning",               interval:250 },
  { key:"coolant_lines",     name:"Check coolant lines",               interval:250 },
  { key:"fuel_filter",       name:"Fuel filter change",                interval:250 },
  { key:"drive_belt",        name:"Check drive belt & tension",        interval:500 },
  { key:"clean_radiator",    name:"Clean radiator",                    interval:500 },
  { key:"airfilter_500",    name:"Change air filter",                 interval:500 },
];

// Air filter cleaning (250h) is only performed on HD5; every other truck
// skips it and goes straight to full replacement at the 500h interval.
function tasksForTruck(id){
  return TASKS.filter(t => t.key!=="airfilter_clean" || id==="HD5");
}

const DATA_URL    = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/data.json";
const LOGS_URL    = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/service_logs.json";
const HISTORY_URL = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/service_history.json";
const GITHUB_OWNER = "Geoffrey-Fitzjarrell-ai";
const GITHUB_REPO  = "generator_servicing";
const GITHUB_TOKEN = "PASTE_YOUR_GITHUB_PAT_HERE";
const PENDING_PATH = "pending_completions.json";
const DAILY_HOURS_URL = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/daily_hours.json";
const TICKETS_URL = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/tickets.json";
const TASK_INFO = {
  airfilter_battery: {
    replace: ["Air filter element", "Check battery terminals for corrosion"],
    check:   ["Battery voltage (should be 12.4–12.8V)", "Air filter housing seal", "Battery hold-down secure"],
    notes:   "Clean housing before installing new filter. Torque battery terminals snugly — do not overtighten."
  },
  oil_filter: {
    replace: ["Engine oil (see manual for grade/quantity)", "Oil filter"],
    check:   ["Oil drain plug washer", "Filter gasket seating", "Oil level after fill"],
    notes:   "Warm engine before draining for better flow. Do not overtighten filter — hand tight plus 3/4 turn. Check for leaks after first startup."
  },
  airfilter_clean: {
    replace: ["Air filter element if damaged or heavily soiled"],
    check:   ["Precleaner cup (dump if >1/2 full)", "Air intake hose for cracks", "Clamps tight"],
    notes:   "Tap filter gently to dislodge loose dust. Never blow compressed air outward from inside. Replace if pleats are torn or oily."
  },
  coolant_lines: {
    replace: ["Any hose showing cracks, soft spots, or swelling"],
    check:   ["All hose clamps for tightness", "Coolant level in overflow tank", "Radiator cap seal", "Any signs of leaks at connections"],
    notes:   "Check when engine is cold. Coolant should be green/orange and clear — replace if rusty or murky."
  },
  fuel_filter: {
    replace: ["Fuel filter element"],
    check:   ["Fuel lines for cracks or chafing", "Filter bowl for water/sediment", "Bleed air from system after replacement"],
    notes:   "Have absorbent rags ready — residual fuel will spill. Prime system by cranking without starting 2–3 times before full start."
  },
  drive_belt: {
    replace: ["Belt if cracked, frayed, glazed, or showing stretch — use the correct OEM replacement belt"],
    check:   ["Belt feel/snugness by hand — this engine has no tensioner or adjustment mechanism", "Pulley alignment", "Pulley grooves for wear or glazing"],
    notes:   "There is nothing to adjust on this belt — tension increases slightly on its own as the engine runs in. Do not attempt to tighten it. If it feels loose or shows wear, replace with the correct part rather than trying to adjust it."
  },
  clean_radiator: {
    replace: ["Nothing — this is a cleaning task, not a replacement"],
    check:   ["Radiator fins for debris/blockage", "Fan blades for cracks or damage", "Fan shroud clearance"],
    notes:   "Use compressed air or a gentle water rinse from the engine side outward — never a pressure washer, it can bend or tear the thin aluminum fins. Bent fins can be carefully straightened with a fin comb."
  },
  airfilter_500: {
    replace: ["Air filter element"],
    check:   ["Air intake duct condition", "Housing seal and gasket", "Pre-filter if equipped"],
    notes:   "At 500h this is a full replacement regardless of visual condition. Log hours after install."
  },
};
const PROXY_URL    = "https://ai.generator-fleet-proxy.workers.dev/";
const PROXY_SECRET = "poopooface69";

function b64e(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64d(s){ return decodeURIComponent(escape(atob(s))); }

async function writePending(entry) {
  try {
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json","X-Auth-Key":PROXY_SECRET},
      body: JSON.stringify({action:"logPending", entry})
    });
    return res.ok;
  } catch(e) { console.error("writePending failed", e); return false; }
}

async function writeGrounded(truck, grounded, note) {
  try {
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json","X-Auth-Key":PROXY_SECRET},
      body: JSON.stringify({action:"setGrounded", truck, grounded, note: note||"Under repair"})
    });
    return res.ok;
  } catch(e){ console.error("writeGrounded failed", e); return false; }
}

async function writeServiceLogToRepo(truck, log, entry) {
  try {
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json","X-Auth-Key":PROXY_SECRET},
      body: JSON.stringify({
        action: "logCompletion",
        truck,
        technician: entry.technician,
        hours: entry.hours,
        tasks: entry.tasks,
      })
    });
    return res.ok;
  } catch(e) { console.error("proxy write failed", e); return false; }
}

function Gauge({ criticalTask, hours }) {
  if (!criticalTask || hours == null) {
    return React.createElement("div", {style:{padding:"8px 0",color:"var(--text-faint)",fontSize:11,fontFamily:"var(--mono)"}}, "No interval data");
  }
  const lastDone = criticalTask.last || 0;
  const dueAt    = lastDone + criticalTask.interval;
  const pct      = Math.min(Math.max((hours - lastDone) / criticalTask.interval, 0), 1);
  const overdue  = hours >= dueAt;
  const W=220, H=48, bx=0, by=20, bw=220, bh=14;
  const fillW = Math.round(bw * pct);
  const uid = "g" + Math.round(pct*1000);
  const fillColor = overdue ? "#e04545" : pct > 0.85 ? "#f0a500" : "#3da870";
  const needleX = Math.min(Math.max(fillW, 2), bw-2);

  return React.createElement("svg",{width:"100%",height:H,viewBox:`0 0 ${W} ${H}`,style:{display:"block"}},
    React.createElement("defs",null,
      React.createElement("linearGradient",{id:"zg"+uid,x1:"0",y1:"0",x2:"1",y2:"0"},
        React.createElement("stop",{offset:"0%",stopColor:"#3da870"}),
        React.createElement("stop",{offset:"70%",stopColor:"#f0a500"}),
        React.createElement("stop",{offset:"100%",stopColor:"#e04545"})
      ),
      React.createElement("clipPath",{id:"cp"+uid},
        React.createElement("rect",{x:bx,y:by,width:fillW,height:bh})
      )
    ),
    // Track
    React.createElement("rect",{x:bx,y:by,width:bw,height:bh,rx:3,fill:"#1a2235"}),
    React.createElement("rect",{x:bx,y:by,width:bw,height:bh,rx:3,fill:`url(#zg${uid})`,opacity:0.12}),
    // Fill
    React.createElement("rect",{x:bx,y:by,width:bw,height:bh,rx:3,fill:`url(#zg${uid})`,clipPath:`url(#cp${uid})`,opacity:0.9,className:"gauge-fill"}),
    // Border
    React.createElement("rect",{x:bx,y:by,width:bw,height:bh,rx:3,fill:"none",stroke:"#28364f",strokeWidth:1}),
    // Needle (current hours)
    React.createElement("rect",{x:needleX-1,y:by-4,width:2,height:bh+8,rx:1,fill:fillColor}),
    // Labels
    React.createElement("text",{x:0,y:15,fontFamily:"'JetBrains Mono',monospace",fontSize:9,fill:"#5a6a8a"},lastDone+"h"),
    React.createElement("text",{x:W,y:15,fontFamily:"'JetBrains Mono',monospace",fontSize:9,fill:fillColor,textAnchor:"end"},dueAt+"h"),
    React.createElement("text",{x:Math.min(Math.max(needleX,18),W-18),y:H,fontFamily:"'JetBrains Mono',monospace",fontSize:9,fill:fillColor,textAnchor:"middle"},hours+"h")
  );
}

function App() {
  const [fleet,      setFleet]      = useState(null);
  const [svcLogs,    setSvcLogs]    = useState({});
  const [svcHistory, setSvcHistory] = useState({});
  const [selected,   setSelected]   = useState("HD6");
  const [loaded,     setLoaded]     = useState(false);
  const [error,      setError]      = useState(null);
  const [syncedAt,   setSyncedAt]   = useState(null);
  const [syncAgo,    setSyncAgo]    = useState('');
  const [logMode,    setLogMode]    = useState(false);
  const [checked,    setChecked]    = useState({});
  const [showSuccess,   setShowSuccess]   = useState(false);
  const [techName,      setTechName]      = useState("Geoff Fitzjarrell");
  const [tickets,       setTickets]       = useState({});
  const [dailyHours,    setDailyHours]    = useState({});
  const [expandedTask,  setExpandedTask]  = useState(null);
  const [groundingNote, setGroundingNote] = useState('');
  const [groundingBusy, setGroundingBusy] = useState(false);
  const [saving,        setSaving]        = useState(false);
  const [saveError,     setSaveError]     = useState(null);
  const [transitioning,setTransitioning]=useState(false);
  const [displayKey, setDisplayKey] = useState(0);
  const [countedHours,setCountedHours]=useState(null);
  const [svcLookup, setSvcLookup] = useState("");
  const prevHoursRef = useRef(null);

  async function loadAll() {
    setError(null);
    try {
      const bust="?_="+Date.now();
      const [r1,r2,r3,r4,r5]=await Promise.all([fetch(DATA_URL+bust),fetch(LOGS_URL+bust),fetch(HISTORY_URL+bust),fetch(TICKETS_URL+bust),fetch(DAILY_HOURS_URL+bust)]);
      if(!r1.ok) throw new Error();
      const [data,seedLogs,hist,tix,dh]=await Promise.all([r1.json(),r2.ok?r2.json():{},r3.ok?r3.json():{},r4.ok?r4.json():{},r5.ok?r5.json():{}]);
      setTickets(tix||{});
      setDailyHours(dh||{});
      const fl={};
      for(const t of TRUCKS) fl[t]={hours:null,intervalStart:0,overdue:false,technician:"",lastUpdated:null,postedBy:null,...(data[t]||{})};
      setFleet(fl);
      setSvcHistory(hist);
      const logs={};
      for(const t of TRUCKS){
        const base=seedLogs[t]||{};
        try{const local=localStorage.getItem("svc:"+t);const lo=local?JSON.parse(local):{};const merged={...base};for(const[k,v]of Object.entries(lo))if(!merged[k]||v>merged[k])merged[k]=v;logs[t]=merged;}
        catch(e){logs[t]=base;}
      }
      setSvcLogs(logs);
      setSyncedAt(new Date());
    } catch(e){setError("Fleet data unavailable.");}
    setLoaded(true);
  }

  useEffect(()=>{
    loadAll();
    const ar=setInterval(()=>{
      const jst=new Date(Date.now()+9*3600*1000).getUTCHours();
      if(jst>=6&&jst<22) loadAll();
    },5*60*1000);
    return()=>clearInterval(ar);
  },[]);

  useEffect(()=>{
    function upd(){if(!syncedAt){setSyncAgo('');return;}const m=Math.floor((Date.now()-syncedAt.getTime())/60000);setSyncAgo(m===0?'just now':m===1?'1 min ago':m+' min ago');}
    upd();const t=setInterval(upd,30000);return()=>clearInterval(t);
  },[syncedAt]);

  useEffect(()=>{
    if(!loaded) return;
    const truck=fleet?fleet[selected]:null;
    const hours=truck?.hours??null;
    if(hours==null){setCountedHours(null);prevHoursRef.current=null;return;}
    const start=prevHoursRef.current??hours,end=hours;
    if(start===end){setCountedHours(hours);return;}
    const dur=600,t0=performance.now();
    function tick(now){const p=Math.min((now-t0)/dur,1);const ease=1-Math.pow(1-p,3);setCountedHours(Math.round(start+(end-start)*ease));if(p<1)requestAnimationFrame(tick);else prevHoursRef.current=end;}
    requestAnimationFrame(tick);
  },[selected,displayKey,loaded]);

  function handleTabClick(t){
    if(t===selected)return;
    setTransitioning(true);
    setTimeout(()=>{setSelected(t);setLogMode(false);setChecked({});setTransitioning(false);setDisplayKey(k=>k+1);},180);
  }

  if(!loaded)return React.createElement("div",{className:"full-center"},React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:11,color:"#38465a",letterSpacing:"0.12em"}},"LOADING FLEET DATA..."));
  if(error)return React.createElement("div",{className:"full-center"},React.createElement("div",{className:"err-msg"},error),React.createElement("button",{className:"btn-ghost",onClick:loadAll},"RETRY"));

  const truck=fleet[selected];
  const log=svcLogs[selected]||{};
  const hours=truck.hours;
  const isGrounded=!!truck.grounded;

  const taskStatus=tasksForTruck(selected).map(task=>{
    const last=log[task.key];
    const hasRec=last!=null;
    const since=hasRec&&hours!=null?hours-last:null;
    const rem=since!=null?task.interval-since:null;
    const pct=since!=null?Math.min(since/task.interval,1):(hours!=null&&!hasRec&&task.key!=="airfilter_clean"&&hours>=task.interval?1:0);
    const status=hours==null?"unknown":!hasRec&&task.key==="airfilter_clean"?"no_record":!hasRec&&hours<task.interval?"no_record":!hasRec?"overdue":since>=task.interval?"overdue":since>=task.interval*0.9?"warn":"ok";
    return {...task,last,hasRec,since,rem,pct,status};
  });

  const anyOverdue=!isGrounded&&taskStatus.some(t=>t.status==="overdue");
  const anyWarn=!isGrounded&&taskStatus.some(t=>t.status==="warn");
  const recordedTasks = taskStatus.filter(t => t.since != null);
  const criticalTask = isGrounded ? null
    : recordedTasks.length > 0
      ? recordedTasks.reduce((a,b) => a.pct >= b.pct ? a : b)
      : null;
  const isOverdue=anyOverdue;

  function truckStatus(t){
    const td=fleet[t];const tl=svcLogs[t]||{};
    if(td.grounded)return "grounded";
    if(!td.hours)return "none";
    const tasksHere=tasksForTruck(t);
    // Mirrors taskStatus's per-task logic above: a task with no record is
    // "overdue" once the truck's hours pass its interval (unless it's the
    // HD5-only airfilter_clean task or hours haven't reached the interval yet).
    // Previously this only looked at tasks with a log entry, so a truck with an
    // un-logged overdue task could show "OK" on the fleet view while its own
    // detail page showed OVERDUE — this keeps the two in sync.
    const statuses = tasksHere.map(task=>{
      const last=tl[task.key];
      if(last==null){
        return (task.key==="airfilter_clean"||td.hours<task.interval) ? "ok" : "overdue";
      }
      const since=td.hours-last;
      if(since>=task.interval)return "overdue";
      if(since>=task.interval*0.9)return "warn";
      return "ok";
    });
    if(statuses.includes("overdue"))return "overdue";
    if(statuses.includes("warn"))return "warn";
    return "ok";
  }

  // Same per-task logic as taskStatus/truckStatus above, but for one named
  // task across an arbitrary truck — powers the Service Lookup dropdown so
  // "who needs an oil change" can be answered without opening every tab.
  function taskStatusForTruck(t, taskKey){
    const task=TASKS.find(x=>x.key===taskKey);
    const td=fleet[t];
    if(!task||!td)return null;
    if(td.grounded)return{status:"grounded",pct:0,hours:td.hours};
    const hrs=td.hours;
    if(hrs==null)return{status:"unknown",pct:0,hours:null};
    const last=(svcLogs[t]||{})[taskKey];
    if(last==null){
      if(taskKey==="airfilter_clean"||hrs<task.interval){
        return{status:"no_record",pct:Math.min(hrs/task.interval,1),hours:hrs,dueAt:task.interval,remaining:task.interval-hrs};
      }
      return{status:"overdue",pct:1,hours:hrs,dueAt:task.interval,over:hrs-task.interval};
    }
    const since=hrs-last;
    const pct=Math.min(since/task.interval,1);
    const dueAt=last+task.interval;
    const status=since>=task.interval?"overdue":since>=task.interval*0.9?"warn":"ok";
    return{status,pct,hours:hrs,since,dueAt,last,remaining:dueAt-hrs,over:hrs-dueAt};
  }

  async function handleToggleGrounded(){
    setGroundingBusy(true);
    const nowGrounded = !truck.grounded;
    const ok = await writeGrounded(selected, nowGrounded, groundingNote||"Under repair");
    if(ok){
      setFleet(f=>({...f,[selected]:{...f[selected],grounded:nowGrounded,groundedNote:groundingNote||"Under repair"}}));
      setGroundingNote('');
    }
    setGroundingBusy(false);
  }

  async function handleSave(){
    if(!hours)return;
    const newLog={...log};const done=[];
    for(const[k,v]of Object.entries(checked)){if(v){newLog[k]=hours;const t=TASKS.find(x=>x.key===k);if(t)done.push(t);}}
    if(!done.length){setChecked({});setLogMode(false);return;}

    setSaving(true);setSaveError(null);

    // Write the authoritative record FIRST and wait for it — this is the write
    // that actually clears "overdue" on the dashboard. Only once we know it has
    // landed do we touch local state / show success, so a failure here can never
    // look like a successful save (this is what silently ate an HD9 completion
    // before: the notification fired regardless of whether this write worked).
    const ok = await writeServiceLogToRepo(selected,newLog,{
      technician:techName,
      hours,
      tasks:done.map(t=>({key:t.key,label:t.name}))
    });

    // The pending entry drives the Slack "tasks completed" notification. It also
    // doubles as a safety net: if the write above failed, alreadyLogged=false
    // tells the cron job to promote this entry into service_logs/service_history
    // itself on its next run, so the completion still isn't lost — Geoff just
    // needs to know it didn't land instantly.
    await writePending({
      truck:selected,
      tasks:done.map(t=>t.name),
      postedBy:truck.postedBy,
      loggedAt:new Date().toISOString(),
      hours,
      alreadyLogged: ok,
    });

    if(ok){
      setSvcLogs(p=>({...p,[selected]:newLog}));
      try{localStorage.setItem("svc:"+selected,JSON.stringify(newLog));}catch(e){}
      setSvcHistory(p=>{
        const arr=p[selected]?[...p[selected]]:[];
        arr.push({date:new Date().toISOString().slice(0,10),hours,technician:techName,tasks:done.map(t=>({key:t.key,label:t.name})),notes:[]});
        return {...p,[selected]:arr};
      });
      setChecked({});setLogMode(false);
      setShowSuccess(true);setTimeout(()=>setShowSuccess(false),1400);
    } else {
      // Leave checked/logMode as-is so Geoff can see exactly what didn't save
      // and hit Save again — it'll sync automatically via the cron safety net
      // even if this retry also fails.
      setSaveError("Couldn't reach the repo — this will auto-sync within a few hours via the scheduled job, but you can also try Save again now.");
    }
    setSaving(false);
  }

  const fleetCounts = TRUCKS.reduce((acc,t)=>{
    const st=truckStatus(t);
    if(st==="overdue") acc.overdue++;
    else if(st==="warn") acc.warn++;
    else if(st==="ok") acc.ok++;
    else if(st==="grounded") acc.grounded++;
    return acc;
  },{overdue:0,warn:0,ok:0,grounded:0});

  const statusLabel={ok:"OK",warn:"DUE SOON",overdue:"OVERDUE",unknown:"—",no_record:"UPCOMING"};
  const overdueTasks=taskStatus.filter(t=>t.status==="overdue");
  const warnTasks=taskStatus.filter(t=>t.status==="warn");
  const histEntries=(svcHistory[selected]||[]).filter(e=>e.date||e.hours).slice().reverse();

  // Newest lastUpdated across the fleet = how fresh the *data* is (distinct
  // from syncedAt, which is only when this page last fetched). This is the
  // number that answers "am I looking at stale cache?" — the HD6 false-green
  // incident on 7/7 was exactly this confusion.
  const newestDataMs = fleet ? Math.max(0, ...Object.values(fleet).map(t=>t&&t.lastUpdated?new Date(t.lastUpdated).getTime():0)) : 0;
  const dataAgeH = newestDataMs ? (Date.now()-newestDataMs)/3600000 : null;
  const dataAgeLabel = dataAgeH==null ? "" : dataAgeH<1 ? "DATA <1H OLD" : "DATA "+Math.floor(dataAgeH)+"H OLD";
  const dataAgeClass = dataAgeH==null ? "" : dataAgeH>12 ? " stale" : dataAgeH>6 ? " warn" : "";

  const exportHistoryCsv=()=>{
    const esc=v=>{const s=String(v==null?"":v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
    const rows=[["truck","date","hours","technician","tasks","notes"]];
    Object.keys(svcHistory).sort((a,b)=>parseInt(a.slice(2))-parseInt(b.slice(2))).forEach(tr=>{
      (svcHistory[tr]||[]).forEach(e=>{
        rows.push([tr, e.date||"", e.hours!=null?e.hours:"", e.technician||"",
          (e.tasks||[]).map(t=>t.label).join("; "), (e.notes||[]).join("; ")]);
      });
    });
    const csv=rows.map(r=>r.map(esc).join(",")).join("\n");
    const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="generator_service_history_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const nextServiceCard=()=>{
    if(!hours)return React.createElement("div",{className:"stat-val"},"—");
    if(overdueTasks.length)return React.createElement("div",null,
      React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:"var(--red)",letterSpacing:"0.08em",marginBottom:5}},"DUE NOW"),
      React.createElement("div",{className:"due-list"},overdueTasks.map(t=>React.createElement("div",{key:t.key,className:"due-tag"},t.name)))
    );
    if(warnTasks.length)return React.createElement("div",null,
      React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:"var(--amber)",letterSpacing:"0.08em",marginBottom:5}},"DUE SOON"),
      React.createElement("div",{className:"due-list"},warnTasks.map(t=>React.createElement("div",{key:t.key,className:"due-tag"},t.name)))
    );
    if(criticalTask){
      const dueAt=(criticalTask.last||0)+criticalTask.interval;
