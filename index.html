<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD GEN2 · Fleet Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&family=Titillium+Web:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080b12; --surface:#0d1117; --surface2:#131925; --surface3:#1a2235;
  --border:#1e2840; --border2:#28364f;
  --amber:#f0a500; --amber-dim:#3d2900; --amber-glow:rgba(240,165,0,0.12);
  --red:#e04545; --red-dim:#3a1010; --red-glow:rgba(224,69,69,0.12);
  --green:#3da870; --green-dim:#0f2e1e;
  --blue:#4a7cf5; --blue-dim:#101e40;
  --text:#dde4f0; --text-dim:#6e7f99; --text-faint:#38465a;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif; --radius:6px;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); background-image:url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.8' fill='%23ffffff06'/%3E%3C/svg%3E"); }


.header { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:52px; background:var(--surface); border-bottom:1px solid var(--border); position:relative; }
.header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--blue) 40%,var(--amber) 60%,transparent); opacity:0.3; }
.header-brand { display:flex; align-items:center; gap:12px; }
.header-badge { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.18em; color:var(--bg); background:var(--amber); padding:3px 8px; border-radius:3px; }
.header-title { font-size:13px; color:var(--text-dim); letter-spacing:0.04em; }
.header-right { display:flex; align-items:center; gap:12px; }
.sync-dot { width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s ease-in-out infinite; display:inline-block; margin-right:6px; }
.data-age { font-family:var(--mono); font-size:9px; letter-spacing:0.08em; padding:3px 9px; border-radius:3px; text-transform:uppercase; background:var(--green-dim); color:var(--green); border:1px solid transparent; }
.data-age.warn { background:var(--amber-dim); color:var(--amber); }
.data-age.stale { background:var(--red-dim); color:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sync-time { font-family:var(--mono); font-size:11px; color:var(--text-faint); letter-spacing:0.06em; }
.btn-ghost { font-family:var(--mono); font-size:10px; letter-spacing:0.08em; padding:5px 12px; background:transparent; color:var(--text-dim); border:1px solid var(--border2); border-radius:var(--radius); cursor:pointer; transition:all 0.15s; text-transform:uppercase; }
.btn-ghost:hover { border-color:var(--blue); color:var(--blue); }

/* FLEET OVERVIEW BAR */
.fleet-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 24px 12px; }
.fleet-bar-title { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); margin-bottom:8px; text-align:center; }
.fleet-chart { display:flex; flex-direction:column; gap:6px; }
.fleet-row { display:flex; align-items:center; gap:10px; }
.fleet-row-lbl { font-size:10px; color:var(--text-dim); letter-spacing:0.05em; width:60px; flex-shrink:0; text-align:right; font-family:var(--mono); }
.fleet-row-track { flex:1; height:12px; background:#1a2235; border-radius:4px; overflow:hidden; border:1px solid var(--border2); }
.fleet-row-fill { height:100%; border-radius:3px; animation:barGrow 0.8s cubic-bezier(0.22,1,0.36,1) both; position:relative; }
.fleet-row-fill::after { content:''; position:absolute; right:0; top:0; bottom:0; width:3px; border-radius:0 3px 3px 0; background:rgba(255,255,255,0.2); }
@keyframes barGrow { from{width:0%} }
.fleet-row-fill.fs-overdue  { background:linear-gradient(90deg,#8b1f1f,var(--red)); }
.fleet-row-fill.fs-warn     { background:linear-gradient(90deg,#7a5010,var(--amber)); }
.fleet-row-fill.fs-due      { background:linear-gradient(90deg,#16305f,var(--blue)); }
.fleet-row-fill.fs-ok       { background:linear-gradient(90deg,#0f4028,var(--green)); }
.fleet-row-fill.fs-grounded { background:linear-gradient(90deg,#2a1845,#7060a0); }
.fleet-row-pct { font-family:var(--mono); font-size:11px; font-weight:700; width:36px; flex-shrink:0; text-align:right; }
.fs-overdue  .fleet-row-pct { color:var(--red); }
.fs-warn     .fleet-row-pct { color:var(--amber); }
.fs-due      .fleet-row-pct { color:var(--blue); }
.fs-ok       .fleet-row-pct { color:var(--green); }
.fs-grounded .fleet-row-pct { color:#9880cc; }

/* SERVICE LOOKUP */
.service-lookup { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px 14px; }
.service-lookup-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.service-lookup-title { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); flex-shrink:0; }
.service-select { font-family:var(--mono); font-size:11px; letter-spacing:0.03em; padding:6px 10px; background:var(--surface2); color:var(--text); border:1px solid var(--border2); border-radius:var(--radius); cursor:pointer; flex:1; max-width:340px; }
.service-select:focus { outline:none; border-color:var(--blue); }
.svc-grid { display:flex; flex-wrap:wrap; gap:8px; animation:statPop 0.25s cubic-bezier(0.22,1,0.36,1) both; }
.svc-card { width:104px; padding:10px 10px 9px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; position:relative; overflow:hidden; transition:background 0.15s, transform 0.15s; }
.svc-card:hover { background:var(--surface3); transform:translateY(-1px); }
.svc-card-bar { position:absolute; top:0; left:0; right:0; height:2px; }
.svc-card-name { font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:0.05em; color:var(--text); margin-bottom:6px; }
.svc-gauge { width:100%; height:8px; display:block; margin-bottom:6px; }
.svc-gauge-fill { transition:width 0.3s ease; }
.svc-card-sub { font-family:var(--mono); font-size:9.5px; color:var(--text-faint); letter-spacing:0.02em; line-height:1.3; }

/* TRUCK STRIP */
.truck-strip { display:flex; background:var(--surface); border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
.truck-strip::-webkit-scrollbar { display:none; }
.truck-tab { flex:1; min-width:80px; padding:12px 8px 14px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; border-right:1px solid var(--border); position:relative; transition:background 0.15s, transform 0.15s; }
.truck-tab::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--text-faint); transition:background 0.3s, box-shadow 0.3s; }
.truck-tab:last-child { border-right:none; }
.truck-tab:hover:not(.active) { background:var(--surface2); transform:translateY(-1px); }
.truck-tab.active { background:var(--surface2); transform:translateY(-1px); }
.truck-tab.active::before { background:var(--amber); box-shadow:0 0 8px var(--amber); }
.truck-tab.st-overdue::before { background:var(--red); box-shadow:0 0 8px var(--red); }
.truck-tab.st-warn::before { background:var(--amber); }
.truck-tab.st-due::before { background:var(--blue); box-shadow:0 0 8px var(--blue); }
.truck-tab.st-ok::before { background:var(--green); }
.truck-tab.st-grounded::before { background:#7060a0; box-shadow:0 0 8px #7060a0; }
.truck-tab.st-grounded .truck-name { color:#9880cc; }
.truck-tab.st-grounded .truck-hours-badge { color:#4a3a66; }
.truck-name { font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:0.06em; color:var(--text-dim); transition:color 0.2s; }
.truck-tab.active .truck-name { color:var(--amber); }
.truck-tab.st-overdue .truck-name { color:var(--red); }
.truck-tab.st-due .truck-name { color:var(--blue); }
.truck-hours-badge { font-family:var(--mono); font-size:11px; color:var(--text-faint); }

/* MAIN */
.main { display:grid; grid-template-columns:340px 1fr; height:calc(100vh - 108px); }

/* LEFT */
.left-panel { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; padding:24px 20px; transition:box-shadow 0.5s; }
.left-panel.is-overdue { animation:overdueGlow 2.8s ease-in-out infinite; }
@keyframes overdueGlow { 0%,100%{box-shadow:inset -1px 0 0 var(--border)} 50%{box-shadow:inset -1px 0 30px rgba(224,69,69,0.18),inset 0 0 40px rgba(224,69,69,0.07)} }

.truck-header { margin-bottom:20px; }
.truck-id { font-family:var(--mono); font-size:32px; font-weight:700; letter-spacing:0.1em; line-height:1; transition:color 0.3s; }
.truck-sub { font-size:10px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; }

.gauge-wrap { width:100%; margin-bottom:10px; }
.gauge-label { font-family:var(--mono); font-size:9px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }

.stat-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; position:relative; overflow:hidden; transition:border-color 0.3s; animation:statPop 0.35s cubic-bezier(0.22,1,0.36,1) both; }
.stat-card:nth-child(2) { animation-delay:0.08s; }
@keyframes statPop { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
.stat-card::before { content:''; position:absolute; top:0; left:0; bottom:0; width:2px; }
.stat-card.s-ok::before { background:var(--green); }
.stat-card.s-warn::before { background:var(--amber); }
.stat-card.s-due::before { background:var(--blue); }
.stat-card.s-overdue::before { background:var(--red); }
.stat-card.s-neutral::before { background:var(--border2); }
.stat-lbl { font-size:11px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.stat-val { font-family:var(--mono); font-size:22px; font-weight:700; line-height:1; transition:color 0.3s; }
.stat-val .unit { font-size:11px; font-weight:400; color:var(--text-dim); margin-left:2px; }
.stat-val.c-overdue{color:var(--red)} .stat-val.c-warn{color:var(--amber)} .stat-val.c-ok{color:var(--green)}
.due-list { margin-top:4px; }
.due-tag { font-size:13px; padding:2px 0; border-bottom:1px solid var(--border); color:var(--text-dim); line-height:1.6; }
.due-tag:last-child { border-bottom:none; }

/* DUE SOON BANNER */
.due-soon-banner {
  padding:10px 12px; border-radius:var(--radius); margin-bottom:14px;
  background:#2a1e00; border:1px solid rgba(240,165,0,0.3);
  display:flex; gap:10px; align-items:flex-start;
}
.due-soon-icon { color:var(--amber); font-size:13px; margin-top:1px; }
.due-soon-body { flex:1; }
.due-soon-title { font-family:var(--mono); font-size:10px; font-weight:700; color:var(--amber); letter-spacing:0.08em; margin-bottom:4px; }
.due-soon-item { font-size:11px; color:#ffe4a0; line-height:1.6; }

/* CHECK / CLEAN DUE BANNER (checks & cleanings past interval — calm, never alarming) */
.service-due-banner {
  padding:10px 12px; border-radius:var(--radius); margin-bottom:14px;
  background:var(--blue-dim); border:1px solid rgba(74,124,245,0.3);
  display:flex; gap:10px; align-items:flex-start;
}
.service-due-icon { color:var(--blue); font-size:13px; margin-top:1px; }
.service-due-title { font-family:var(--mono); font-size:10px; font-weight:700; color:var(--blue); letter-spacing:0.08em; margin-bottom:4px; }
.service-due-item { font-size:11px; color:#bcd0ff; line-height:1.6; }
.due-tag-svc { color:var(--blue) !important; }
 padding:10px 12px; border-radius:var(--radius); margin-bottom:14px; background:var(--red-dim); border:1px solid rgba(224,69,69,0.3); display:flex; gap:10px; align-items:flex-start; animation:shake 0.55s cubic-bezier(0.36,0.07,0.19,0.97) 0.2s both; }
@keyframes shake { 0%{transform:translateX(0)} 15%{transform:translateX(-7px)} 30%{transform:translateX(6px)} 45%{transform:translateX(-4px)} 60%{transform:translateX(3px)} 100%{transform:translateX(0)} }
.attention-icon { color:var(--red); font-size:13px; margin-top:1px; }
.attention-msg { font-size:11px; color:#ffc8c8; line-height:1.5; }

.grounded-banner { padding:16px; border-radius:var(--radius); margin-bottom:14px; background:#1a1228; border:1px solid #7060a0; display:flex; flex-direction:column; gap:6px; animation:flicker 5s ease-in-out infinite, groundedBreath 3s ease-in-out infinite; }
@keyframes flicker { 0%,89%,100%{opacity:1} 90%{opacity:0.35} 91%{opacity:1} 93%{opacity:0.5} 94%{opacity:1} 96%{opacity:0.7} 97%{opacity:1} }
@keyframes groundedBreath { 0%,100%{box-shadow:0 0 0 rgba(112,96,160,0)} 50%{box-shadow:0 0 14px rgba(112,96,160,0.35)} }
.grounded-title { font-family:var(--mono); font-size:12px; font-weight:700; color:#9880cc; letter-spacing:0.1em; }
.grounded-note { font-size:11px; color:#6a5a88; line-height:1.5; }

.reporter { padding:10px 12px; border-radius:var(--radius); background:var(--surface2); border:1px solid var(--border); }
.reporter-lbl { font-size:9px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.reporter-name { font-size:14px; color:var(--text-dim); font-weight:500; }
.reporter-time { font-family:var(--mono); font-size:9px; color:var(--text-faint); margin-top:2px; }

/* RIGHT */
.right-panel { display:flex; flex-direction:column; overflow-y:auto; padding:20px 24px; gap:20px; position:relative; }
.section-title { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:2px; }

/* TASKS */
.task-list { display:flex; flex-direction:column; gap:4px; }
.task-row { display:grid; grid-template-columns:1fr 56px 90px 72px 28px; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius); background:var(--surface2); border:1px solid var(--border); border-left-width:3px; border-left-color:var(--border2); transition:background 0.12s; animation:slideInRight 0.28s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.task-row:nth-child(1){animation-delay:0.04s} .task-row:nth-child(2){animation-delay:0.08s} .task-row:nth-child(3){animation-delay:0.12s} .task-row:nth-child(4){animation-delay:0.16s} .task-row:nth-child(5){animation-delay:0.20s} .task-row:nth-child(6){animation-delay:0.24s} .task-row:nth-child(7){animation-delay:0.28s}
.task-row:hover { background:var(--surface3); }
.task-row.r-overdue { border-left-color:var(--red); background:#160d0d; }
.task-row.r-warn    { border-left-color:var(--amber); }
.task-row.r-due     { border-left-color:var(--blue); }
.task-row.r-ok      { border-left-color:var(--green); }
.task-row.r-no_record { border-left-color:#1e3050; }
.task-name { font-size:14px; color:var(--text); }
.task-name-wrap { display:flex; flex-direction:column; gap:3px; min-width:0; }
.task-mini-bar { width:100%; height:4px; display:block; }
.task-interval { font-family:var(--mono); font-size:12px; color:var(--text-faint); }
.badge { font-family:var(--mono); font-size:11px; font-weight:700; padding:3px 7px; border-radius:3px; text-align:center; letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap; transition:background 0.3s, color 0.3s; }
.badge.ok        { background:var(--green-dim); color:var(--green); }
.badge.warn      { background:var(--amber-dim); color:var(--amber); }
.badge.due       { background:var(--blue-dim);  color:var(--blue); }
.badge.overdue   { background:var(--red-dim);   color:var(--red); animation:overdueFlash 2.2s ease-in-out infinite; }
@keyframes overdueFlash { 0%,100%{opacity:1} 50%{opacity:0.45} }
.badge.no_record { background:#141c2a; color:#5a7a9a; border:1px solid #1e3050; letter-spacing:0.06em; }
.badge.unknown   { background:var(--surface); color:var(--text-faint); }

.task-check { width:18px; height:18px; border-radius:3px; border:1px solid var(--border2); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.12s; flex-shrink:0; }
.task-check.checked { background:var(--amber-dim); border-color:var(--amber); }
.task-check.hidden { opacity:0; pointer-events:none; }
.task-check-inner { width:8px; height:8px; background:var(--amber); border-radius:2px; display:none; }
.task-check.checked .task-check-inner { display:block; }

/* BUTTONS */
.btn-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.btn-primary { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:9px 18px; background:var(--amber-dim); color:var(--amber); border:1px solid var(--amber); border-radius:var(--radius); cursor:pointer; transition:all 0.15s; }
.btn-primary:hover { background:var(--amber); color:#000; }
.btn-primary:disabled { opacity:0.35; cursor:not-allowed; }
.btn-cancel { font-family:var(--mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; padding:9px 14px; background:transparent; color:var(--text-dim); border:1px solid var(--border2); border-radius:var(--radius); cursor:pointer; transition:all 0.15s; }
.btn-cancel:hover { background:var(--surface3); }
.save-hint { font-size:11px; color:var(--text-faint); }

/* SUCCESS FLASH */
.success-flash { position:absolute; inset:0; border-radius:var(--radius); background:linear-gradient(135deg,rgba(61,168,112,0.15),rgba(61,168,112,0.03)); border:1px solid rgba(61,168,112,0.4); pointer-events:none; z-index:10; animation:successFade 1.4s cubic-bezier(0.22,1,0.36,1) forwards; }
.save-error-banner { margin-top:10px; padding:8px 12px; background:rgba(224,69,69,0.1); border:1px solid rgba(224,69,69,0.4); border-radius:var(--radius); color:#f0a0a0; font-family:var(--sans); font-size:12px; line-height:1.4; }
@keyframes successFade { 0%{opacity:0;transform:scale(0.98)} 15%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.01)} }

/* PANEL TRANSITIONS */
@keyframes panelEnter { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
@keyframes panelExit  { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-10px)} }
.panel-enter { animation:panelEnter 0.28s cubic-bezier(0.22,1,0.36,1) both; }
.panel-exit  { animation:panelExit  0.18s ease forwards; pointer-events:none; }

/* GAUGE */
@keyframes gaugeRise { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
.gauge-fill { animation:gaugeRise 0.9s cubic-bezier(0.22,1,0.36,1) both 0.1s; }

/* HISTORY */
.history-table { width:100%; border-collapse:collapse; font-size:12px; }
.history-table th { text-align:left; padding:5px 10px; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-faint); border-bottom:1px solid var(--border); font-weight:500; }
.history-table td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:top; font-size:13px; }
.history-table tr:last-child td { border-bottom:none; }
.history-table tr:hover td { background:var(--surface2); }
.h-date { font-family:var(--mono); font-size:12px; color:var(--text-dim); white-space:nowrap; }
.h-hours { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--amber); }
.h-tech { font-size:13px; color:var(--text-dim); }
.h-tasks { display:flex; flex-wrap:wrap; gap:4px; }
.h-task-tag { padding:3px 8px; background:var(--green-dim); color:var(--green); border-radius:3px; font-size:12px; }
.h-note-tag { padding:3px 8px; background:var(--surface3); color:var(--text-faint); border-radius:3px; font-size:12px; border:1px solid var(--border); }
.empty-msg { padding:16px; color:var(--text-faint); font-size:12px; text-align:center; }
.daily-hours { padding:10px 12px; border-radius:var(--radius); background:var(--surface2); border:1px solid var(--border); margin-top:10px; }
.daily-hours-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.daily-hours-lbl { font-size:9px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; }
.daily-hours-avg { font-family:var(--mono); font-size:10px; color:var(--text-faint); }
.daily-bars { display:flex; align-items:flex-end; gap:6px; height:110px; padding-top:18px; position:relative; }

const TRUCKS = ["HD5","HD6","HD7","HD8","HD9","HD10","HD11","HD12","HD13","HD14","HD15","HD16","HD17"];
// type "replace" = escalates to OVERDUE (red) past interval — the oil change,
//   the fuel filter change, and the air-filter change (airfilter_500).
// type "service" = a check or cleaning (air-filter check, radiator/air-filter
//   clean, coolant/belt checks). These NEVER go overdue; past their interval
//   they show a calm DUE (blue) state and do not trigger the truck's red
//   overdue alarm or overdue counts.
const TASKS = [
  { key:"airfilter_battery", name:"Air filter / Battery check",               interval:50,  type:"service" },
  { key:"battery_box",       name:"Battery Box check",                        interval:50,  type:"service" },
  { key:"oil_filter",        name:"Oil / filter change",               interval:150, type:"replace" },
  { key:"airfilter_clean",   name:"Air filter cleaning",               interval:250, type:"service" },
  { key:"coolant_lines",     name:"Check coolant lines",               interval:250, type:"service" },
  { key:"fuel_filter",       name:"Fuel filter change",                interval:250, type:"replace" },
  { key:"drive_belt",        name:"Check drive belt & tension",        interval:500, type:"service" },
  { key:"clean_radiator",    name:"Clean radiator",                    interval:500, type:"service" },
  { key:"airfilter_500",    name:"Change air filter",                 interval:500, type:"replace" },
];

// Air filter cleaning (250h) is only performed on HD5; every other truck
// skips it and goes straight to full replacement at the 500h interval.
function tasksForTruck(id){
  return TASKS.filter(t => t.key!=="airfilter_clean" || id==="HD5");
}

// Terminal state for a task past its interval: replacements go OVERDUE (red),
// checks/cleanings go DUE (blue, non-alarming). Single source of truth so the
// three status computations below can never drift apart.
function pastDueStatus(task){ return task.type==="replace" ? "overdue" : "due"; }
// Status from a "hours-since-last-done / interval" ratio. Replacements get an
// amber WARN heads-up in the last 10%; checks/cleanings stay green until due.
function ratioStatus(task, ratio){
  if(ratio>=1) return pastDueStatus(task);
  if(task.type==="replace" && ratio>=0.9) return "warn";
  return "ok";
}
// A status that should raise the red "service required" alarm. DUE (checks /
// cleanings past interval) deliberately does NOT.
function isAlarm(status){ return status==="overdue"; }

// ══ Pit-wall fleet view (F1 timing tower) ════════════════════════════════════
// Reuses the top-level TASKS / tasksForTruck / pastDueStatus / ratioStatus so
// severity stays identical to the detail view and the bot.
const FLEET_H = React.createElement;
function fleetTruckStatus(td, tlogs){
  if(!td) return "none";
  if(td.grounded) return "grounded";
  if(td.hours==null) return "none";
  const statuses = tasksForTruck(td._id).map(task=>{
    const last = tlogs[task.key];
    if(last==null) return (task.key==="airfilter_clean" || td.hours<task.interval) ? "ok" : pastDueStatus(task);
    return ratioStatus(task, (td.hours-last)/task.interval);
  });
  if(statuses.includes("overdue")) return "overdue";
  if(statuses.includes("warn")) return "warn";
  if(statuses.includes("due")) return "due";
  return "ok";
}
function fleetCritical(td, tlogs){
  if(!td || td.hours==null) return null;
  const list = tasksForTruck(td._id).map(task=>{
    const last = tlogs[task.key];
    const dueAt = (last!=null?last:0) + task.interval;
    return { ...task, last:last!=null?last:null, dueAt, rem: dueAt - td.hours };
  }).sort((a,b)=>a.rem-b.rem);
  return list[0] || null;
}
const FLAG = {
  overdue:  { word:"Red flag",  color:"var(--f1red)", cls:"" },
  warn:     { word:"Yellow",    color:"var(--yellow)", cls:"" },
  due:      { word:"Blue",      color:"var(--blue)",  cls:"" },
  ok:       { word:"Green",     color:"var(--green)", cls:"" },
  grounded: { word:"Garage",    color:"var(--garage)",cls:"gcol" },
  none:     { word:"No time",   color:"var(--faint)", cls:"ncol" },
};
const FLEET_SORT = { overdue:0, warn:1, due:2, ok:3, none:4, grounded:5 };
const FLAG_ORDER = ["overdue","warn","due","ok","grounded"];
function fleetAgo(iso){
  if(!iso) return null;
  const ms = Date.now() - new Date(iso).getTime();
  if(isNaN(ms)) return null;
  const m = Math.floor(ms/60000);
  let label, level="ok";
  if(m<1) label="now";
  else if(m<60) label=m+"m";
  else if(m<1440){ label=Math.floor(m/60)+"h"; if(m>=1080) level="warn"; }
  else { const d=Math.floor(m/1440); label=d+"d"; level = d>=3?"stale":"warn"; }
  return { label, level };
}

function PitRow({ pos, id, td, tlogs, status, onOpen }){
  const f = FLAG[status];
  const crit = fleetCritical(td, tlogs);
  const fresh = fleetAgo(td && td.lastUpdated);
  const tech = (td && td.technician) ? td.technician : null;

  } else if(td && td.hours!=null && crit){
    nextName = crit.name;
    const ratio = Math.max(0, Math.min((crit.interval - crit.rem)/crit.interval, 1));
    stint = FLEET_H("div",{className:"stint"},
      FLEET_H("div",{className:"stint-track"}, FLEET_H("div",{className:"stint-fill",style:{width:(ratio*100)+"%"}})),
      FLEET_H("div",{className:"stint-pct"}, Math.round(ratio*100)+"% of interval"));
    const over = crit.rem <= 0;
    delta = over
      ? FLEET_H("div",{className:"delta over"},
          FLEET_H("div",null, FLEET_H("span",{className:"delta-val"},"+"+Math.abs(Math.round(crit.rem))), FLEET_H("span",{className:"delta-unit"},"h")),
          FLEET_H("div",{className:"delta-tag"}, crit.type==="replace" ? "overdue" : "check/clean due"))
      : FLEET_H("div",{className:"delta"},
          FLEET_H("div",null, FLEET_H("span",{className:"delta-val"},Math.round(crit.rem)), FLEET_H("span",{className:"delta-unit"},"h")),
          FLEET_H("div",{className:"delta-tag"},"to service"));
  } else { nextName = "No hours on file"; }

  return FLEET_H("div",{className:"row "+(status==="overdue"?"rf ":"")+(status==="grounded"?"garage":""), style:rowStyle, onClick:()=>onOpen(id)},
    FLEET_H("div",{className:"pos "+f.cls}, FLEET_H("span",null, status==="grounded" ? "\u25AA" : pos)),
    FLEET_H("div",{className:"car"},
      FLEET_H("div",{className:"car-id"}, id),
      FLEET_H("div",{className:"car-next", title:nextName}, nextName)),
    FLEET_H("div",{className:"flag-cell"},
      FLEET_H("div",{className:"fbar "+f.cls}),
      FLEET_H("div",{className:"flag-word "+f.cls}, f.word)),
    stint, delta,
    FLEET_H("div",{className:"crew"+(tech?"":" none")}, tech || "unassigned"),
    FLEET_H("div",{className:"updated"}, fresh ? [FLEET_H("span",{key:"d",className:"udot "+fresh.level}), fresh.label] : "\u2014")
  );
}

function FleetView({ onOpenTruck }){
  const [data,setData] = useState(null);
  const [logs,setLogs] = useState({});
  const [err,setErr] = useState(false);
  const [syncedAt,setSyncedAt] = useState(null);
  const [,setTick] = useState(0);
  const [filter,setFilter] = useState(null);

  async function load(){
    setErr(false);
    try{
      const bust = "?_="+Date.now();
      const [rd,rl] = await Promise.all([fetch(DATA_URL+bust), fetch(LOGS_URL+bust)]);
      if(!rd.ok) throw new Error();
      const d = await rd.json();
      const l = rl.ok ? await rl.json() : {};
      setData(d); setLogs(l); setSyncedAt(new Date());
    }catch(e){ setErr(true); }
  }
  useEffect(()=>{
    load();
    const iv = setInterval(()=>{ const jst=new Date(Date.now()+9*3600*1000).getUTCHours(); if(jst>=6&&jst<22) load(); }, 5*60*1000);
    return ()=>clearInterval(iv);
  },[]);
  useEffect(()=>{ const t=setInterval(()=>setTick(x=>x+1),30000); return ()=>clearInterval(t); },[]);

  if(err) return FLEET_H("div",{className:"wrap"}, FLEET_H("div",{className:"empty"},
    "Fleet data unavailable — check the connection and try again.",
    FLEET_H("div",null, FLEET_H("button",{className:"btn",onClick:load},"Retry"))));
  if(!data) return FLEET_H("div",{className:"wrap"}, FLEET_H("div",{className:"empty"},"Connecting to timing feed…"));

  const rows = TRUCKS.map(id=>{
    const td = { ...(data[id]||{}), _id:id };
    const tlogs = logs[id] || {};
    return { id, td, tlogs, status: fleetTruckStatus(td, tlogs) };
  });
  const counts = rows.reduce((a,r)=>{ a[r.status]=(a[r.status]||0)+1; return a; },{});
  const sorted = rows.slice().sort((a,b)=>{
    const d = (FLEET_SORT[a.status]??3)-(FLEET_SORT[b.status]??3);
    if(d) return d;
    const ca=fleetCritical(a.td,a.tlogs), cb=fleetCritical(b.td,b.tlogs);
    return ((ca?ca.rem:1e9)-(cb?cb.rem:1e9));
  });
  const shown = filter ? sorted.filter(r=>r.status===filter) : sorted;
  const freshest = rows.map(r=>r.td&&r.td.lastUpdated?new Date(r.td.lastUpdated).getTime():0).reduce((a,b)=>Math.max(a,b),0);
  const dataAge = freshest ? fleetAgo(new Date(freshest).toISOString()) : null;
  const syncAgo = syncedAt ? (fleetAgo(syncedAt.toISOString())||{}).label : "";

  return FLEET_H("div",{className:"wrap"},
    FLEET_H("header",{className:"pw"},
      FLEET_H("div",{className:"pw-brand"},
        FLEET_H("span",{className:"pw-mark"},"HD GEN2"),
        FLEET_H("span",{className:"pw-title"},"Pit Wall"),
        FLEET_H("span",{className:"pw-sub"},"Japan Fleet")),
      FLEET_H("div",{className:"pw-right"},
        FLEET_H("span",{className:"live"}, FLEET_H("span",{className:"live-dot"}), "LIVE"),
        syncAgo ? FLEET_H("span",{className:"age "+(dataAge&&dataAge.level==="stale"?"stale":dataAge&&dataAge.level==="warn"?"warn":"")}, "sync "+syncAgo+" ago") : null)),
    FLEET_H("div",{className:"status-strip"},
      sorted.map(r=> FLEET_H("div",{key:r.id,className:"status-tick",style:{background:FLAG[r.status].color},title:r.id+" · "+FLAG[r.status].word}))),
    FLEET_H("div",{className:"flags"},
      FLAG_ORDER.map(s=>{
        const active=filter===s, dim=filter&&!active;
        return FLEET_H("div",{key:s,className:"flag-chip"+(dim?" dim":""),onClick:()=>setFilter(active?null:s)},
          FLEET_H("div",{className:"flag-swatch",style:{background:FLAG[s].color}}),
          FLEET_H("div",{className:"flag-meta"},
            FLEET_H("span",{className:"flag-count"}, counts[s]||0),
            FLEET_H("span",{className:"flag-lbl"}, FLAG[s].word)));
      })),
    FLEET_H("div",{className:"tower-head"},
      FLEET_H("span",null,"Pos"), FLEET_H("span",null,"Car"), FLEET_H("span",null,"Flag"),
      FLEET_H("span",{className:"h-stint"},"Stint"), FLEET_H("span",null,"To service"),
      FLEET_H("span",{className:"h-crew"},"Crew"), FLEET_H("span",{className:"h-upd"},"Updated")),
    shown.length
      ? FLEET_H("div",{className:"tower"}, shown.map((r,i)=> FLEET_H(PitRow,{key:r.id, pos:i+1, id:r.id, td:r.td, tlogs:r.tlogs, status:r.status, onOpen:onOpenTruck})))
      : FLEET_H("div",{className:"empty"}, "No cars under this flag.",
          FLEET_H("div",null, FLEET_H("button",{className:"btn",onClick:()=>setFilter(null)},"Clear filter")))
  );
}

function App({ jump }) {
  const [fleet,      setFleet]      = useState(null);
  const [svcLogs,    setSvcLogs]    = useState({});
  const [svcHistory, setSvcHistory] = useState({});
  const [selected,   setSelected]   = useState(()=>{
    const p = new URLSearchParams(window.location.search).get("truck");
    return (p && TRUCKS.includes(p)) ? p : "HD6";
  });
  useEffect(()=>{
    if(jump && jump.truck && TRUCKS.includes(jump.truck)) setSelected(jump.truck);
  },[jump]);
  const [loaded,     setLoaded]     = useState(false);
  const [error,      setError]      = useState(null);
  const [syncedAt,   setSyncedAt]   = useState(null);
  const [syncAgo,    setSyncAgo]    = useState('');
  const [logMode,    setLogMode]    = useState(false);
  const [checked,    setChecked]    = useState({});
  const [showSuccess,   setShowSuccess]   = useState(false);
  const [techName,      setTechName]      = useState("Geoff Fitzjarrell");
  const [svcNotes,      setSvcNotes]      = useState("");
  const [tickets,       setTickets]       = useState({});
  const [dailyHours,    setDailyHours]    = useState({});
  const [expandedTask,  setExpandedTask]  = useState(null);
  const [groundingNote, setGroundingNote] = useState('');
  const [groundingBusy, setGroundingBusy] = useState(false);
  const [saving,        setSaving]        = useState(false);
  const [saveError,     setSaveError]     = useState(null);
  const [transitioning,setTransitioning]=useState(false);
  const [displayKey, setDisplayKey] = useState(0);
  const [countedHours,setCountedHours]=useState(null);
  const [svcLookup, setSvcLookup] = useState("");
  const prevHoursRef = useRef(null);

  async function loadAll() {
    setError(null);
    try {
      const bust="?_="+Date.now();
      const [r1,r2,r3,r4,r5]=await Promise.all([fetch(DATA_URL+bust),fetch(LOGS_URL+bust),fetch(HISTORY_URL+bust),fetch(TICKETS_URL+bust),fetch(DAILY_HOURS_URL+bust)]);
      if(!r1.ok) throw new Error();
      const [data,seedLogs,hist,tix,dh]=await Promise.all([r1.json(),r2.ok?r2.json():{},r3.ok?r3.json():{},r4.ok?r4.json():{},r5.ok?r5.json():{}]);
      setTickets(tix||{});
      setDailyHours(dh||{});
      const fl={};
      for(const t of TRUCKS) fl[t]={hours:null,intervalStart:0,overdue:false,technician:"",lastUpdated:null,postedBy:null,...(data[t]||{})};
      setFleet(fl);
      setSvcHistory(hist);
      const logs={};
      for(const t of TRUCKS){
        const base=seedLogs[t]||{};
        try{const local=localStorage.getItem("svc:"+t);const lo=local?JSON.parse(local):{};const merged={...base};for(const[k,v]of Object.entries(lo))if(!merged[k]||v>merged[k])merged[k]=v;logs[t]=merged;}
        catch(e){logs[t]=base;}
      }
      setSvcLogs(logs);
      setSyncedAt(new Date());
    } catch(e){setError("Fleet data unavailable.");}
    setLoaded(true);
  }

  useEffect(()=>{
    loadAll();
    const ar=setInterval(()=>{
      const jst=new Date(Date.now()+9*3600*1000).getUTCHours();
      if(jst>=6&&jst<22) loadAll();
    },5*60*1000);
    return()=>clearInterval(ar);
  },[]);

  useEffect(()=>{
    function upd(){if(!syncedAt){setSyncAgo('');return;}const m=Math.floor((Date.now()-syncedAt.getTime())/60000);setSyncAgo(m===0?'just now':m===1?'1 min ago':m+' min ago');}
    upd();const t=setInterval(upd,30000);return()=>clearInterval(t);
  },[syncedAt]);

  useEffect(()=>{
    if(!loaded) return;
    const truck=fleet?fleet[selected]:null;
    const hours=truck?.hours??null;
    if(hours==null){setCountedHours(null);prevHoursRef.current=null;return;}
    const start=prevHoursRef.current??hours,end=hours;
    if(start===end){setCountedHours(hours);return;}
    const dur=600,t0=performance.now();
    function tick(now){const p=Math.min((now-t0)/dur,1);const ease=1-Math.pow(1-p,3);setCountedHours(Math.round(start+(end-start)*ease));if(p<1)requestAnimationFrame(tick);else prevHoursRef.current=end;}
    requestAnimationFrame(tick);
  },[selected,displayKey,loaded]);

  function handleTabClick(t){
    if(t===selected)return;
    setTransitioning(true);
    setTimeout(()=>{setSelected(t);setLogMode(false);setChecked({});setTransitioning(false);setDisplayKey(k=>k+1);},180);
  }

  if(!loaded)return React.createElement("div",{className:"full-center"},React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:11,color:"#38465a",letterSpacing:"0.12em"}},"LOADING FLEET DATA..."));
  if(error)return React.createElement("div",{className:"full-center"},React.createElement("div",{className:"err-msg"},error),React.createElement("button",{className:"btn-ghost",onClick:loadAll},"RETRY"));

  const truck=fleet[selected];
  const log=svcLogs[selected]||{};
  const hours=truck.hours;
  const isGrounded=!!truck.grounded;

  const taskStatus=tasksForTruck(selected).map(task=>{
    const last=log[task.key];
    const hasRec=last!=null;
    const since=hasRec&&hours!=null?hours-last:null;
    const rem=since!=null?task.interval-since:null;
    const pct=since!=null?Math.min(since/task.interval,1):(hours!=null&&!hasRec&&task.key!=="airfilter_clean"&&hours>=task.interval?1:0);
    const status=hours==null?"unknown":!hasRec&&task.key==="airfilter_clean"?"no_record":!hasRec&&hours<task.interval?"no_record":!hasRec?pastDueStatus(task):ratioStatus(task,since/task.interval);
    return {...task,last,hasRec,since,rem,pct,status};
  });

  const anyOverdue=!isGrounded&&taskStatus.some(t=>t.status==="overdue");
  const anyWarn=!isGrounded&&taskStatus.some(t=>t.status==="warn");
  const anyDue=!isGrounded&&taskStatus.some(t=>t.status==="due");
  const recordedTasks = taskStatus.filter(t => t.since != null);
  const criticalTask = isGrounded ? null
    : recordedTasks.length > 0
      ? recordedTasks.reduce((a,b) => a.pct >= b.pct ? a : b)
      : null;
  const isOverdue=anyOverdue;

  function truckStatus(t){
    const td=fleet[t];const tl=svcLogs[t]||{};
    if(td.grounded)return "grounded";
    if(!td.hours)return "none";
    const tasksHere=tasksForTruck(t);
    // Mirrors taskStatus's per-task logic above: a task with no record is
    // "overdue" once the truck's hours pass its interval (unless it's the
    // HD5-only airfilter_clean task or hours haven't reached the interval yet).
    // Previously this only looked at tasks with a log entry, so a truck with an
    // un-logged overdue task could show "OK" on the fleet view while its own
    // detail page showed OVERDUE — this keeps the two in sync.
    const statuses = tasksHere.map(task=>{
      const last=tl[task.key];
      if(last==null){
        return (task.key==="airfilter_clean"||td.hours<task.interval) ? "ok" : pastDueStatus(task);
      }
      return ratioStatus(task, (td.hours-last)/task.interval);
    });
    if(statuses.includes("overdue"))return "overdue";
    if(statuses.includes("warn"))return "warn";
    if(statuses.includes("due"))return "due";
    return "ok";
  }

  // Same per-task logic as taskStatus/truckStatus above, but for one named
  // task across an arbitrary truck — powers the Service Lookup dropdown so
  // "who needs an oil change" can be answered without opening every tab.
  function taskStatusForTruck(t, taskKey){
    const task=TASKS.find(x=>x.key===taskKey);
    const td=fleet[t];
    if(!task||!td)return null;
    if(td.grounded)return{status:"grounded",pct:0,hours:td.hours};
    const hrs=td.hours;
    if(hrs==null)return{status:"unknown",pct:0,hours:null};
    const last=(svcLogs[t]||{})[taskKey];
    if(last==null){
      if(taskKey==="airfilter_clean"||hrs<task.interval){
        return{status:"no_record",pct:Math.min(hrs/task.interval,1),hours:hrs,dueAt:task.interval,remaining:task.interval-hrs};
      }
      return{status:pastDueStatus(task),pct:1,hours:hrs,dueAt:task.interval,over:hrs-task.interval};
    }
    const since=hrs-last;
    const pct=Math.min(since/task.interval,1);
    const dueAt=last+task.interval;
    const status=ratioStatus(task, since/task.interval);
    return{status,pct,hours:hrs,since,dueAt,last,remaining:dueAt-hrs,over:hrs-dueAt};
  }

  async function handleToggleGrounded(){
    setGroundingBusy(true);
    const nowGrounded = !truck.grounded;
    const ok = await writeGrounded(selected, nowGrounded, groundingNote||"Under repair");
    if(ok){
      setFleet(f=>({...f,[selected]:{...f[selected],grounded:nowGrounded,groundedNote:groundingNote||"Under repair"}}));
      setGroundingNote('');
    }
    setGroundingBusy(false);
  }

  async function handleSave(){
    if(!hours)return;
    const newLog={...log};const done=[];
    for(const[k,v]of Object.entries(checked)){if(v){newLog[k]=hours;const t=TASKS.find(x=>x.key===k);if(t)done.push(t);}}
    if(!done.length){setChecked({});setLogMode(false);return;}

    setSaving(true);setSaveError(null);

    // Write the authoritative record FIRST and wait for it — this is the write
    // that actually clears "overdue" on the dashboard. Only once we know it has
    // landed do we touch local state / show success, so a failure here can never
    // look like a successful save (this is what silently ate an HD9 completion
    // before: the notification fired regardless of whether this write worked).
    const noteList = svcNotes.trim() ? [svcNotes.trim()] : [];
    const ok = await writeServiceLogToRepo(selected,newLog,{
      technician:techName,
      hours,
      tasks:done.map(t=>({key:t.key,label:t.name})),
      notes:noteList
    });

    // The pending entry drives the Slack "tasks completed" notification. It also
    // doubles as a safety net: if the write above failed, alreadyLogged=false
    // tells the cron job to promote this entry into service_logs/service_history
    // itself on its next run, so the completion still isn't lost — Geoff just
    // needs to know it didn't land instantly.
    await writePending({
      truck:selected,
      tasks:done.map(t=>t.name),
      technician:techName,
      postedBy:truck.postedBy,
      loggedAt:new Date().toISOString(),
      hours,
      notes:noteList,
      alreadyLogged: ok,
    });

    if(ok){
      setSvcLogs(p=>({...p,[selected]:newLog}));
      try{localStorage.setItem("svc:"+selected,JSON.stringify(newLog));}catch(e){}
      setSvcHistory(p=>{
        const arr=p[selected]?[...p[selected]]:[];
        arr.push({date:new Date().toISOString().slice(0,10),hours,technician:techName,tasks:done.map(t=>({key:t.key,label:t.name})),notes:noteList});
        return {...p,[selected]:arr};
      });
      setChecked({});setLogMode(false);setSvcNotes("");
      setShowSuccess(true);setTimeout(()=>setShowSuccess(false),1400);
    } else {
      // Leave checked/logMode as-is so Geoff can see exactly what didn't save
      // and hit Save again — it'll sync automatically via the cron safety net
      // even if this retry also fails.
      setSaveError("Couldn't reach the repo — this will auto-sync within a few hours via the scheduled job, but you can also try Save again now.");
    }
    setSaving(false);
  }

  const fleetCounts = TRUCKS.reduce((acc,t)=>{
    const st=truckStatus(t);
    if(st==="overdue") acc.overdue++;
    else if(st==="warn") acc.warn++;
    else if(st==="due") acc.due++;
    else if(st==="ok") acc.ok++;
    else if(st==="grounded") acc.grounded++;
    return acc;
  },{overdue:0,warn:0,due:0,ok:0,grounded:0});

  const statusLabel={ok:"OK",warn:"DUE SOON",due:"DUE",overdue:"OVERDUE",unknown:"—",no_record:"UPCOMING"};
  const overdueTasks=taskStatus.filter(t=>t.status==="overdue");
  const warnTasks=taskStatus.filter(t=>t.status==="warn");
  const dueTasks=taskStatus.filter(t=>t.status==="due");
  const histEntries=(svcHistory[selected]||[]).filter(e=>e.date||e.hours).slice().reverse();

  // Newest lastUpdated across the fleet = how fresh the *data* is (distinct
  // from syncedAt, which is only when this page last fetched). This is the
  // number that answers "am I looking at stale cache?" — the HD6 false-green
  // incident on 7/7 was exactly this confusion.

                React.createElement("span",{style:{fontFamily:"var(--mono)",fontSize:9,padding:"2px 6px",borderRadius:3,flexShrink:0,background:tk.status==="Blocked"?"var(--red-dim)":tk.status==="Backlog"?"var(--surface3)":"var(--blue-dim)",color:tk.status==="Blocked"?"var(--red)":tk.status==="Backlog"?"var(--text-faint)":"var(--blue)"}},tk.status)
              ))
            )
            :React.createElement("div",{className:"empty-msg"},"No open tickets for this truck")
        ),
        React.createElement("div",null,
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            React.createElement("div",{className:"section-title",style:{marginBottom:0}},selected+" — Service Log"),
            React.createElement("button",{className:"btn-ghost",onClick:exportHistoryCsv,title:"Download service history for all trucks as CSV"},"⬇ EXPORT CSV")
          ),
          !histEntries.length?React.createElement("div",{className:"empty-msg"},"No service records found for this truck."):
          React.createElement("table",{className:"history-table"},
            React.createElement("thead",null,React.createElement("tr",null,
              React.createElement("th",null,"Date"),React.createElement("th",null,"Hours"),
              React.createElement("th",null,"Technician"),React.createElement("th",null,"Work Performed")
            )),
            React.createElement("tbody",null,histEntries.map((e,i)=>
              React.createElement("tr",{key:i},
                React.createElement("td",{className:"h-date"},e.date||"—"),
                React.createElement("td",{className:"h-hours"},e.hours!=null?e.hours+"h":"—"),
                React.createElement("td",{className:"h-tech"},e.technician||"—"),
                React.createElement("td",null,React.createElement("div",{className:"h-tasks"},
                  ...(e.tasks||[]).map(t=>React.createElement("span",{key:t.key,className:"h-task-tag"},t.label)),
                  ...(e.notes||[]).map((n,ni)=>React.createElement("span",{key:"n"+ni,className:"h-note-tag"},n))
                ))
              )
            ))
          )
        )
      )
    )
  );
}

// ══ Fleet planning view (week-calendar Gantt) ═══════════════════════════════
const SCHEDULE_URL = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/schedule.json";
const PH = React.createElement;

// engineers seen historically + known Japan VOps field techs
const KNOWN_ENGINEERS = ["Geoff Fitzjarrell","Masakiyo Kato","Jake Albano","Thapa Biliv","Reon Zeniya","Junichi Tamagawa","Andy"];
// fold short/variant names into one canonical engineer
const ENG_ALIASES = { "masakiyo":"Masakiyo Kato", "kato":"Masakiyo Kato", "jake":"Jake Albano", "geoff":"Geoff Fitzjarrell", "thapa":"Thapa Biliv", "reon":"Reon Zeniya", "junichi":"Junichi Tamagawa" };
function canonEng(name){ if(!name) return name; return ENG_ALIASES[String(name).trim().toLowerCase()] || String(name).trim(); }
const TYPE_META = {
  mission:      { c:"var(--blue)",  bg:"rgba(74,124,245,.16)",  lbl:"Mission" },
  calibration:  { c:"var(--amber)", bg:"rgba(240,165,0,.14)",   lbl:"Calibration" },
  maintenance:  { c:"var(--green)", bg:"rgba(61,168,112,.16)",  lbl:"Maintenance" },
  ticket:       { c:"var(--red)",   bg:"rgba(224,69,69,.14)",   lbl:"Open ticket" },
  planned:      { c:"#9880cc",      bg:"rgba(152,128,204,.16)", lbl:"Planned" },
  other:        { c:"var(--text-dim)", bg:"rgba(120,140,170,.12)", lbl:"Other" }
};
// PRE-PACKAGED PRESETS — filter what shows on the plan
const PRESETS = {
  all:          { name:"All activity",      types:["mission","calibration","maintenance","planned","ticket","other"], groupBy:"truck" },
  maint:        { name:"Maintenance only",  types:["maintenance","planned"], groupBy:"truck" },
  missions:     { name:"Missions & cal",    types:["mission","calibration"], groupBy:"truck" },
  byeng:        { name:"By engineer",       types:["mission","calibration","maintenance","planned"], groupBy:"engineer" },
  tickets:      { name:"Open tickets",      types:["ticket","planned"], groupBy:"truck" }
};

function mondayOf(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function iso(d){ return new Date(d).toISOString().slice(0,10); }
function fmtWk(d){ return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function truckNum(t){ const m=/HD(\d+)/.exec(t); return m?+m[1]:999; }
function initials(name){ if(!name||name==="Unassigned") return "—"; return name.split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function engColor(name){ // deterministic hue per engineer
  if(!name||name==="Unassigned") return "#3a465e";
  let h=0; for(const ch of name) h=(h*31+ch.charCodeAt(0))%360; return `hsl(${h} 55% 42%)`;
}

function loadOverrides(){ try{ return JSON.parse(localStorage.getItem("planner_assign")||"{}"); }catch(e){ return {}; } }
function saveOverrides(o){ try{ localStorage.setItem("planner_assign",JSON.stringify(o)); }catch(e){} }

function PlanningView({ onOpenTruck }){
  const [sched,setSched]     = useState(null);
  const [history,setHistory] = useState({});
  const [tickets,setTickets] = useState({});
  const [data,setData]       = useState({});
  const [err,setErr]         = useState(false);
  const [weekStart,setWeekStart] = useState(()=> addDays(mondayOf(new Date()), -7));
  const [weeks,setWeeks]         = useState(4);
  const [preset,setPreset]       = useState("all");
  const [show,setShow]           = useState({ label:true, eng:true, shift:false });
  const [ov,setOv]               = useState(loadOverrides);
  const [editing,setEditing]     = useState(null);   // item id being reassigned
  const [imp,setImp]             = useState({ url:"", note:"" });
  const [q,setQ]                 = useState("");
  const [board,setBoard]         = useState("ALL");

  useEffect(()=>{
    const bust = "?t="+Date.now();
    Promise.all([
      fetch(SCHEDULE_URL+bust).then(r=>r.ok?r.json():{}).catch(()=>({})),
      fetch(HISTORY_URL+bust).then(r=>r.ok?r.json():{}).catch(()=>({})),
      fetch(TICKETS_URL+bust).then(r=>r.ok?r.json():{}).catch(()=>({})),
      fetch(DATA_URL+bust).then(r=>r.ok?r.json():{}).catch(()=>({})),
    ]).then(([s,h,t,d])=>{ setSched(s); setHistory(h||{}); setTickets(t||{}); setData(d||{}); })
      .catch(()=>setErr(true));
  },[]);

  const roster = React.useMemo(()=>{
    const set=new Set(KNOWN_ENGINEERS);
    Object.values(history).forEach(arr=>(arr||[]).forEach(e=>e.technician&&set.add(canonEng(e.technician))));
    return ["Unassigned",...[...set].sort()];
  },[history]);

  // assemble items: {id, truck, date, type, label, eng, hours, url}
  const items = React.useMemo(()=>{
    const out=[];
    if(sched) Object.entries(sched).forEach(([truck,days])=>{
      Object.entries(days).forEach(([date,acts])=>acts.forEach((a,i)=>{
        const id=`${truck}|${date}|s${i}`;
        out.push({ id, truck, date, type:a.type, label:a.label, shift:a.shift, eng:ov[id]||"Unassigned" });
      }));
    });
    Object.entries(history).forEach(([truck,arr])=>(arr||[]).forEach((e,i)=>{
      const id=`${truck}|${e.date}|h${i}`;
      const lbl=(e.tasks||[]).map(t=>t.label).join(", ")||"Service";
      out.push({ id, truck, date:e.date, type:"maintenance", label:lbl, hours:e.hours,
                 eng:ov[id]||canonEng(e.technician)||"Unassigned", historical:true });
    }));
    return out;
  },[sched,history,ov]);

  if(err) return PH("div",{style:{padding:40,color:"var(--red)",fontFamily:"var(--mono)"}},"Plan data unavailable — check connection.");
  if(!sched) return PH("div",{style:{padding:40,color:"var(--text-dim)",fontFamily:"var(--mono)"}},"Loading plan…");

  const P = PRESETS[preset];
  const wkDates = Array.from({length:weeks},(_,i)=>addDays(weekStart,i*7));
  const rangeStart=iso(weekStart), rangeEnd=iso(addDays(weekStart,weeks*7-1));
  const inRange = it => it.date>=rangeStart && it.date<=rangeEnd && P.types.includes(it.type);
  const ql = q.trim().toLowerCase();
  const matchQ = it => !ql || [it.truck,it.label,it.eng,it.type,it.shift,it.date].some(v=>String(v||"").toLowerCase().includes(ql));
  const visible = it => inRange(it) && matchQ(it);
  const matchCount = ql ? items.filter(visible).length : 0;
  const todayISO = iso(new Date());

  // group rows
  let groups;
  if(P.groupBy==="engineer"){
    const byE={}; items.filter(visible).forEach(it=>{ (byE[it.eng]=byE[it.eng]||[]).push(it); });
    groups = roster.filter(e=>byE[e]).map(e=>({ key:e, label:e, sub:engColor(e), items:byE[e] }));
    if(!groups.length) groups=[{key:"Unassigned",label:"Unassigned",items:[]}];
  } else {
    const trucks = Object.keys(data).length ? Object.keys(data) : [...new Set(items.map(i=>i.truck))];
    groups = trucks.sort((a,b)=>truckNum(a)-truckNum(b)).map(t=>{
      const td=data[t]||{};
      const sub = td.overdue? "overdue" : (td.hours!=null? td.hours+"h":"");
      return { key:t, label:t, sub, overdue:td.overdue, items:items.filter(it=>it.truck===t && visible(it)) };
    });
  }

  const wkOf = date => Math.floor((new Date(date)-weekStart)/(7*864e5));

  function reassign(id,eng){
    const next={...ov}; if(eng==="Unassigned") delete next[id]; else next[id]=eng;
    setOv(next); saveOverrides(next); setEditing(null);
  }

  const COLW=190, LABELW=140;

  // backlog: unscheduled open tickets
  let backlog=[]; Object.entries(tickets).forEach(([truck,arr])=>(arr||[]).forEach(t=>backlog.push({...t,truck})));
  if(ql) backlog=backlog.filter(t=>[t.truck,t.key,t.summary,t.status,t.priority].some(v=>String(v||"").toLowerCase().includes(ql)));
  const boardOf = t => String(t.key||"").split("-")[0].toUpperCase();
  const boards = [...new Set(backlog.map(boardOf))].filter(Boolean).sort();
  const boardCount = b => backlog.filter(t=>boardOf(t)===b).length;
  const backlogShown = board==="ALL" ? backlog : backlog.filter(t=>boardOf(t)===board);

  const cell = (v,style)=>PH("div",{style:Object.assign({padding:"0 8px"},style)},v);

  return PH("div",{style:{padding:"14px 18px 40px",fontFamily:"var(--sans)"}},
    // ── control bar ──
    PH("div",{style:{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",marginBottom:14}},
      PH("div",{style:{display:"flex",gap:2,alignItems:"center"}},
        PH("button",{onClick:()=>setWeekStart(addDays(weekStart,-weeks*7)),style:navBtn},"‹"),
        PH("button",{onClick:()=>setWeekStart(addDays(mondayOf(new Date()),-7)),style:navBtn},"Today"),
        PH("button",{onClick:()=>setWeekStart(addDays(weekStart,weeks*7)),style:navBtn},"›")
      ),
      PH("div",{style:{position:"relative",display:"flex",alignItems:"center"}},
        PH("input",{value:q,onChange:e=>setQ(e.target.value),placeholder:"Search truck, engineer, mission…",
          style:{...sel,width:230,paddingLeft:26}}),
        PH("span",{style:{position:"absolute",left:8,fontSize:12,color:"var(--text-faint)"}},"⌕"),
        q?PH("button",{onClick:()=>setQ(""),title:"clear",
          style:{...navBtn,padding:"3px 7px",marginLeft:4}},"×"):null,
        q?PH("span",{style:{marginLeft:8,fontSize:11,fontFamily:"var(--mono)",
          color:matchCount?"var(--green)":"var(--text-faint)"}},matchCount+" match"+(matchCount===1?"":"es")):null
      ),
      PH("select",{value:preset,onChange:e=>setPreset(e.target.value),style:sel},
        Object.entries(PRESETS).map(([k,v])=>PH("option",{key:k,value:k},v.name))),
      PH("select",{value:weeks,onChange:e=>setWeeks(+e.target.value),style:sel},
        [4,6,8,12].map(n=>PH("option",{key:n,value:n},n+" weeks"))),
      PH("div",{style:{display:"flex",gap:12,marginLeft:"auto",fontSize:12,color:"var(--text-dim)"}},
        ["label","eng","shift"].map(k=>PH("label",{key:k,style:{display:"flex",gap:4,cursor:"pointer",textTransform:"capitalize"}},
          PH("input",{type:"checkbox",checked:show[k],onChange:()=>setShow({...show,[k]:!show[k]})}),
          k==="eng"?"engineer":k))
      )
    ),
    // ── legend ──
    PH("div",{style:{display:"flex",gap:14,marginBottom:10,fontSize:11,color:"var(--text-dim)",flexWrap:"wrap"}},
      Object.entries(TYPE_META).filter(([k])=>P.types.includes(k)).map(([k,m])=>
        PH("span",{key:k,style:{display:"flex",gap:5,alignItems:"center"}},
          PH("span",{style:{width:10,height:10,borderRadius:2,background:m.c,display:"inline-block"}}),m.lbl))
    ),
    // ── grid ──
    PH("div",{style:{border:"1px solid var(--border)",borderRadius:"var(--radius)",overflow:"auto",background:"var(--surface)"}},
      // header
      PH("div",{style:{display:"grid",gridTemplateColumns:`${LABELW}px repeat(${weeks},${COLW}px)`,
                       position:"sticky",top:0,zIndex:3,background:"var(--surface2)",borderBottom:"1px solid var(--border2)"}},
        cell(P.groupBy==="engineer"?"ENGINEER":"TRUCK",{fontSize:10,letterSpacing:".08em",color:"var(--text-faint)",
             padding:"10px 8px",position:"sticky",left:0,background:"var(--surface2)",zIndex:2}),
        wkDates.map((d,i)=>PH("div",{key:i,style:{padding:"8px",fontSize:11,fontFamily:"var(--mono)",
             color: iso(d)<=todayISO && iso(addDays(d,6))>=todayISO ? "var(--f1red)":"var(--text-dim)",
             borderLeft:"1px solid var(--border)"}},"W "+fmtWk(d)))
      ),
      // rows
      groups.map(g=>{
        const byWk = Array.from({length:weeks},()=>[]);
        g.items.forEach(it=>{ const w=wkOf(it.date); if(w>=0&&w<weeks) byWk[w].push(it); });
        byWk.forEach(a=>a.sort((x,y)=>x.date.localeCompare(y.date)));
        return PH("div",{key:g.key,style:{display:"grid",gridTemplateColumns:`${LABELW}px repeat(${weeks},${COLW}px)`,
                       borderBottom:"1px solid var(--border)",minHeight:54}},
          // row label
          PH("div",{onClick:()=>P.groupBy!=="engineer"&&onOpenTruck&&onOpenTruck(g.key),
            style:{position:"sticky",left:0,zIndex:1,background:"var(--surface)",borderRight:"1px solid var(--border2)",
                   padding:"8px",cursor:P.groupBy==="engineer"?"default":"pointer",display:"flex",flexDirection:"column",justifyContent:"center"}},
            PH("div",{style:{display:"flex",gap:6,alignItems:"center",fontWeight:700,fontSize:13,
                      fontFamily:"var(--mono)",color:g.overdue?"var(--red)":"var(--text)"}},
              P.groupBy==="engineer"?PH("span",{style:{width:8,height:8,borderRadius:"50%",background:g.sub,flexShrink:0}}):null, g.label),
            g.sub&&P.groupBy!=="engineer"?PH("div",{style:{fontSize:10,color:g.overdue?"var(--red)":"var(--text-faint)"}},
               g.overdue?"OVERDUE":g.sub):null
          ),
          // week cells with stacked chips
          byWk.map((cellItems,i)=>{
            const d=wkDates[i];
            const isNow = iso(d)<=todayISO && iso(addDays(d,6))>=todayISO;
            return PH("div",{key:i,style:{borderLeft:"1px solid var(--border)",padding:"6px 6px",
                 background:isNow?"rgba(225,6,0,.05)":"transparent",display:"flex",flexDirection:"column",gap:6}},
              cellItems.map(it=>{
                const m=TYPE_META[it.type]||TYPE_META.other;
                const dd=new Date(it.date);
                const day=dd.toLocaleDateString("en-US",{weekday:"short"});
                return PH("div",{key:it.id,title:`${it.truck} · ${it.date} · ${m.lbl}\n${it.label}`,
                  onClick:()=>setEditing(editing===it.id?null:it.id),
                  style:{position:"relative",cursor:"pointer",background:m.bg,border:`1px solid ${m.c}`,
                         borderLeft:`3px solid ${m.c}`,borderRadius:4,padding:"5px 8px",opacity:it.historical?.9:1}},
                  PH("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,
                       marginBottom:show.label?3:0}},
                    PH("span",{style:{fontSize:9,fontFamily:"var(--mono)",color:m.c,fontWeight:700,whiteSpace:"nowrap"}},
                      day+" "+dd.getDate()+(show.shift&&it.shift?" · "+it.shift:"")),
                    show.eng&&P.groupBy!=="engineer"?PH("span",{style:{fontSize:9,color:"#fff",flexShrink:0,
                         background:engColor(it.eng),borderRadius:3,padding:"1px 5px"}},initials(it.eng)):null
                  ),
                  show.label?PH("div",{style:{fontSize:11,lineHeight:1.3,color:"var(--text)",
                       display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden",wordBreak:"break-word"}},it.label):null,
                  editing===it.id?PH("div",{style:{position:"absolute",top:"100%",left:0,zIndex:10,marginTop:3,
                       background:"var(--surface3)",border:"1px solid var(--border2)",borderRadius:5,padding:6,minWidth:160,
                       boxShadow:"0 6px 18px rgba(0,0,0,.5)"}},
                    PH("div",{style:{fontSize:9,color:"var(--text-faint)",marginBottom:4}},"ASSIGN ENGINEER"),
                    PH("select",{value:it.eng,onChange:e=>reassign(it.id,e.target.value),style:{width:"100%",...sel,fontSize:11}},
                      roster.map(r=>PH("option",{key:r,value:r},r)))
                  ):null
                );
              })
            );
          })
        );
      })
    ),
    // ── backlog + dashboard import ──
    PH("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginTop:16}},
      PH("div",{style:panel},
        PH("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}},
          PH("div",{style:{...panelH,marginBottom:0}},"BACKLOG · open tickets"),
          PH("div",{style:{display:"flex",gap:4}},
            ["ALL",...boards].map(b=>PH("button",{key:b,onClick:()=>setBoard(b),
              style:{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,letterSpacing:".04em",cursor:"pointer",
                     borderRadius:4,padding:"3px 8px",border:"1px solid "+(board===b?"var(--f1red)":"var(--border2)"),
                     background:board===b?"var(--f1red)":"var(--surface3)",color:board===b?"#fff":"var(--text-dim)"}},
              b+(b==="ALL"?" "+backlog.length:" "+boardCount(b))))
          )
        ),
        backlogShown.length?backlogShown.slice(0,14).map(t=>PH("div",{key:t.key,style:{display:"flex",gap:8,alignItems:"center",
             padding:"5px 0",borderBottom:"1px solid var(--border)",fontSize:12}},
          PH("span",{style:{fontFamily:"var(--mono)",color:"var(--f1red)",fontWeight:700,minWidth:74}},t.truck),
          PH("a",{href:t.url,target:"_blank",style:{color:"var(--blue)",fontFamily:"var(--mono)",fontSize:11}},t.key),
          PH("span",{style:{color:"var(--text-dim)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.summary)
        )):PH("div",{style:{color:"var(--text-faint)",fontSize:12}},"No open tickets.")
      ),
      PH("div",{style:panel},
        PH("div",{style:panelH},"IMPORT FROM DASHBOARD"),
        PH("div",{style:{fontSize:12,color:"var(--text-dim)",marginBottom:8}},
          "Paste the dashboard URL to auto-parse rows into this plan. Parser wires up once the source format is confirmed."),
        PH("div",{style:{display:"flex",gap:6}},
          PH("input",{placeholder:"https://…",value:imp.url,onChange:e=>setImp({...imp,url:e.target.value}),
               style:{flex:1,...sel}}),
          PH("button",{onClick:()=>setImp({...imp,note:imp.url?"Saved — parser will map this source next pass.":"Enter a URL first."}),
               style:navBtn},"Parse")
        ),
        imp.note?PH("div",{style:{marginTop:8,fontSize:11,color:"var(--amber)"}},imp.note):null
      )
    )
  );
}
const navBtn={background:"var(--surface3)",color:"var(--text)",border:"1px solid var(--border2)",borderRadius:5,
  padding:"5px 10px",fontSize:12,cursor:"pointer",fontFamily:"var(--sans)"};
const sel={background:"var(--surface3)",color:"var(--text)",border:"1px solid var(--border2)",borderRadius:5,
  padding:"5px 8px",fontSize:12,fontFamily:"var(--sans)"};
const panel={background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:14};
const panelH={fontSize:10,letterSpacing:".08em",color:"var(--text-faint)",marginBottom:10,fontWeight:700};

function Root(){
  const params = new URLSearchParams(window.location.search);
  const [tab,setTab] = useState(params.get("truck") ? "detail" : "plan");
  const [jump,setJump] = useState(null);
  const openTruck = (id)=>{ setJump({truck:id, n:Date.now()}); setTab("detail"); };
  return React.createElement("div",{className:"app-shell"},
    React.createElement("div",{className:"app-tabs"},
      React.createElement("button",{className:"app-tab"+(tab==="plan"?" active":""),onClick:()=>setTab("plan")},"Fleet"),
      React.createElement("button",{className:"app-tab"+(tab==="fleet"?" active":""),onClick:()=>setTab("fleet")},"Pit Wall"),
      React.createElement("button",{className:"app-tab"+(tab==="detail"?" active":""),onClick:()=>setTab("detail")},"Truck Detail")
    ),
    React.createElement("div",{className:"app-view"+(tab==="plan"?" show":"")},
      React.createElement(PlanningView,{onOpenTruck:openTruck})
    ),
    React.createElement("div",{className:"app-view"+(tab==="fleet"?" show":"")},
      React.createElement("div",{className:"pitwall"}, React.createElement(FleetView,{onOpenTruck:openTruck}))
    ),
    React.createElement("div",{className:"app-view"+(tab==="detail"?" show":"")},
      React.createElement(App,{jump})
    )
  );
}

ReactDOM.render(React.createElement(Root),document.getElementById("root"));
</script>
