<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD GEN2 · Generator Service Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0d12;
    --surface:   #13161e;
    --surface2:  #1a1e28;
    --border:    #252932;
    --border2:   #2e3440;
    --amber:     #f5a623;
    --amber-dim: #7a5010;
    --amber-glow:#f5a62322;
    --red:       #e05252;
    --red-dim:   #5a1f1f;
    --red-glow:  #e0525222;
    --green:     #4caf7d;
    --green-dim: #1a3d2b;
    --blue:      #5b8def;
    --text:      #e8eaf0;
    --text-dim:  #8b90a0;
    --text-faint:#454c5e;
    --mono:      'Space Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.15em; color: var(--amber); text-transform: uppercase;
  }
  .header-divider { width: 1px; height: 20px; background: var(--border2); }
  .header-title { font-size: 13px; color: var(--text-dim); font-weight: 400; letter-spacing: 0.02em; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sync-label { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.08em; }
  .refresh-btn {
    padding: 5px 12px; font-size: 11px; font-family: var(--mono); letter-spacing: 0.06em;
    background: transparent; color: var(--text-dim); border: 1px solid var(--border2);
    border-radius: 4px; cursor: pointer; transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* ── TRUCK SELECTOR ── */
  .truck-strip {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    background: var(--surface); overflow-x: auto;
    scrollbar-width: none;
  }
  .truck-strip::-webkit-scrollbar { display: none; }
  .truck-tab {
    flex: 1; min-width: 72px; padding: 10px 8px 9px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; border-right: 1px solid var(--border);
    border-bottom: 3px solid transparent;
    transition: all 0.15s; position: relative;
  }
  .truck-tab:last-child { border-right: none; }
  .truck-tab:hover { background: var(--surface2); }
  .truck-tab.active { border-bottom-color: var(--amber); background: var(--surface2); }
  .truck-tab.overdue { border-bottom-color: var(--red); }
  .truck-tab.active.overdue { border-bottom-color: var(--red); }
  .truck-name { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
  .truck-tab.active .truck-name { color: var(--amber); }
  .truck-tab.overdue .truck-name { color: var(--red); }
  .truck-hours { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.04em; }
  .truck-tab.overdue .truck-hours { color: var(--red); opacity: 0.8; }
  .status-pip {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-faint); position: absolute; top: 7px; right: 7px;
  }
  .status-pip.ok { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .status-pip.warn { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
  .status-pip.overdue { background: var(--red); box-shadow: 0 0 4px var(--red); }

  /* ── MAIN LAYOUT ── */
  .main { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 112px); overflow: hidden; }

  /* ── LEFT PANEL ── */
  .left-panel {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 28px 28px;
    background: var(--surface);
    overflow-y: auto;
  }
  .truck-label {
    font-family: var(--mono); font-size: 22px; font-weight: 700;
    letter-spacing: 0.12em; margin-bottom: 4px;
  }
  .truck-sublabel { font-size: 11px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 28px; }

  /* ── ARC GAUGE ── */
  .gauge-wrap { position: relative; width: 80px; height: 200px; flex-shrink: 0; }

  /* ── STATS ROW ── */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px;
  }
  .stat-label { font-size: 10px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: var(--mono); font-size: 20px; font-weight: 700; }
  .stat-value.overdue { color: var(--red); }
  .stat-value.warn { color: var(--amber); }
  .stat-unit { font-size: 11px; color: var(--text-faint); margin-left: 2px; }

  /* ── ATTENTION BANNER ── */
  .attention-banner {
    width: 100%; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px;
    background: var(--red-dim); border: 1px solid var(--red);
    display: flex; align-items: center; gap: 10px;
  }
  .attention-banner .icon { font-size: 14px; }
  .attention-banner .msg { font-size: 12px; color: #ffd5d5; line-height: 1.4; }

  /* ── REPORTER ── */
  .reporter-row { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; }
  .reporter-label { font-size: 10px; color: var(--text-faint); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 3px; }
  .reporter-name { font-size: 13px; color: var(--text-dim); }
  .reporter-time { font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }

  /* ── RIGHT PANEL ── */
  .right-panel { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; }

  .panel-section-title {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── TASK GRID ── */
  .task-grid { display: flex; flex-direction: column; gap: 6px; }
  .task-row {
    display: grid; grid-template-columns: 1fr 80px 90px 36px;
    align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    transition: border-color 0.15s;
  }
  .task-row.overdue { border-color: var(--red-dim); background: #1a1015; }
  .task-row.warn { border-color: var(--amber-dim); }
  .task-name { font-size: 13px; color: var(--text); }
  .task-interval { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .task-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 3px; text-align: center;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .task-badge.ok { background: var(--green-dim); color: var(--green); }
  .task-badge.warn { background: var(--amber-glow); color: var(--amber); }
  .task-badge.overdue { background: var(--red-dim); color: var(--red); }
  .task-badge.no_record { background: var(--surface); color: var(--text-faint); border: 1px solid var(--border); }

  .task-check {
    width: 20px; height: 20px; border-radius: 4px; cursor: pointer;
    border: 1px solid var(--border2); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .task-check.checked { background: var(--amber-dim); border-color: var(--amber); }
  .task-check.hidden { opacity: 0; pointer-events: none; }
  .task-check-inner { width: 10px; height: 10px; background: var(--amber); border-radius: 2px; display: none; }
  .task-check.checked .task-check-inner { display: block; }

  /* ── LOG BUTTON ── */
  .log-btn {
    align-self: flex-start; padding: 10px 20px;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--amber-dim); color: var(--amber);
    border: 1px solid var(--amber); border-radius: 5px;
    cursor: pointer; transition: all 0.15s;
  }
  .log-btn:hover { background: var(--amber); color: #000; }
  .log-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .log-btn.cancel { background: transparent; color: var(--text-dim); border-color: var(--border2); }
  .log-btn.cancel:hover { background: var(--surface2); color: var(--text); }

  .btn-row { display: flex; gap: 10px; align-items: center; }
  .save-note { font-size: 11px; color: var(--text-faint); }

  /* ── HISTORY LOG ── */
  .history-section { border-top: 1px solid var(--border); padding: 24px 32px; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .history-table th { text-align: left; padding: 6px 12px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); border-bottom: 1px solid var(--border); font-weight: 500; }
  .history-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: var(--surface2); }
  .history-date { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .history-hours { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--amber); white-space: nowrap; }
  .history-tech { color: var(--text-dim); }
  .history-tasks { display: flex; flex-wrap: wrap; gap: 4px; }
  .history-task-tag { padding: 2px 7px; background: var(--green-dim); color: var(--green); border-radius: 3px; font-size: 10px; letter-spacing: 0.04em; }
  .history-note-tag { padding: 2px 7px; background: var(--surface2); color: var(--text-faint); border-radius: 3px; font-size: 10px; border: 1px solid var(--border); }
  .empty-history { padding: 20px; color: var(--text-faint); font-size: 12px; text-align: center; }
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; gap: 10px; padding: 60px;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }
  .empty-msg { font-size: 13px; color: var(--text-faint); text-align: center; }

  /* ── ERROR / LOADING ── */
  .full-center {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px;
  }
  .error-msg { font-size: 13px; color: var(--red); max-width: 360px; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useCallback } = React;

const TRUCKS = ["HD5","HD6","HD7","HD8","HD9","HD10","HD11","HD12","HD13","HD14","HD15","HD16","HD17","HD18"];
const TASKS = [
  { key: "airfilter_battery", name: "Air filter & battery check",       interval: 50   },
  { key: "oil_filter",        name: "Oil / filter change",              interval: 150  },
  { key: "airfilter_clean",   name: "Air filter cleaning",              interval: 250  },
  
  { key: "coolant_lines",     name: "Check coolant lines",               interval: 250  },
  { key: "fuel_filter",       name: "Fuel filter change",                interval: 250  },
  { key: "drive_belt",        name: "Check drive belt & tension",        interval: 500  },
  { key: "radiator_airfilter",name: "Clean radiator & change air filter",interval: 500  },
];

const DATA_URL = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/data.json";
const GITHUB_OWNER = "Geoffrey-Fitzjarrell-ai";
const GITHUB_REPO  = "generator_servicing";
const GITHUB_TOKEN = "PASTE_YOUR_GITHUB_PAT_HERE";
const PENDING_PATH = "pending_completions.json";

function b64e(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64d(str) { return decodeURIComponent(escape(atob(str))); }

async function writePendingCompletion(entry) {
  if (GITHUB_TOKEN === "PASTE_YOUR_GITHUB_PAT_HERE") return;
  const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PENDING_PATH}`;
  const headers = { "Authorization": "Bearer " + GITHUB_TOKEN, "Accept": "application/vnd.github+json" };
  let existing = [], sha = null;
  try {
    const r = await fetch(url, { headers });
    if (r.ok) { const f = await r.json(); sha = f.sha; existing = JSON.parse(b64d(f.content.replace(/\n/g,""))); }
  } catch(e) {}
  existing.push(entry);
  const body = { message: "Log completion: " + entry.truck, content: b64e(JSON.stringify(existing, null, 2)) };
  if (sha) body.sha = sha;
  await fetch(url, { method: "PUT", headers: { ...headers, "Content-Type": "application/json" }, body: JSON.stringify(body) });
}

/* ── ARC GAUGE SVG ── */
function ArcGauge({ pct, overdue, hours }) {
  const W = 80, H = 200;
  const barX = 28, barW = 24, barH = 160, barY = 16;
  const fillH = Math.max(0, Math.min(barH, barH * pct));
  const fillY = barY + barH - fillH;
  const fillColor = overdue ? "#e05252" : pct > 0.8 ? "#f5a623" : "#4caf7d";
  const glowColor = overdue ? "#e0525233" : pct > 0.8 ? "#f5a62333" : "#4caf7d33";

  // tick marks at 25%, 50%, 75%
  const ticks = [0.25, 0.5, 0.75];

  return React.createElement("svg", { width: W, height: H, viewBox: `0 0 ${W} ${H}`, style:{overflow:"visible"} },
    // glow behind fill
    React.createElement("rect", { x: barX-3, y: fillY-3, width: barW+6, height: fillH+6, rx:6, fill: glowColor }),
    // track background
    React.createElement("rect", { x: barX, y: barY, width: barW, height: barH, rx:4, fill:"#1a1e28" }),
    // fill
    React.createElement("rect", { x: barX, y: fillY, width: barW, height: fillH, rx:4, fill: fillColor }),
    // track border
    React.createElement("rect", { x: barX, y: barY, width: barW, height: barH, rx:4, fill:"none", stroke:"#2e3440", strokeWidth:1 }),
    // tick marks
    ...ticks.map(t =>
      React.createElement("line", { key:t,
        x1: barX + barW, y1: barY + barH * (1 - t),
        x2: barX + barW + 6, y2: barY + barH * (1 - t),
        stroke:"#454c5e", strokeWidth:1
      })
    ),
    // 0 label
    React.createElement("text", { x: barX + barW + 10, y: barY + barH + 4,
      fontFamily:"'Space Mono',monospace", fontSize:8, fill:"#454c5e" }, "0"),
    // max label
    React.createElement("text", { x: barX + barW + 10, y: barY + 4,
      fontFamily:"'Space Mono',monospace", fontSize:8, fill:"#454c5e" }, "1k"),
    // hour value — rotated, runs alongside bar
    React.createElement("text", {
      x: barX - 8, y: barY + barH / 2,
      textAnchor:"middle",
      fontFamily:"'Space Mono',monospace", fontSize:11, fontWeight:700, fill: fillColor,
      transform: `rotate(-90, ${barX - 8}, ${barY + barH / 2})`
    }, hours != null ? hours + "h" : "—")
  );
}

/* ── MAIN APP ── */
function App() {
  const [fleetData,    setFleetData]    = useState(null);
  const [serviceLogs,  setServiceLogs]  = useState({});
  const [selected,     setSelected]     = useState("HD6");
  const [loaded,       setLoaded]       = useState(false);
  const [error,        setError]        = useState(null);
  const [fetchedAt,    setFetchedAt]    = useState(null);
  const [logMode,        setLogMode]        = useState(false);
  const [checkedTasks,   setCheckedTasks]   = useState({});
  const [serviceHistory, setServiceHistory] = useState({});

  async function loadServiceLogs() {
    let seed = {}, hist = {};
    try {
      const [r1, r2] = await Promise.all([
        fetch("https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/service_logs.json?_=" + Date.now()),
        fetch("https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/service_history.json?_=" + Date.now()),
      ]);
      if (r1.ok) seed = await r1.json();
      if (r2.ok) hist = await r2.json();
    } catch(e) {}
    setServiceHistory(hist);
    const logs = {};
    for (const t of TRUCKS) {
      const base = seed[t] || {};
      try {
        const local = localStorage.getItem("svclog:" + t);
        const localObj = local ? JSON.parse(local) : {};
        const merged = { ...base };
        for (const [k,v] of Object.entries(localObj)) { if (!merged[k] || v > merged[k]) merged[k] = v; }
        logs[t] = merged;
      } catch(e) { logs[t] = base; }
    }
    setServiceLogs(logs);
  }

  function saveServiceLog(truckId, log) {
    setServiceLogs(prev => ({ ...prev, [truckId]: log }));
    try { localStorage.setItem("svclog:" + truckId, JSON.stringify(log)); } catch(e) {}
  }

  async function loadData() {
    setError(null);
    try {
      const res = await fetch(DATA_URL + "?_=" + Date.now());
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      const result = {};
      for (const t of TRUCKS) result[t] = json[t] ? { hours: null, intervalStart: 0, overdue: false, technician: "", lastUpdated: null, postedBy: null, ...json[t] } : { hours: null, intervalStart: 0, overdue: false, technician: "", lastUpdated: null, postedBy: null };
      setFleetData(result);
      setFetchedAt(new Date());
    } catch(e) {
      setError("Fleet data unavailable. Check repo or wait for next sync.");
    }
    setLoaded(true);
  }

  useEffect(() => { loadData(); loadServiceLogs(); }, []);

  if (!loaded) return React.createElement("div", { className:"full-center" },
    React.createElement("div", { style:{ fontFamily:"'Space Mono',monospace", fontSize:11, color:"#454c5e", letterSpacing:"0.1em" } }, "LOADING FLEET DATA...")
  );
  if (error) return React.createElement("div", { className:"full-center" },
    React.createElement("div", { className:"error-msg" }, error),
    React.createElement("button", { className:"refresh-btn", onClick: loadData }, "RETRY")
  );

  const truck   = fleetData[selected];
  const log     = serviceLogs[selected] || {};
  const hours   = truck.hours;

  const taskStatus = TASKS.map(task => {
    const lastDone   = log[task.key];  // undefined if never recorded
    const hasRecord  = lastDone != null;
    const sinceLast  = hasRecord && hours != null ? hours - lastDone : null;
    const remaining  = sinceLast != null ? task.interval - sinceLast : null;
    const pctUsed    = sinceLast != null ? Math.min(sinceLast / task.interval, 1) : 0;
    const status     = hours == null ? "unknown"
                     : !hasRecord    ? "no_record"
                     : sinceLast >= task.interval ? "overdue"
                     : sinceLast >= task.interval * 0.9 ? "warn"
                     : "ok";
    return { ...task, lastDone, hasRecord, sinceLast, remaining, pctUsed, status };
  });

  const anyOverdue  = taskStatus.some(t => t.status === "overdue");
  const anyWarn     = taskStatus.some(t => t.status === "warn");
  const worstTaskPct = taskStatus.reduce((max, t) => Math.max(max, t.pctUsed), 0);
  const gaugePct    = worstTaskPct;
  const isOverdue   = anyOverdue;

  function truckPip(t) {
    const td  = fleetData[t];
    const tlog = serviceLogs[t] || {};
    if (td.hours == null) return "none";
    const over = TASKS.some(task => {
      const last = tlog[task.key];
      return last != null && (td.hours - last) >= task.interval;
    });
    if (over) return "overdue";
    const warn = TASKS.some(task => {
      const last = tlog[task.key];
      return last != null && (td.hours - last) >= task.interval * 0.9;
    });
    return warn ? "warn" : "ok";
  }

  function handleSave() {
    if (!hours) return;
    const newLog = { ...log };
    const done = [];
    for (const key of Object.keys(checkedTasks)) {
      if (checkedTasks[key]) { newLog[key] = hours; const t = TASKS.find(x => x.key === key); if (t) done.push(t.name); }
    }
    saveServiceLog(selected, newLog);
    if (done.length > 0) writePendingCompletion({ truck: selected, tasks: done, postedBy: truck.postedBy, loggedAt: new Date().toISOString() });
    setCheckedTasks({});
    setLogMode(false);
  }

  const statusLabel = { ok:"OK", warn:"DUE SOON", overdue:"OVERDUE", unknown:"—", no_record:"NO RECORD" };

  return React.createElement("div", null,
    // HEADER
    React.createElement("header", { className:"header" },
      React.createElement("div", { className:"header-left" },
        React.createElement("span", { className:"header-logo" }, "HD GEN2"),
        React.createElement("div", { className:"header-divider" }),
        React.createElement("span", { className:"header-title" }, "Generator Service Monitor")
      ),
      React.createElement("div", { className:"header-right" },
        React.createElement("div", { className:"sync-dot" }),
        React.createElement("span", { className:"sync-label" },
          fetchedAt ? "SYNCED " + fetchedAt.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) : "—"
        ),
        React.createElement("button", { className:"refresh-btn", onClick: loadData }, "↻ REFRESH")
      )
    ),
    // TRUCK STRIP
    React.createElement("nav", { className:"truck-strip" },
      TRUCKS.map(t => {
        const td   = fleetData[t];
        const pip  = truckPip(t);
        const cls  = ["truck-tab", t === selected ? "active" : "", pip === "overdue" ? "overdue" : ""].filter(Boolean).join(" ");
        return React.createElement("div", { key:t, className: cls, onClick: () => { setSelected(t); setLogMode(false); setCheckedTasks({}); } },
          React.createElement("div", { className: "status-pip " + (pip === "none" ? "" : pip) }),
          React.createElement("div", { className:"truck-name" }, t),
          React.createElement("div", { className:"truck-hours" },
            td.hours != null ? td.hours + "h" : "no data"
          )
        );
      })
    ),
    // MAIN
    React.createElement("div", { className:"main" },
      // LEFT
      React.createElement("div", { className:"left-panel" },
        React.createElement("div", { className:"truck-label" }, selected),
        React.createElement("div", { className:"truck-sublabel" }, "HD GEN2 · Japan Fleet"),
        React.createElement("div", { style:{ display:"flex", gap:20, alignItems:"flex-start", width:"100%", marginBottom:20 } },
          React.createElement(ArcGauge, { pct: gaugePct, overdue: isOverdue, hours }),
          React.createElement("div", { style:{ flex:1, display:"flex", flexDirection:"column", gap:10 } },
            React.createElement("div", { className:"stat-card" },
              React.createElement("div", { className:"stat-label" }, "Total Hours"),
              React.createElement("div", { className: "stat-value " + (isOverdue ? "overdue" : "") },
                hours != null ? hours : "—", React.createElement("span", { className:"stat-unit" }, hours != null ? "h" : "")
              )
            ),
            React.createElement("div", { className:"stat-card" },
              React.createElement("div", { className:"stat-label" }, "Next Service"),
              (() => {
                if (hours == null) return React.createElement("div", { className:"stat-value" }, "—");
                const overdueTasks = taskStatus.filter(t => t.status === "overdue");
                if (overdueTasks.length) {
                  return React.createElement("div", { style:{marginTop:4} },
                    React.createElement("div", { style:{fontFamily:"'Space Mono',monospace", fontSize:11, fontWeight:700, color:"var(--red)", marginBottom:6, letterSpacing:"0.06em"} }, "DUE NOW"),
                    ...overdueTasks.map(t =>
                      React.createElement("div", { key:t.key, style:{fontSize:11, color:"#ffd5d5", padding:"3px 0", borderBottom:"1px solid var(--red-dim)", lineHeight:1.4} }, t.name)
                    )
                  );
                }
                const warnTasks = taskStatus.filter(t => t.status === "warn");
                if (warnTasks.length) {
                  return React.createElement("div", { style:{marginTop:4} },
                    React.createElement("div", { style:{fontFamily:"'Space Mono',monospace", fontSize:11, fontWeight:700, color:"var(--amber)", marginBottom:6} }, "DUE SOON"),
                    ...warnTasks.map(t =>
                      React.createElement("div", { key:t.key, style:{fontSize:11, color:"#ffe4b5", padding:"3px 0", borderBottom:"1px solid var(--amber-dim)", lineHeight:1.4} }, t.name)
                    )
                  );
                }
                const known = taskStatus.filter(t => t.remaining != null);
                const next = known.length ? Math.round(Math.min(...known.map(t => t.remaining))) : null;
                return React.createElement("div", { className:"stat-value" },
                  next != null ? next : "—",
                  React.createElement("span", { className:"stat-unit" }, next != null ? "h" : "")
                );
              })()
            ),
            isOverdue ? React.createElement("div", { className:"attention-banner" },
              React.createElement("span", { className:"icon" }, "⚠"),
              React.createElement("div", { className:"msg" }, "Service required — visit this truck when available")
            ) : null
          )
        ),
        truck.postedBy ? React.createElement("div", { className:"reporter-row" },
          React.createElement("div", { className:"reporter-label" }, "Last reported by"),
          React.createElement("div", { className:"reporter-name" }, truck.postedBy.name || truck.technician),
          truck.lastUpdated ? React.createElement("div", { className:"reporter-time" }, new Date(truck.lastUpdated).toLocaleString()) : null
        ) : null
      ),
      // RIGHT
      React.createElement("div", { className:"right-panel" },
        React.createElement("div", null,
          React.createElement("div", { className:"panel-section-title" }, "Maintenance Schedule"),
          React.createElement("div", { className:"task-grid" },
            taskStatus.map(task =>
              React.createElement("div", { key: task.key, className: "task-row " + (task.status === "overdue" ? "overdue" : task.status === "warn" ? "warn" : "") },
                React.createElement("div", { className:"task-name" }, task.name),
                React.createElement("div", { className:"task-interval" }, task.interval + "h"),
                React.createElement("div", { className: "task-badge " + task.status }, statusLabel[task.status]),
                React.createElement("div", {
                  className: "task-check " + (logMode ? "" : "hidden") + " " + (checkedTasks[task.key] ? "checked" : ""),
                  onClick: () => logMode && setCheckedTasks(prev => ({ ...prev, [task.key]: !prev[task.key] }))
                },
                  React.createElement("div", { className:"task-check-inner" })
                )
              )
            )
          )
        ),
        React.createElement("div", { className:"btn-row" },
          !logMode
            ? React.createElement("button", { className:"log-btn", onClick: () => setLogMode(true), disabled: !hours },
                "Log Service Performed"
              )
            : React.createElement(React.Fragment, null,
                React.createElement("button", { className:"log-btn", onClick: handleSave, disabled: Object.values(checkedTasks).every(v => !v) },
                  "Save Completed Tasks"
                ),
                React.createElement("button", { className:"log-btn cancel", onClick: () => { setLogMode(false); setCheckedTasks({}); } }, "Cancel"),
                React.createElement("span", { className:"save-note" }, "Check tasks performed above, then save")
              )
        ),
        // HISTORY LOG — inside right panel, no blank space
        React.createElement("div", null,
          React.createElement("div", { className:"panel-section-title" }, selected + " — Service Log"),
          (() => {
            const entries = (serviceHistory[selected] || []).filter(e => e.date || e.hours).slice().reverse();
            if (!entries.length) return React.createElement("div", { className:"empty-history" }, "No service records found for this truck.");
            return React.createElement("table", { className:"history-table" },
              React.createElement("thead", null,
                React.createElement("tr", null,
                  React.createElement("th", null, "Date"),
                  React.createElement("th", null, "Hours"),
                  React.createElement("th", null, "Technician"),
                  React.createElement("th", null, "Work Performed")
                )
              ),
              React.createElement("tbody", null,
                entries.map((e, i) =>
                  React.createElement("tr", { key: i },
                    React.createElement("td", { className:"history-date" }, e.date || "—"),
                    React.createElement("td", { className:"history-hours" }, e.hours != null ? e.hours + "h" : "—"),
                    React.createElement("td", { className:"history-tech" }, e.technician || "—"),
                    React.createElement("td", null,
                      React.createElement("div", { className:"history-tasks" },
                        ...(e.tasks || []).map(t => React.createElement("span", { key:t.key, className:"history-task-tag" }, t.label)),
                        ...(e.notes || []).map((n,ni) => React.createElement("span", { key:"n"+ni, className:"history-note-tag" }, n))
                      )
                    )
                  )
                )
              )
            );
          })()
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
