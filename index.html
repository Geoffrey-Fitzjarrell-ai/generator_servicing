<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const TRUCKS = ["HD6","HD7","HD8","HD9","HD10","HD11","HD12","HD13","HD14","HD15","HD16","HD17","HD18"];
const INTERVAL = 1000;

const COLORS = {
  bg: "#15140f",
  panel: "#1d1b14",
  panelAlt: "#23211a",
  border: "#3a3526",
  amber: "#e8a23d",
  amberDim: "#6b4f1f",
  red: "#c4503a",
  green: "#5a8f5a",
  text: "#f0ead8",
  textDim: "#a39a82",
  textFaint: "#6e6754"
};

const TASKS = [
  { key: "airfilter_battery", name: "Air filter and battery check", interval: 50 },
  { key: "oil_filter", name: "Oil/filter change", interval: 150 },
  { key: "airfilter_clean", name: "Air filter cleaning", interval: 250 },
  { key: "fuel_filter", name: "Fuel filter change", interval: 250 },
  { key: "coolant_lines", name: "Check coolant lines", interval: 250 },
  { key: "drive_belt", name: "Check drive belt and tension", interval: 500 },
  { key: "radiator_airfilter", name: "Clean radiator and change air filter", interval: 500 },
  { key: "coolant_flush", name: "Coolant flush", interval: 1000 },
  { key: "valve_lash", name: "Valve lash", interval: 1000 },
  { key: "engine_mounts", name: "Check engine and generator mounts", interval: 1000 }
];

function defaultTruck() {
  return { hours: null, intervalStart: 0, overdue: false, technician: "", lastUpdated: null, history: [], postedBy: null };
}

function GeneratorGauge({ pct, overdue, size }) {
  const w = size || 160;
  const h = w * 1.3;
  const fillColor = overdue ? COLORS.red : COLORS.amber;
  const bodyTop = h * 0.18;
  const bodyBottom = h * 0.92;
  const bodyHeight = bodyBottom - bodyTop;
  const fillHeight = bodyHeight * (pct / 100);
  const fillY = bodyBottom - fillHeight;
  return React.createElement("svg", { width: w, height: h, viewBox: "0 0 100 130" },
    React.createElement("rect", { x: 18, y: 8, width: 64, height: 12, rx: 2, fill: COLORS.panelAlt, stroke: COLORS.border, strokeWidth: 1 }),
    React.createElement("rect", { x: 30, y: 4, width: 8, height: 8, fill: COLORS.textFaint }),
    React.createElement("rect", { x: 62, y: 4, width: 8, height: 8, fill: COLORS.textFaint }),
    React.createElement("clipPath", { id: "bodyClip" },
      React.createElement("rect", { x: 10, y: 22, width: 80, height: 98, rx: 6 })
    ),
    React.createElement("rect", { x: 10, y: 22, width: 80, height: 98, rx: 6, fill: COLORS.panelAlt, stroke: COLORS.border, strokeWidth: 1.5 }),
    React.createElement("rect", { x: 10, y: Math.max(fillY, bodyTop), width: 80, height: Math.max(fillHeight, 0), fill: fillColor, clipPath: "url(#bodyClip)", opacity: 0.85 }),
    React.createElement("rect", { x: 10, y: 22, width: 80, height: 98, rx: 6, fill: "none", stroke: COLORS.border, strokeWidth: 1.5 }),
    [0,1,2,3].map(i => React.createElement("line", { key: i, x1: 10, x2: 90, y1: 22 + (98/4)*i + (98/4), y2: 22 + (98/4)*i + (98/4), stroke: COLORS.border, strokeWidth: 0.5, opacity: 0.5 })),
    React.createElement("text", { x: 50, y: 75, textAnchor: "middle", fontSize: 13, fontWeight: 500, fill: overdue ? "#fbdcd4" : COLORS.text }, overdue ? "OVER" : Math.round(pct) + "%"),
    React.createElement("rect", { x: 4, y: 40, width: 6, height: 30, fill: COLORS.textFaint }),
    React.createElement("circle", { cx: 7, cy: 36, r: 5, fill: "none", stroke: COLORS.textFaint, strokeWidth: 2.5 })
  );
}

const DATA_URL = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/data.json";
const GITHUB_OWNER = "Geoffrey-Fitzjarrell-ai";
const GITHUB_REPO = "generator_servicing";
const GITHUB_TOKEN = "`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`";
const PENDING_PATH = "pending_completions.json";

function b64encode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64decode(str) {
  return decodeURIComponent(escape(atob(str)));
}

async function writePendingCompletion(entry) {
  const apiUrl = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + PENDING_PATH;
  const headers = { "Authorization": "Bearer " + GITHUB_TOKEN, "Accept": "application/vnd.github+json" };
  let existing = [];
  let sha = null;
  try {
    const getRes = await fetch(apiUrl, { headers: headers });
    if (getRes.ok) {
      const fileData = await getRes.json();
      sha = fileData.sha;
      existing = JSON.parse(b64decode(fileData.content));
    }
  } catch (e) {
    existing = [];
  }
  existing.push(entry);
  const body = {
    message: "Log completion for " + entry.truck,
    content: b64encode(JSON.stringify(existing, null, 2))
  };
  if (sha) body.sha = sha;
  try {
    await fetch(apiUrl, {
      method: "PUT",
      headers: { ...headers, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  } catch (e) {
    console.error("github write failed", e);
  }
}

function App() {
  const [data, setData] = React.useState(null);
  const [serviceLogs, setServiceLogs] = React.useState({});
  const [selected, setSelected] = React.useState("HD6");
  const [loaded, setLoaded] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [fetchedAt, setFetchedAt] = React.useState(null);
  const [showLogPanel, setShowLogPanel] = React.useState(false);
  const [checkedTasks, setCheckedTasks] = React.useState({});

  async function loadServiceLogs() {
    const logs = {};
    for (const t of TRUCKS) {
      try {
        const raw = localStorage.getItem("servicelog:" + t);
        logs[t] = raw ? JSON.parse(raw) : {};
      } catch (e) {
        logs[t] = {};
      }
    }
    setServiceLogs(logs);
  }

  async function saveServiceLog(truckId, log) {
    setServiceLogs(prev => ({ ...prev, [truckId]: log }));
    try {
      localStorage.setItem("servicelog:" + truckId, JSON.stringify(log));
    } catch (e) {
      console.error("save failed", e);
    }
  }

  async function loadData() {
    setError(null);
    try {
      const res = await fetch(DATA_URL + "?_=" + Date.now());
      if (!res.ok) throw new Error("status " + res.status);
      const json = await res.json();
      const result = {};
      for (const t of TRUCKS) {
        result[t] = json[t] ? { ...defaultTruck(), ...json[t] } : defaultTruck();
      }
      setData(result);
      setFetchedAt(new Date());
    } catch (e) {
      setError("Couldn't load fleet data. The repo file may not have a first entry yet, or the trigger hasn't run.");
    }
    setLoaded(true);
  }

  React.useEffect(() => { loadData(); loadServiceLogs(); }, []);

  if (!loaded) {
    return React.createElement("div", { style: { padding: "2rem", color: COLORS.textDim, fontSize: 14 } }, "Loading fleet data...");
  }

  if (error) {
    return React.createElement("div", { style: { background: COLORS.bg, color: COLORS.text, padding: "20px", borderRadius: 12, fontFamily: "ui-sans-serif, system-ui, sans-serif" } },
      React.createElement("div", { style: { fontSize: 13, color: COLORS.red, marginBottom: 12 } }, error),
      React.createElement("button", { onClick: loadData, style: { padding: "8px 14px", background: "transparent", color: COLORS.amber, border: "1px solid " + COLORS.amber, borderRadius: 6, fontSize: 13, cursor: "pointer" } }, "Retry")
    );
  }

  const truck = data[selected];
  const log = serviceLogs[selected] || {};
  const taskStatus = TASKS.map(task => {
    const lastDone = log[task.key] || 0;
    const sinceService = truck.hours != null ? truck.hours - lastDone : 0;
    const remaining = task.interval - sinceService;
    const status = truck.hours == null ? "unknown" : remaining <= 0 ? "overdue" : remaining <= task.interval * 0.1 ? "due_soon" : "ok";
    return { ...task, lastDone, remaining, status };
  });
  const anyTaskOverdue = taskStatus.some(t => t.status === "overdue");
  const progress = truck.hours != null ? Math.max(0, truck.hours - truck.intervalStart) : 0;
  const isOverdue = truck.overdue || anyTaskOverdue;
  const pct = isOverdue ? 100 : Math.min(100, (progress / INTERVAL) * 100);
  const remaining = INTERVAL - progress;

  function handleManualOverdue() {
    setData(prev => ({ ...prev, [selected]: { ...truck, overdue: !truck.overdue } }));
  }

  function toggleTaskChecked(key) {
    setCheckedTasks(prev => ({ ...prev, [key]: !prev[key] }));
  }

  function handleSaveServiceLog() {
    if (truck.hours == null) return;
    const newLog = { ...log };
    const completedTaskNames = [];
    for (const key of Object.keys(checkedTasks)) {
      if (checkedTasks[key]) {
        newLog[key] = truck.hours;
        const task = TASKS.find(t => t.key === key);
        if (task) completedTaskNames.push(task.name);
      }
    }
    saveServiceLog(selected, newLog);
    if (completedTaskNames.length > 0) {
      writePendingCompletion({ truck: selected, tasks: completedTaskNames, postedBy: truck.postedBy, loggedAt: new Date().toISOString() });
    }
    setCheckedTasks({});
    setShowLogPanel(false);
  }

  const statusColor = { ok: COLORS.green, due_soon: COLORS.amber, overdue: COLORS.red, unknown: COLORS.textFaint };
  const statusLabel = { ok: "ok", due_soon: "due soon", overdue: "overdue", unknown: "\u2014" };

  const cardStyle = (active) => ({
    padding: "10px 6px",
    textAlign: "center",
    background: active ? COLORS.panelAlt : COLORS.panel,
    border: "1px solid " + (active ? COLORS.amber : COLORS.border),
    borderRadius: 6,
    cursor: "pointer",
    color: active ? COLORS.amber : COLORS.textDim,
    fontSize: 13,
    fontWeight: 500
  });

  return React.createElement("div", { style: { background: COLORS.bg, color: COLORS.text, padding: "20px", fontFamily: "ui-sans-serif, system-ui, sans-serif", borderRadius: 12 } },
    React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 } },
      React.createElement("div", { style: { fontSize: 11, letterSpacing: "0.08em", color: COLORS.textFaint, textTransform: "uppercase" } }, "HD GEN2 fleet \u2014 generator service tracker"),
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        React.createElement("span", { style: { fontSize: 11, color: COLORS.textFaint } }, fetchedAt ? "synced " + fetchedAt.toLocaleTimeString() : ""),
        React.createElement("button", { onClick: loadData, style: { padding: "4px 10px", background: "transparent", color: COLORS.textDim, border: "1px solid " + COLORS.border, borderRadius: 6, fontSize: 11, cursor: "pointer" } }, "refresh")
      )
    ),
    React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, marginBottom: 20 } },
      TRUCKS.map(t => {
        const td = data[t];
        const tLog = serviceLogs[t] || {};
        const tProgress = td.hours != null ? Math.max(0, td.hours - td.intervalStart) : 0;
        const tTaskOverdue = td.hours != null && TASKS.some(task => td.hours - (tLog[task.key] || 0) >= task.interval);
        const tOverdue = td.overdue || tTaskOverdue;
        return React.createElement("div", { key: t, style: cardStyle(t === selected), onClick: () => setSelected(t) },
          React.createElement("div", null, t),
          React.createElement("div", { style: { fontSize: 10, marginTop: 2, color: tOverdue ? COLORS.red : COLORS.textFaint } }, tOverdue ? "due" : (td.hours != null ? Math.round(tProgress) + "h" : "no data"))
        );
      })
    ),
    React.createElement("div", { style: { display: "flex", gap: 24, alignItems: "flex-start", flexWrap: "wrap" } },
      React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center" } },
        React.createElement(GeneratorGauge, { pct: pct, overdue: isOverdue }),
        React.createElement("div", { style: { fontSize: 13, fontWeight: 500, marginTop: 6 } }, selected),
        isOverdue ? React.createElement("div", { style: { marginTop: 10, padding: "6px 10px", background: "#3a1f1a", border: "1px solid " + COLORS.red, borderRadius: 6, fontSize: 11, color: "#fbdcd4", textAlign: "center", maxWidth: 150 } }, "Needs attention \u2014 get to this truck when you can") : null
      ),
      React.createElement("div", { style: { flex: 1, minWidth: 220 } },
        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 } },
          React.createElement("div", { style: { background: COLORS.panel, borderRadius: 6, padding: "8px 10px" } },
            React.createElement("div", { style: { fontSize: 11, color: COLORS.textFaint } }, "Generator hours"),
            React.createElement("div", { style: { fontSize: 18, fontWeight: 500 } }, truck.hours != null ? truck.hours + "h" : "\u2014")
          ),
          React.createElement("div", { style: { background: COLORS.panel, borderRadius: 6, padding: "8px 10px" } },
            React.createElement("div", { style: { fontSize: 11, color: COLORS.textFaint } }, isOverdue ? "Past interval by" : "Until next service"),
            React.createElement("div", { style: { fontSize: 18, fontWeight: 500, color: isOverdue ? COLORS.red : COLORS.text } }, isOverdue ? Math.round(progress - INTERVAL) + "h" : Math.round(remaining) + "h")
          )
        ),
        truck.technician ? React.createElement("div", { style: { fontSize: 12, color: COLORS.textFaint, marginBottom: 14 } }, "Last reported by " + truck.technician) : null,
        React.createElement("button", { onClick: handleManualOverdue, style: { padding: "8px 14px", background: "transparent", color: COLORS.textDim, border: "1px solid " + COLORS.border, borderRadius: 6, fontSize: 13, cursor: "pointer", marginRight: 8 } }, truck.overdue ? "Unmark overdue (this session)" : "Flag as overdue (this session)"),
        React.createElement("button", { onClick: () => setShowLogPanel(!showLogPanel), style: { padding: "8px 14px", background: showLogPanel ? COLORS.amberDim : "transparent", color: COLORS.amber, border: "1px solid " + COLORS.amber, borderRadius: 6, fontSize: 13, cursor: "pointer" } }, "Log service performed"),
        truck.lastUpdated ? React.createElement("div", { style: { fontSize: 11, color: COLORS.textFaint, marginTop: 10 } }, "Last logged " + new Date(truck.lastUpdated).toLocaleString()) : React.createElement("div", { style: { fontSize: 11, color: COLORS.textFaint, marginTop: 10 } }, "No data reported yet for this truck"),
        React.createElement("div", { style: { marginTop: 16, borderTop: "1px solid " + COLORS.border, paddingTop: 12 } },
          taskStatus.map(task => React.createElement("div", { key: task.key, style: { display: "flex", alignItems: "center", gap: 8, padding: "5px 0", fontSize: 12 } },
            showLogPanel ? React.createElement("input", { type: "checkbox", checked: !!checkedTasks[task.key], onChange: () => toggleTaskChecked(task.key) }) : null,
            React.createElement("span", { style: { flex: 1, color: COLORS.text } }, task.name + " (" + task.interval + "h)"),
            React.createElement("span", { style: { color: statusColor[task.status], fontWeight: 500, minWidth: 60, textAlign: "right" } }, statusLabel[task.status])
          )),
          showLogPanel ? React.createElement("button", { onClick: handleSaveServiceLog, style: { marginTop: 10, padding: "8px 14px", background: COLORS.amberDim, color: COLORS.amber, border: "1px solid " + COLORS.amber, borderRadius: 6, fontSize: 13, cursor: "pointer" } }, "Save logged services") : null
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
