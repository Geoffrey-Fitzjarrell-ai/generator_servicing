<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD GEN2 · Generator Service Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #080b12;
  --bg-dot:     url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.8' fill='%23ffffff08'/%3E%3C/svg%3E");
  --surface:    #0d1117;
  --surface2:   #131925;
  --surface3:   #1a2235;
  --border:     #1e2840;
  --border2:    #28364f;
  --amber:      #f0a500;
  --amber-dim:  #3d2900;
  --amber-glow: rgba(240,165,0,0.12);
  --red:        #e04545;
  --red-dim:    #3a1010;
  --red-glow:   rgba(224,69,69,0.12);
  --green:      #3da870;
  --green-dim:  #0f2e1e;
  --blue:       #4a7cf5;
  --blue-dim:   #101e40;
  --text:       #dde4f0;
  --text-dim:   #6e7f99;
  --text-faint: #38465a;
  --mono:       'JetBrains Mono', monospace;
  --sans:       'Inter', sans-serif;
  --radius:     6px;
}
html, body { height: 100%; background: var(--bg); background-image: var(--bg-dot); color: var(--text); font-family: var(--sans); }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
}
.header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--blue) 40%, var(--amber) 60%, transparent);
  opacity: 0.3;
}
.header-brand { display:flex; align-items:center; gap:12px; }
.header-badge {
  font-family: var(--mono); font-size:10px; font-weight:700;
  letter-spacing:0.18em; color: var(--bg); background: var(--amber);
  padding: 3px 8px; border-radius: 3px;
}
.header-title { font-size:12px; color: var(--text-dim); letter-spacing:0.04em; }
.header-right { display:flex; align-items:center; gap:12px; }
.sync-indicator { display:flex; align-items:center; gap:6px; }
.sync-dot { width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.sync-time { font-family:var(--mono); font-size:10px; color:var(--text-faint); letter-spacing:0.06em; }
.btn-ghost {
  font-family:var(--mono); font-size:10px; letter-spacing:0.08em;
  padding:5px 12px; background:transparent; color:var(--text-dim);
  border:1px solid var(--border2); border-radius:var(--radius);
  cursor:pointer; transition:all 0.15s; text-transform:uppercase;
}
.btn-ghost:hover { border-color:var(--blue); color:var(--blue); }

/* ── TRUCK STRIP ── */
.truck-strip {
  display:flex; background:var(--surface); border-bottom:1px solid var(--border);
  overflow-x:auto; scrollbar-width:none;
}
.truck-strip::-webkit-scrollbar { display:none; }
.truck-tab {
  flex:1; min-width:68px; padding:8px 6px 10px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; border-right:1px solid var(--border);
  position:relative; transition:background 0.15s;
}
.truck-tab::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--text-faint); transition:background 0.15s;
}
.truck-tab.active { background:var(--surface2); }
.truck-tab.active::before { background:var(--amber); box-shadow:0 0 8px var(--amber); }
.truck-tab.st-overdue::before { background:var(--red); box-shadow:0 0 8px var(--red); }
.truck-tab.st-warn::before { background:var(--amber); }
.truck-tab.st-ok::before { background:var(--green); }
.truck-tab:last-child { border-right:none; }
.truck-tab:hover:not(.active) { background:var(--surface2); }
.truck-name {
  font-family:var(--mono); font-size:11px; font-weight:700;
  letter-spacing:0.06em; color:var(--text-dim);
}
.truck-tab.active .truck-name { color:var(--amber); }
.truck-tab.st-overdue .truck-name { color:var(--red); }
.truck-hours-badge { font-family:var(--mono); font-size:9px; color:var(--text-faint); }

/* ── MAIN ── */
.main { display:grid; grid-template-columns:340px 1fr; height:calc(100vh - 108px); }

/* ── LEFT PANEL ── */
.left-panel {
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow-y:auto; padding:24px 20px;
}
.truck-header { margin-bottom:20px; }
.truck-id {
  font-family:var(--mono); font-size:28px; font-weight:700;
  letter-spacing:0.1em; line-height:1;
}
.truck-sub { font-size:10px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; }

/* ── GAUGE + STATS ── */
.gauge-stats-row { display:flex; gap:14px; align-items:stretch; margin-bottom:16px; }
.gauge-col { display:flex; flex-direction:column; align-items:center; gap:6px; padding-top:2px; }
.gauge-wrap { width:52px; flex:1; min-height:170px; position:relative; }
.gauge-label { font-family:var(--mono); font-size:8px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; }
.stats-col { flex:1; display:flex; flex-direction:column; gap:10px; }

.stat-card {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); padding:10px 12px;
  position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute; top:0; left:0; bottom:0; width:2px;
}
.stat-card.s-ok::before { background:var(--green); }
.stat-card.s-warn::before { background:var(--amber); }
.stat-card.s-overdue::before { background:var(--red); }
.stat-card.s-neutral::before { background:var(--border2); }
.stat-lbl { font-size:9px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.stat-val { font-family:var(--mono); font-size:18px; font-weight:700; line-height:1; }
.stat-val .unit { font-size:11px; font-weight:400; color:var(--text-dim); margin-left:2px; }
.stat-val.c-overdue { color:var(--red); }
.stat-val.c-warn { color:var(--amber); }
.stat-val.c-ok { color:var(--green); }

/* ── DUE LIST ── */
.due-list { margin-top:4px; }
.due-tag {
  font-size:10px; padding:2px 0;
  border-bottom:1px solid var(--border);
  color: var(--text-dim); line-height:1.6;
}
.due-tag:last-child { border-bottom:none; }

/* ── ATTENTION ── */
.attention {
  padding:10px 12px; border-radius:var(--radius); margin-bottom:14px;
  background: var(--red-dim); border:1px solid rgba(224,69,69,0.3);
  display:flex; gap:10px; align-items:flex-start;
}
.attention-icon { color:var(--red); font-size:13px; margin-top:1px; }
.attention-msg { font-size:11px; color:#ffc8c8; line-height:1.5; }

/* ── REPORTER ── */
.reporter {
  padding:10px 12px; border-radius:var(--radius);
  background:var(--surface2); border:1px solid var(--border);
}
.reporter-lbl { font-size:9px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.reporter-name { font-size:12px; color:var(--text-dim); font-weight:500; }
.reporter-time { font-family:var(--mono); font-size:9px; color:var(--text-faint); margin-top:2px; }

/* ── RIGHT PANEL ── */
.right-panel {
  display:flex; flex-direction:column;
  overflow-y:auto; padding:20px 24px; gap:20px;
}
.section-title {
  font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-faint); padding-bottom:8px;
  border-bottom:1px solid var(--border); margin-bottom:2px;
}

/* ── TASK ROWS ── */
.task-list { display:flex; flex-direction:column; gap:4px; }
.task-row {
  display:grid; grid-template-columns:1fr 56px 88px 28px;
  align-items:center; gap:10px;
  padding:9px 12px; border-radius:var(--radius);
  background:var(--surface2); border:1px solid var(--border);
  border-left-width:3px; border-left-color:var(--border2);
  transition:background 0.12s;
}
.task-row:hover { background:var(--surface3); }
.task-row.r-overdue { border-left-color:var(--red); background:#160d0d; }
.task-row.r-warn    { border-left-color:var(--amber); }
.task-row.r-ok      { border-left-color:var(--green); }
.task-name { font-size:12px; color:var(--text); }
.task-interval { font-family:var(--mono); font-size:10px; color:var(--text-faint); }
.badge {
  font-family:var(--mono); font-size:9px; font-weight:700;
  padding:3px 7px; border-radius:3px; text-align:center;
  letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap;
}
.badge.ok        { background:var(--green-dim); color:var(--green); }
.badge.warn      { background:var(--amber-dim); color:var(--amber); }
.badge.overdue   { background:var(--red-dim);   color:var(--red);   }
.badge.no_record { background:var(--blue-dim); color:var(--blue); border:1px solid rgba(74,124,245,0.3); }
.badge.unknown   { background:var(--surface);   color:var(--text-faint); }

.task-check {
  width:18px; height:18px; border-radius:3px;
  border:1px solid var(--border2); background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.12s; flex-shrink:0;
}
.task-check.checked { background:var(--amber-dim); border-color:var(--amber); }
.task-check.hidden { opacity:0; pointer-events:none; }
.task-check-inner { width:8px; height:8px; background:var(--amber); border-radius:2px; display:none; }
.task-check.checked .task-check-inner { display:block; }

/* ── BUTTONS ── */
.btn-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.btn-primary {
  font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
  padding:9px 18px; background:var(--amber-dim); color:var(--amber);
  border:1px solid var(--amber); border-radius:var(--radius);
  cursor:pointer; transition:all 0.15s;
}
.btn-primary:hover { background:var(--amber); color:#000; }
.btn-primary:disabled { opacity:0.35; cursor:not-allowed; }
.btn-cancel {
  font-family:var(--mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
  padding:9px 14px; background:transparent; color:var(--text-dim);
  border:1px solid var(--border2); border-radius:var(--radius);
  cursor:pointer; transition:all 0.15s;
}
.btn-cancel:hover { background:var(--surface3); }
.save-hint { font-size:11px; color:var(--text-faint); }

/* ── HISTORY TABLE ── */
.history-table { width:100%; border-collapse:collapse; font-size:12px; }
.history-table th {
  text-align:left; padding:5px 10px;
  font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--text-faint); border-bottom:1px solid var(--border);
  font-weight:500; font-family:var(--sans);
}
.history-table td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
.history-table tr:last-child td { border-bottom:none; }
.history-table tr:hover td { background:var(--surface2); }
.h-date { font-family:var(--mono); font-size:10px; color:var(--text-dim); white-space:nowrap; }
.h-hours { font-family:var(--mono); font-size:12px; font-weight:700; color:var(--amber); }
.h-tech { font-size:12px; color:var(--text-dim); }
.h-tasks { display:flex; flex-wrap:wrap; gap:4px; }
.h-task-tag { padding:2px 6px; background:var(--green-dim); color:var(--green); border-radius:3px; font-size:10px; }
.h-note-tag { padding:2px 6px; background:var(--surface3); color:var(--text-faint); border-radius:3px; font-size:10px; border:1px solid var(--border); }
.empty-msg { padding:16px; color:var(--text-faint); font-size:12px; text-align:center; }

/* ── FULL CENTER ── */
.full-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:14px; }
.err-msg { font-size:13px; color:var(--red); max-width:340px; text-align:center; line-height:1.6; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef } = React;

const TRUCKS = ["HD5","HD6","HD7","HD8","HD9","HD10","HD11","HD12","HD13","HD14","HD15","HD16","HD17","HD18"];
const TASKS = [
  { key:"airfilter_battery", name:"Air filter & battery check",        interval:50  },
  { key:"oil_filter",        name:"Oil / filter change",               interval:150 },
  { key:"airfilter_clean",   name:"Air filter cleaning",               interval:250 },
  { key:"coolant_lines",     name:"Check coolant lines",               interval:250 },
  { key:"fuel_filter",       name:"Fuel filter change",                interval:250 },
  { key:"drive_belt",        name:"Check drive belt & tension",        interval:500 },
  { key:"radiator_airfilter",name:"Clean radiator & change air filter",interval:500 },
];

const DATA_URL    = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/data.json";
const LOGS_URL    = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/service_logs.json";
const HISTORY_URL = "https://raw.githubusercontent.com/Geoffrey-Fitzjarrell-ai/generator_servicing/main/service_history.json";
const GITHUB_OWNER = "Geoffrey-Fitzjarrell-ai";
const GITHUB_REPO  = "generator_servicing";
const GITHUB_TOKEN = "PASTE_YOUR_GITHUB_PAT_HERE";
const PENDING_PATH = "pending_completions.json";

function b64e(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64d(s){ return decodeURIComponent(escape(atob(s))); }

async function writePending(entry) {
  if (GITHUB_TOKEN === "PASTE_YOUR_GITHUB_PAT_HERE") return;
  const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PENDING_PATH}`;
  const h = {"Authorization":"Bearer "+GITHUB_TOKEN,"Accept":"application/vnd.github+json"};
  let existing=[], sha=null;
  try { const r=await fetch(url,{headers:h}); if(r.ok){const f=await r.json(); sha=f.sha; existing=JSON.parse(b64d(f.content.replace(/\n/g,"")));} } catch(e){}
  existing.push(entry);
  const body={message:"Log: "+entry.truck, content:b64e(JSON.stringify(existing,null,2))};
  if(sha) body.sha=sha;
  await fetch(url,{method:"PUT",headers:{...h,"Content-Type":"application/json"},body:JSON.stringify(body)});
}

/* ── VERTICAL GAUGE ── */
function Gauge({ pct, overdue }) {
  const W=52, H=170, bx=18, bw=20, by=8, bh=148;
  const fillH = Math.max(0, Math.min(bh, bh * pct));
  const fillY = by + bh - fillH;
  const id = "gz" + Math.round(pct*100);
  const zoneColor = overdue ? "#e04545" : pct > 0.75 ? "#f0a500" : "#3da870";

  return React.createElement("svg", { width:W, height:H, viewBox:`0 0 ${W} ${H}`, style:{display:"block"} },
    // zone gradient track
    React.createElement("defs", null,
      React.createElement("linearGradient", { id:"zoneGrad", x1:"0", y1:"1", x2:"0", y2:"0" },
        React.createElement("stop", { offset:"0%",   stopColor:"#3da870" }),
        React.createElement("stop", { offset:"50%",  stopColor:"#f0a500" }),
        React.createElement("stop", { offset:"100%", stopColor:"#e04545" })
      ),
      React.createElement("clipPath", { id:"fillClip"+Math.round(pct*1000) },
        React.createElement("rect", { x:bx, y:fillY, width:bw, height:fillH })
      )
    ),
    // track bg
    React.createElement("rect", { x:bx, y:by, width:bw, height:bh, rx:4, fill:"#1a2235" }),
    // zone gradient (always visible faintly)
    React.createElement("rect", { x:bx, y:by, width:bw, height:bh, rx:4, fill:"url(#zoneGrad)", opacity:0.12 }),
    // actual fill clipped to current level
    React.createElement("rect", { x:bx, y:by, width:bw, height:bh, rx:4, fill:"url(#zoneGrad)",
      clipPath:`url(#fillClip${Math.round(pct*1000)})`, opacity:0.9 }),
    // glow on fill top edge
    fillH > 4 ? React.createElement("rect", { x:bx, y:fillY, width:bw, height:3, rx:2, fill:"#fff", opacity:0.15 }) : null,
    // track border
    React.createElement("rect", { x:bx, y:by, width:bw, height:bh, rx:4, fill:"none", stroke:"#28364f", strokeWidth:1 }),
    // tick marks
    ...[0.25,0.5,0.75].map(t =>
      React.createElement("line", { key:t, x1:bx+bw, y1:by+bh*(1-t), x2:bx+bw+5, y2:by+bh*(1-t), stroke:"#38465a", strokeWidth:1 })
    ),
    // 0 / max labels
    React.createElement("text", { x:bx+bw+8, y:by+bh+3, fontFamily:"'JetBrains Mono',monospace", fontSize:8, fill:"#38465a" }, "0"),
    React.createElement("text", { x:bx+bw+8, y:by+5,    fontFamily:"'JetBrains Mono',monospace", fontSize:8, fill:"#38465a" }, "1k")
  );
}

/* ── APP ── */
function App() {
  const [fleet,      setFleet]      = useState(null);
  const [svcLogs,    setSvcLogs]    = useState({});
  const [svcHistory, setSvcHistory] = useState({});
  const [selected,   setSelected]   = useState("HD6");
  const [loaded,     setLoaded]     = useState(false);
  const [error,      setError]      = useState(null);
  const [syncedAt,   setSyncedAt]   = useState(null);
  const [logMode,    setLogMode]    = useState(false);
  const [checked,    setChecked]    = useState({});

  async function loadAll() {
    setError(null);
    try {
      const bust = "?_="+Date.now();
      const [r1,r2,r3] = await Promise.all([fetch(DATA_URL+bust),fetch(LOGS_URL+bust),fetch(HISTORY_URL+bust)]);
      if(!r1.ok) throw new Error();
      const [data,seedLogs,hist] = await Promise.all([r1.json(), r2.ok?r2.json():{}, r3.ok?r3.json():{}]);
      const fleet={};
      for(const t of TRUCKS) fleet[t]={hours:null,intervalStart:0,overdue:false,technician:"",lastUpdated:null,postedBy:null,...(data[t]||{})};
      setFleet(fleet);
      setSvcHistory(hist);
      // merge seed + localStorage
      const logs={};
      for(const t of TRUCKS){
        const base=seedLogs[t]||{};
        try{ const local=localStorage.getItem("svc:"+t); const lo=local?JSON.parse(local):{}; const merged={...base}; for(const[k,v] of Object.entries(lo)) if(!merged[k]||v>merged[k]) merged[k]=v; logs[t]=merged; }
        catch(e){ logs[t]=base; }
      }
      setSvcLogs(logs);
      setSyncedAt(new Date());
    } catch(e) { setError("Fleet data unavailable."); }
    setLoaded(true);
  }

  useEffect(()=>{ loadAll(); },[]);

  if(!loaded) return React.createElement("div",{className:"full-center"},
    React.createElement("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#38465a",letterSpacing:"0.12em"}},"LOADING FLEET DATA...")
  );
  if(error) return React.createElement("div",{className:"full-center"},
    React.createElement("div",{className:"err-msg"},error),
    React.createElement("button",{className:"btn-ghost",onClick:loadAll},"RETRY")
  );

  const truck = fleet[selected];
  const log   = svcLogs[selected]||{};
  const hours = truck.hours;

  const taskStatus = TASKS.map(task=>{
    const last = log[task.key];
    const hasRec = last != null;
    const since = hasRec && hours!=null ? hours-last : null;
    const rem   = since!=null ? task.interval-since : null;
    const pct   = since!=null ? Math.min(since/task.interval,1) : (hours!=null && !hasRec && task.key!=="airfilter_clean" ? 1 : 0);
    const status= hours==null?"unknown"
                : !hasRec && task.key==="airfilter_clean" ? "no_record"
                : !hasRec ? "overdue"
                : since>=task.interval?"overdue"
                : since>=task.interval*0.9?"warn":"ok";
    return {...task,last,hasRec,since,rem,pct,status};
  });

  const anyOverdue = taskStatus.some(t=>t.status==="overdue");
  const anyWarn    = taskStatus.some(t=>t.status==="warn");
  const gaugePct   = taskStatus.reduce((m,t)=>Math.max(m,t.pct),0);
  const isOverdue  = anyOverdue;

  function truckStatus(t){
    const td=fleet[t]; const tl=svcLogs[t]||{};
    if(!td.hours) return "none";
    if(TASKS.some(task=>{ const l=tl[task.key]; return l!=null&&(td.hours-l)>=task.interval; })) return "overdue";
    if(TASKS.some(task=>{ const l=tl[task.key]; return l!=null&&(td.hours-l)>=task.interval*0.9; })) return "warn";
    return "ok";
  }

  function handleSave(){
    if(!hours) return;
    const newLog={...log}; const done=[];
    for(const[k,v] of Object.entries(checked)){ if(v){ newLog[k]=hours; const t=TASKS.find(x=>x.key===k); if(t) done.push(t.name); } }
    setSvcLogs(p=>({...p,[selected]:newLog}));
    try{ localStorage.setItem("svc:"+selected,JSON.stringify(newLog)); } catch(e){}
    if(done.length) writePending({truck:selected,tasks:done,postedBy:truck.postedBy,loggedAt:new Date().toISOString()});
    setChecked({}); setLogMode(false);
  }

  const statusLabel={ok:"OK",warn:"DUE SOON",overdue:"OVERDUE",unknown:"—",no_record:"GUIDELINE"};
  const overdueTasks = taskStatus.filter(t=>t.status==="overdue");
  const warnTasks    = taskStatus.filter(t=>t.status==="warn");

  const nextServiceCard = ()=>{
    if(!hours) return React.createElement("div",{className:"stat-val"},"—");
    if(overdueTasks.length) return React.createElement("div",null,
      React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:"var(--red)",letterSpacing:"0.08em",marginBottom:5}},"DUE NOW"),
      React.createElement("div",{className:"due-list"}, overdueTasks.map(t=>React.createElement("div",{key:t.key,className:"due-tag"},t.name)))
    );
    if(warnTasks.length) return React.createElement("div",null,
      React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:"var(--amber)",letterSpacing:"0.08em",marginBottom:5}},"DUE SOON"),
      React.createElement("div",{className:"due-list"}, warnTasks.map(t=>React.createElement("div",{key:t.key,className:"due-tag"},t.name)))
    );
    const known=taskStatus.filter(t=>t.rem!=null); const next=known.length?Math.round(Math.min(...known.map(t=>t.rem))):null;
    return React.createElement("div",{className:"stat-val"},next??'—', next!=null?React.createElement("span",{className:"unit"},"h"):null);
  };

  const histEntries=(svcHistory[selected]||[]).filter(e=>e.date||e.hours).slice().reverse();

  return React.createElement("div",null,
    // HEADER
    React.createElement("header",{className:"header"},
      React.createElement("div",{className:"header-brand"},
        React.createElement("span",{className:"header-badge"},"HD GEN2"),
        React.createElement("span",{className:"header-title"},"Generator Service Monitor")
      ),
      React.createElement("div",{className:"header-right"},
        React.createElement("div",{className:"sync-indicator"},
          React.createElement("div",{className:"sync-dot"}),
          React.createElement("span",{className:"sync-time"}, syncedAt?"SYNCED "+syncedAt.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—")
        ),
        React.createElement("button",{className:"btn-ghost",onClick:loadAll},"↻ REFRESH")
      )
    ),
    // TRUCK STRIP
    React.createElement("nav",{className:"truck-strip"},
      TRUCKS.map(t=>{
        const st=truckStatus(t); const td=fleet[t];
        const cls=["truck-tab", t===selected?"active":"", st!=="none"?"st-"+st:""].filter(Boolean).join(" ");
        return React.createElement("div",{key:t,className:cls,onClick:()=>{setSelected(t);setLogMode(false);setChecked({});}},
          React.createElement("div",{className:"truck-name"},t),
          React.createElement("div",{className:"truck-hours-badge"}, td.hours!=null?td.hours+"h":"—")
        );
      })
    ),
    // MAIN
    React.createElement("div",{className:"main"},
      // LEFT
      React.createElement("div",{className:"left-panel"},
        React.createElement("div",{className:"truck-header"},
          React.createElement("div",{className:"truck-id",style:{color:isOverdue?"var(--red)":anyWarn?"var(--amber)":"var(--text)"}},selected),
          React.createElement("div",{className:"truck-sub"},"HD GEN2 · Japan Fleet")
        ),
        React.createElement("div",{className:"gauge-stats-row"},
          React.createElement("div",{className:"gauge-col"},
            React.createElement("div",{className:"gauge-wrap"},
              React.createElement(Gauge,{pct:gaugePct,overdue:isOverdue})
            ),
            React.createElement("div",{className:"gauge-label"},"INTERVAL")
          ),
          React.createElement("div",{className:"stats-col"},
            React.createElement("div",{className:"stat-card s-neutral"},
              React.createElement("div",{className:"stat-lbl"},"Total Hours"),
              React.createElement("div",{className:"stat-val "+(isOverdue?"c-overdue":anyWarn?"c-warn":"")},
                hours!=null?hours:"—", hours!=null?React.createElement("span",{className:"unit"},"h"):null
              )
            ),
            React.createElement("div",{className:"stat-card "+(isOverdue?"s-overdue":anyWarn?"s-warn":"s-ok")},
              React.createElement("div",{className:"stat-lbl"},"Next Service"),
              nextServiceCard()
            )
          )
        ),
        isOverdue?React.createElement("div",{className:"attention"},
          React.createElement("span",{className:"attention-icon"},"⚠"),
          React.createElement("div",{className:"attention-msg"},"Service required — get to this truck when available")
        ):null,
        truck.postedBy?React.createElement("div",{className:"reporter"},
          React.createElement("div",{className:"reporter-lbl"},"Last reported by"),
          React.createElement("div",{className:"reporter-name"},truck.postedBy.name||truck.technician),
          truck.lastUpdated?React.createElement("div",{className:"reporter-time"},new Date(truck.lastUpdated).toLocaleString()):null
        ):null
      ),
      // RIGHT
      React.createElement("div",{className:"right-panel"},
        // TASKS
        React.createElement("div",null,
          React.createElement("div",{className:"section-title"},"Maintenance Schedule"),
          React.createElement("div",{className:"task-list"},
            taskStatus.map(task=>
              React.createElement("div",{key:task.key,className:"task-row r-"+task.status},
                React.createElement("div",{className:"task-name"},task.name),
                React.createElement("div",{className:"task-interval"},task.interval+"h"),
                React.createElement("div",{className:"badge "+task.status},statusLabel[task.status]),
                React.createElement("div",{
                  className:"task-check"+(logMode?"":" hidden")+(checked[task.key]?" checked":""),
                  onClick:()=>logMode&&setChecked(p=>({...p,[task.key]:!p[task.key]}))
                }, React.createElement("div",{className:"task-check-inner"}))
              )
            )
          )
        ),
        // LOG BUTTON
        React.createElement("div",{className:"btn-row"},
          !logMode
            ?React.createElement("button",{className:"btn-primary",onClick:()=>setLogMode(true),disabled:!hours},"Log Service Performed")
            :React.createElement(React.Fragment,null,
              React.createElement("button",{className:"btn-primary",onClick:handleSave,disabled:Object.values(checked).every(v=>!v)},"Save Completed Tasks"),
              React.createElement("button",{className:"btn-cancel",onClick:()=>{setLogMode(false);setChecked({})}},"Cancel"),
              React.createElement("span",{className:"save-hint"},"Check tasks above, then save")
            )
        ),
        // HISTORY
        React.createElement("div",null,
          React.createElement("div",{className:"section-title"},selected+" — Service Log"),
          !histEntries.length
            ?React.createElement("div",{className:"empty-msg"},"No service records found for this truck.")
            :React.createElement("table",{className:"history-table"},
              React.createElement("thead",null,
                React.createElement("tr",null,
                  React.createElement("th",null,"Date"),
                  React.createElement("th",null,"Hours"),
                  React.createElement("th",null,"Technician"),
                  React.createElement("th",null,"Work Performed")
                )
              ),
              React.createElement("tbody",null,
                histEntries.map((e,i)=>
                  React.createElement("tr",{key:i},
                    React.createElement("td",{className:"h-date"},e.date||"—"),
                    React.createElement("td",{className:"h-hours"},e.hours!=null?e.hours+"h":"—"),
                    React.createElement("td",{className:"h-tech"},e.technician||"—"),
                    React.createElement("td",null,
                      React.createElement("div",{className:"h-tasks"},
                        ...(e.tasks||[]).map(t=>React.createElement("span",{key:t.key,className:"h-task-tag"},t.label)),
                        ...(e.notes||[]).map((n,ni)=>React.createElement("span",{key:"n"+ni,className:"h-note-tag"},n))
                      )
                    )
                  )
                )
              )
            )
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
